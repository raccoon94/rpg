<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>방치형 RPG</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background:#0f1020; color:#e8e8f0; overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }
  #app { max-width:480px; margin:0 auto; height:100vh; height:100dvh; display:flex; flex-direction:column; }

  /* 상단 자원바 */
  #topbar {
    display:flex; gap:6px; padding:9px 9px; background:linear-gradient(180deg,#20223f,#15162c);
    border-bottom:1px solid #343a66; font-size:13px; align-items:center; box-shadow:0 2px 8px #00000040;
  }
  .res { display:flex; align-items:center; gap:4px; background:linear-gradient(160deg,#0f1020,#1a1c38);
    padding:5px 10px; border-radius:20px; border:1px solid #343a66; box-shadow:inset 0 1px 0 #ffffff12; }
  .res b { color:#ffd866; }
  .goldIcon { display:inline-block; width:17px; height:17px; border-radius:50%; vertical-align:-3px; margin-right:3px;
    background:
      radial-gradient(circle at 32% 28%, #fff7b8 0 16%, transparent 17%),
      radial-gradient(circle at 50% 55%, #ffd95a 0 42%, #f7a51d 43% 68%, #9b5a08 69% 100%);
    border:1px solid #ffe28a; box-shadow:0 1px 3px #0008, inset 0 1px 0 #fff7, inset 0 -2px 0 #9b5a0844; }
  .goldIcon::after { content:''; display:block; width:7px; height:7px; margin:4px auto; border-radius:50%;
    border:1px solid #9b5a0877; background:#ffc43a88; }
  .matIcon { display:inline-block; width:24px; height:24px; object-fit:contain; vertical-align:-7px; margin-right:4px;
    filter:drop-shadow(0 2px 3px #0008); }
  .matIconTiny { width:22px; height:22px; margin-right:2px; vertical-align:-6px; }
  .matIconBig { width:58px; height:58px; margin:0; vertical-align:middle; filter:drop-shadow(0 8px 10px #0009); }
  .matIconBag { width:38px; height:38px; margin:0; vertical-align:middle; filter:drop-shadow(0 4px 5px #0009); }
  .matIconHero { width:20px; height:20px; margin-right:3px; vertical-align:-5px; }
  .matInline { display:inline-flex; align-items:center; gap:3px; vertical-align:-6px; white-space:nowrap; }
  #buyGem { margin-left:auto; background:linear-gradient(160deg,#ff7a90,#ff3b5c); color:#fff;
    border:none; padding:6px 13px; border-radius:20px; font-weight:bold; font-size:12px; box-shadow:0 2px 8px #ff3b5c55, inset 0 1px 0 #ffffff44; }
  #homeBtn { background:linear-gradient(160deg,#1a1c38,#0f1020); border:1px solid #343a66; border-radius:50%; width:32px; height:32px; font-size:15px; padding:0; }

  /* 전투 화면 */
  #battle {
    flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column;
    background:url('assets/bg/hunt_field_20260610_inpaint.png?v=1') center/cover no-repeat;
  }
  #battle::after { content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
    background:linear-gradient(180deg,#00000010,transparent 35%,#00000022); }
  #stars { position:absolute; inset:0; pointer-events:none; display:none; background-image:
    radial-gradient(2px 2px at 20% 25%, #ffffffaa, transparent),
    radial-gradient(2px 2px at 70% 18%, #ffffff77, transparent),
    radial-gradient(1px 1px at 40% 55%, #ffffff88, transparent),
    radial-gradient(1px 1px at 85% 45%, #ffffff66, transparent),
    radial-gradient(2px 2px at 55% 12%, #ffffff88, transparent),
    radial-gradient(1px 1px at 12% 60%, #ffffff66, transparent); }
  #ground { position:absolute; bottom:50px; left:0; right:0; height:70px; display:none;
    background:linear-gradient(180deg,#2c2358,#15122e); border-top:2px solid #463a82;
    box-shadow:0 -6px 24px #0009; }
  #stageLabel { position:absolute; top:9px; left:0; right:0; text-align:center; font-size:13px; color:#c3c8f5; z-index:5; text-shadow:0 1px 3px #000; }
  #powerBadge { position:absolute; top:30px; left:0; right:0; text-align:center; font-size:12px; color:#ffd866; z-index:5; text-shadow:0 1px 3px #000; }
  #powerBadge b { font-size:15px; }
  #skillToast { position:absolute; top:46%; left:0; right:0; text-align:center; z-index:8; pointer-events:none;
    font-size:22px; font-weight:bold; color:#fff; opacity:0; text-shadow:0 2px 8px #000,0 0 16px currentColor; }
  #skillToast.show { animation:skillPop 1s ease-out; }
  @keyframes skillPop { 0%{opacity:0; transform:scale(.6);} 25%{opacity:1; transform:scale(1.1);} 70%{opacity:1; transform:scale(1);} 100%{opacity:0; transform:scale(1.05) translateY(-20px);} }
  .bullet { position:absolute; font-size:20px; pointer-events:none; z-index:6; }
  .attackSprite { position:absolute; z-index:8; pointer-events:none; width:92px; height:92px; object-fit:contain;
    transform:translate(-50%,-50%); filter:drop-shadow(0 0 9px currentColor) drop-shadow(0 7px 7px #0009); }
  .attackSprite.projectile { width:58px; height:58px; }
  .hitring { position:absolute; width:24px; height:24px; border:3px solid currentColor; border-radius:50%;
    pointer-events:none; z-index:6; animation:ringExp .42s ease-out forwards; }
  @keyframes ringExp { from{ opacity:.9; transform:scale(.3); } to{ opacity:0; transform:scale(2.6); } }
  @keyframes bshake { 0%,100%{transform:translate(0,0);} 20%{transform:translate(-5px,2px);} 40%{transform:translate(5px,-2px);} 60%{transform:translate(-4px,-1px);} 80%{transform:translate(4px,1px);} }

  #arena { flex:1; position:relative; display:flex; align-items:flex-end; justify-content:space-between; padding:0 26px 86px; z-index:3; }

  /* 플레이어 캐릭터 */
  #player { position:relative; display:flex; flex-direction:column; align-items:center; pointer-events:none; }
  #player .char { font-size:60px; transition:transform .12s ease-out; animation:bob 2.2s ease-in-out infinite;
    filter:drop-shadow(0 6px 6px #0007); }
  #player .char, #player .aura, #player .lvtag { display:none; }
  #player.atk .char { transform:translateX(44px) rotate(-14deg) scale(1.08) !important; animation:none; }
  #player.cast .char { transform:scale(1.35) !important; animation:none; filter:drop-shadow(0 6px 6px #0007) drop-shadow(0 0 22px var(--glow,#ffd866)) brightness(1.2); }
  #player.cast { z-index:7; }
  #player .aura { position:absolute; bottom:54px; left:50%; transform:translateX(-50%);
    width:80px; height:26px; border-radius:50%; filter:blur(7px); opacity:.85; z-index:-1; }
  .lvtag { margin-top:6px; font-size:11px; color:#ffd866; font-weight:bold; text-shadow:0 1px 2px #000; }
  #petCompanion { position:absolute; left:24.5%; top:38%; width:76px; height:76px; display:flex; align-items:flex-end; justify-content:center;
    font-size:58px; z-index:7; pointer-events:none; animation:bob 2s ease-in-out infinite; filter:drop-shadow(0 6px 6px #0008); }
  #petCompanion img { width:104px; height:104px; max-width:none; max-height:none; object-fit:contain; display:block; }
  #petCompanion.petCast { animation:petCast .36s ease-out; filter:drop-shadow(0 6px 6px #0008) drop-shadow(0 0 16px var(--petGlow,#ffd866)); }
  @keyframes petCast { 0%,100%{transform:translateY(0) scale(1);} 45%{transform:translateY(-9px) scale(1.14);} }
  .petProj { position:absolute; width:32px; height:32px; border-radius:50%; z-index:6; pointer-events:none;
    display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--petColor,#ffd866);
    background:radial-gradient(circle at 35% 30%, #fff, currentColor 34%, #ffffff00 72%);
    box-shadow:0 0 12px currentColor,0 0 24px currentColor; filter:drop-shadow(0 0 6px currentColor); }
  .petProj::after { content:''; position:absolute; right:22px; width:36px; height:8px; border-radius:999px;
    background:linear-gradient(90deg,transparent,currentColor); opacity:.75; filter:blur(2px); }

  /* 몬스터 */
  #enemy { position:relative; display:flex; flex-direction:column; align-items:center; }
  #monName { font-size:14px; font-weight:bold; text-shadow:0 1px 3px #000; }
  #hpbar { width:150px; height:12px; background:#2a2d50; border-radius:8px; margin-top:5px; overflow:hidden; border:1px solid #00000055; }
  #hpfill { height:100%; width:100%; background:linear-gradient(90deg,#ff5e7a,#ff3b5c); transition:width .12s; }
  #hptext { font-size:10px; color:#c9cdf0; margin-top:3px; text-shadow:0 1px 2px #000; }
  #monster { width:124px; height:124px; margin-top:8px; border-radius:0; display:flex; align-items:center; justify-content:center;
    font-size:70px; position:relative; transition:transform .08s, filter .08s;
    background:transparent; border:none; box-shadow:none;
    animation:bob 2.6s ease-in-out infinite; filter:drop-shadow(0 8px 6px #0007); }
  #monster::before { content:none; }
  #monster::after { content:''; position:absolute; left:20%; right:20%; bottom:10px; height:12px; border-radius:50%;
    background:#0008; filter:blur(7px); transform:translateY(20px); z-index:-2; }
  #monster img { width:128%; height:128%; object-fit:contain; display:block; transform:translateY(-6px);
    filter:drop-shadow(0 12px 10px #0009); pointer-events:none; }
  #monster.hit { transform:translateX(-14px) scale(.9) rotate(7deg) !important; animation:none;
    filter:drop-shadow(0 8px 6px #0007) brightness(2.2) saturate(.3); }
  #monster.boss { width:142px; height:142px; font-size:84px; background:transparent; border:none; box-shadow:none; }
  #monster.boss img { width:138%; height:138%; transform:translateY(-9px); filter:drop-shadow(0 14px 12px #000b) drop-shadow(0 0 14px #ff5e7a77); }
  #monster.dunBoss { width:190px; height:190px; margin-top:28px; overflow:visible; }
  #monster.dunBoss img { position:absolute; left:50%; top:0; width:182%; height:182%; transform:translate(-50%,-14px); }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  /* 이펙트 */
  .slash { position:absolute; font-size:44px; pointer-events:none; z-index:6; animation:slashAnim .35s ease-out forwards; }
  @keyframes slashAnim { 0%{opacity:0; transform:scale(.4) rotate(-45deg);} 40%{opacity:1; transform:scale(1.25) rotate(8deg);} 100%{opacity:0; transform:scale(1.5) rotate(28deg);} }
  .spark { position:absolute; width:6px; height:6px; border-radius:50%; background:#ffd866; pointer-events:none; z-index:6; box-shadow:0 0 6px #ffd866; }
  .dmg { position:absolute; font-weight:bold; font-size:20px; color:#ffe08a; pointer-events:none; z-index:7;
    text-shadow:0 2px 4px #000; animation:dmgFloat .7s ease-out forwards; }
  .dmg.crit { color:#ff7a95; font-size:30px; }
  @keyframes dmgFloat { 0%{opacity:1; transform:translateY(0) scale(1);} 30%{transform:translateY(-18px) scale(1.2);} 100%{opacity:0; transform:translateY(-66px) scale(1);} }
  .tapHitFx { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:54px; height:54px; pointer-events:none; z-index:9; color:#ffe08a; animation:tapHitPop .42s ease-out forwards; }
  .tapHitFx::before { content:'✦'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:38px; text-shadow:0 0 8px #fff1a8, 0 0 16px #ff8a00; }
  .tapHitFx::after { content:''; position:absolute; left:50%; top:50%; width:42px; height:42px;
    border:3px solid #ffe08a; border-radius:50%; transform:translate(-50%,-50%); box-shadow:0 0 12px #ffb74dcc; }
  @keyframes tapHitPop {
    0%{opacity:0; transform:translate(-50%,-50%) scale(.35) rotate(-18deg);}
    35%{opacity:1; transform:translate(-50%,-50%) scale(1.12) rotate(8deg);}
    100%{opacity:0; transform:translate(-50%,-50%) scale(1.75) rotate(24deg);}
  }

  /* 하단 영웅 파티 */
  #heroRow { position:absolute; left:5%; top:47%; width:29%; height:46%; z-index:5; pointer-events:none; }
  .heroSlot { position:absolute; width:76px; height:76px; display:flex; align-items:flex-end; justify-content:center;
    font-size:0; background:transparent!important; filter:drop-shadow(0 10px 9px #0009); transform-origin:50% 88%; }
  .heroSlot:nth-child(1){ left:0%; top:0%; }
  .heroSlot:nth-child(2){ left:0%; top:36%; }
  .heroSlot:nth-child(3){ left:0%; top:72%; }
  .heroSlot:nth-child(4){ left:60%; top:17%; }
  .heroSlot:nth-child(5){ left:60%; top:55%; }
  .heroSlot.empty { display:none; }
  .heroSlot .slotHeroImg { width:104px; height:104px; max-width:none; max-height:none; object-fit:contain; }
  .heroSlot .slotHeroEmoji { font-size:58px; line-height:1; }
  .heroSlot.atk { animation:heroSdAttack .32s ease-out; }
  .heroSlot.downed { filter:grayscale(1) brightness(.55) drop-shadow(0 8px 7px #0009); opacity:.72; }
  .heroSlot.hit { animation:heroHit .22s ease-out; }
  .heroHpMini { position:absolute; left:8px; right:8px; bottom:-3px; height:6px; border-radius:6px; overflow:hidden;
    background:#1a1c38cc; border:1px solid #0008; box-shadow:0 1px 4px #0009; }
  .heroHpMini i { display:block; height:100%; width:100%; background:linear-gradient(90deg,#3be38b,#b6ff6b); transition:width .18s; }
  @keyframes heroSdAttack {
    0%{ transform:translate(0,0) scale(1) rotate(0); }
    45%{ transform:translate(34px,-10px) scale(1.13) rotate(-4deg); }
    100%{ transform:translate(0,0) scale(1) rotate(0); }
  }
  @keyframes heroHit {
    0%,100%{ transform:translateX(0); }
    35%{ transform:translateX(-8px) rotate(-3deg); }
    70%{ transform:translateX(6px) rotate(2deg); }
  }

  /* 하단 탭 */
  #panel { height:230px; background:linear-gradient(180deg,#1c1e3a,#14152b); border-top:1px solid #343a66; overflow-x:hidden; overflow-y:auto; padding:11px; font-size:12px; }
  #tabs { display:flex; background:linear-gradient(180deg,#13142a,#0c0d1c); border-top:1px solid #2a2d50; min-height:46px; z-index:20; }
  .tab { flex:1; text-align:center; padding:11px 0 9px; font-size:12px; color:#9aa0d0; white-space:nowrap; position:relative; transition:color .15s; }
  .tab.active { color:#ffd866; font-weight:bold; }
  .tab.active::after { content:''; position:absolute; top:0; left:18%; right:18%; height:3px; border-radius:3px;
    background:linear-gradient(90deg,#ffd24a,#ff8a00); box-shadow:0 0 8px #ffb74d; }

  /* 카드 */
  .card { background:linear-gradient(160deg,#23264a,#181a32); border:1px solid #343a66; border-radius:13px;
    padding:11px; margin-bottom:9px; box-shadow:0 2px 8px #00000040, inset 0 1px 0 #ffffff0d; }
  .card .row { display:flex; align-items:center; gap:9px; }
  #panel .card .row { flex-wrap:wrap; }
  #panel .card .row .btn { white-space:normal; word-break:keep-all; line-height:1.25; }
  #panel .upgradeCard { overflow:visible; max-width:100%; }
  #panel .upgradeCard .row { flex-wrap:wrap; min-width:0; }
  #panel .upgradeCard .row > div:nth-child(2) { flex:1 1 150px; min-width:0; }
  #panel .upgradeCard .row .btn { flex:1 1 118px; min-width:118px; }
  #panel .huntPowerCard .row { align-items:flex-start; flex-wrap:nowrap; gap:8px; }
  #panel .huntPowerCard .powerInfo { flex:1 1 auto; min-width:0; padding-top:2px; }
  #panel .huntPowerCard .powerTitle { font-size:13px; font-weight:900; line-height:1.3; color:#fff; }
  #panel .huntPowerCard .powerDesc { margin-top:4px; line-height:1.45; overflow-wrap:anywhere; }
  #panel .huntPowerCard .upgradeBtns { flex:0 0 98px; display:flex; flex-direction:column; gap:5px; margin-left:auto; }
  #panel .huntPowerCard .upgradeBtns .btn { flex:0 0 auto; width:98px; min-width:0; padding:6px 7px; font-size:10.5px; white-space:nowrap; line-height:1.2; }
  #panel .specialUpgradeCard .row { align-items:flex-start; flex-wrap:nowrap; gap:8px; }
  #panel .specialUpgradeCard .specialBtns { flex:0 0 104px; display:flex; flex-direction:column; gap:5px; margin-left:auto; }
  #panel .specialUpgradeCard .specialBtns .btn { flex:0 0 auto; width:104px; min-width:0; padding:7px 8px; font-size:11px; white-space:nowrap; }
  #panel .gearUpgradeCard .row { align-items:flex-start; flex-wrap:nowrap; gap:8px; }
  #panel .gearUpgradeCard .gearInfo { flex:1 1 auto; min-width:0; padding-top:2px; }
  #panel .gearUpgradeCard .gearBtns { flex:0 0 104px; display:flex; flex-direction:column; gap:5px; margin-left:auto; }
  #panel .gearUpgradeCard .gearBtns .btn { flex:0 0 auto; width:104px; min-width:0; padding:7px 8px; font-size:11px; white-space:nowrap; }
  .huntHeroList { max-height:190px; overflow-y:auto; padding-right:3px; }
  .huntHeroList::-webkit-scrollbar { width:6px; }
  .huntHeroList::-webkit-scrollbar-thumb { background:#3a3f70; border-radius:4px; }
  .huntHeroItem { display:flex; align-items:center; gap:8px; padding:8px; margin-bottom:7px; border-radius:10px;
    background:linear-gradient(160deg,#23264a,#181a32); border:1px solid #343a66; }
  .huntHeroItem.on { border-color:#3be38b; box-shadow:0 0 10px #3be38b22; }
  .huntHeroItem .face { width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center;
    font-size:22px; flex-shrink:0; border:1px solid #ffffff66; }
  .huntHeroItem .meta { min-width:0; flex:1; }
  .huntHeroItem .name { font-size:12px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .partyPick { display:flex; gap:5px; flex-wrap:wrap; margin-top:7px; }
  .partyPick button { min-width:34px; padding:6px 8px; border-radius:8px; font-size:11px; }
  .heroStatGrid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px; margin-top:8px; }
  .heroStatCell { background:#10132699; border:1px solid #343a66; border-radius:9px; padding:7px; min-width:0; }
  .heroStatCell .label { font-size:10px; color:#9aa0d0; }
  .heroStatCell .value { margin-top:3px; font-size:13px; font-weight:900; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .skillDetail { margin-top:7px; padding:8px; border:1px solid #343a66; border-radius:10px; background:#10132699; }
  .skillDetail .name { font-size:12px; font-weight:900; }
  .skillDetail .desc { margin-top:4px; font-size:10px; color:#c9cdf0; line-height:1.45; }
  .statPanel { padding-bottom:18px; overflow-x:hidden; }
  .statSummary { border-color:#ffd86666; background:linear-gradient(160deg,#2b2a4a,#17182f); }
  .statSummary .caption { font-size:11px; color:#c9cdf0; line-height:1.45; word-break:keep-all; }
  .statSummary .total { font-size:25px; font-weight:900; color:#ffd866; margin:4px 0 2px; letter-spacing:0; }
  .statGridList { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px; }
  .statItem { min-width:0; background:linear-gradient(160deg,#23264a,#181a32); border:1px solid #343a66;
    border-radius:10px; padding:8px; overflow:hidden; }
  .statItem .statLabel { font-size:11px; color:#9aa0d0; font-weight:800; line-height:1.25; word-break:keep-all; }
  .statItem .statValue { margin-top:3px; font-size:14px; font-weight:900; color:#fff; line-height:1.3;
    overflow-wrap:anywhere; word-break:keep-all; }
  .statItem .statNote { margin-top:4px; font-size:10px; color:#b7bce8; line-height:1.45;
    overflow-wrap:anywhere; word-break:keep-all; }
  .statWide { grid-column:1 / -1; }
  .statHelp { line-height:1.55; word-break:keep-all; overflow-wrap:anywhere; }
  .statHeroList { display:flex; flex-direction:column; gap:7px; margin-bottom:10px; }
  .statHeroItem { min-width:0; display:flex; gap:8px; align-items:center; padding:8px;
    background:linear-gradient(160deg,#23264a,#181a32); border:1px solid #343a66; border-radius:10px; overflow:hidden; }
  .statHeroFace { width:46px; height:46px; flex:0 0 46px; display:flex; align-items:center; justify-content:center;
    border-radius:10px; border:1px solid #ffffff40; background:#101326; overflow:hidden; }
  .statHeroFace img { width:120%; height:120%; object-fit:contain; filter:drop-shadow(0 3px 4px #0008); }
  .statHeroMeta { flex:1; min-width:0; }
  .statHeroName { font-size:12px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .statHeroGrid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:5px; margin-top:6px; }
  .statHeroCell { min-width:0; padding:5px; border:1px solid #343a66; border-radius:8px; background:#10132699; }
  .statHeroCell .label { font-size:9px; color:#9aa0d0; font-weight:800; }
  .statHeroCell .value { margin-top:2px; font-size:11px; color:#fff; font-weight:900;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .statHeroNote { margin-top:5px; color:#9aa0d0; font-size:9.5px; line-height:1.35; word-break:keep-all; }

  /* 버튼 */
  .btn { background:linear-gradient(160deg,#5b73ff,#3b4fe0); color:#fff; border:none; padding:9px 13px; border-radius:10px;
    font-size:13px; font-weight:bold; box-shadow:0 3px 8px #2535a055, inset 0 1px 0 #ffffff33; transition:transform .08s, filter .15s; }
  .btn:active { transform:translateY(1px) scale(.98); }
  .btn:disabled { background:#2a2d50; color:#6b7099; box-shadow:none; }
  .btn.gold { background:linear-gradient(160deg,#ffc24a,#ff8a00); color:#3a2600; box-shadow:0 3px 8px #ff8a0055, inset 0 1px 0 #ffffff66; }

function storyBadge(){ return MAIN_STORY.filter(s=>s.script && G.stage>=s.stage && !(G.storyDone||[]).includes(s.ch)).length; }
function viewStory(){
  let h=`<div class="card small">스테이지를 돌파하면 메인 스토리가 열려요. <b>동료와의 유대</b>가 세계를 구하는 힘이 됩니다.</div>`;
  MAIN_STORY.forEach(s=>{
    const unlocked=G.stage>=s.stage, done=(G.storyDone||[]).includes(s.ch), ready=!!s.script&&unlocked;
    h+=`<div class="card" style="text-align:left;margin-bottom:8px;${unlocked?'':'opacity:.55'}">
      <div style="font-weight:bold">${unlocked?'📖':'🔒'} ${s.title} ${s.focus?`<span class="small" style="color:#ff8ab4">— ${s.focus} 편</span>`:''}</div>
      <div class="small">${unlocked? (s.script? (done?'✓ 시청 완료':(rewardText(s.reward)?'첫 시청 보상: '+rewardText(s.reward):'프롤로그')) : '🚧 다음 업데이트에서 공개') : '스테이지 '+s.stage+' 도달 시 해금'}</div>
      ${ready?`<button class="btn ${done?'':'gem'}" style="width:100%;margin-top:6px" onclick="playMainStory(${s.ch})">${done?'다시 보기':'▶ 재생'}</button>`:''}
    </div>`;
  });
  return h;
}
function playMainStory(ch){
  const s=MAIN_STORY.find(x=>x.ch===ch);
  if(!s || !s.script || G.stage<s.stage) return;
  playVN(s.script, ()=>{
    if(!G.storyDone) G.storyDone=[];
    const first=!G.storyDone.includes(ch);
    if(first){ G.storyDone.push(ch); grantReward(s.reward); saveGame(); }
    if(currentScreen==='story') renderScreen();
    if(first && rewardText(s.reward)) popReward('📖 '+s.title+' 완료', `<div style="font-weight:bold;font-size:18px">${rewardText(s.reward)}</div>`);
  }, s.focus||null, s.bg||null);
}
const HERO_NAME_MIGRATION = {
  리네아:'린', 비올라:'루비아', 세레스:'사피라', 아멜리아:'실비아',
  녹시아:'카이라', 루미엘:'카이론', 포레:'에메리아', 드라카:'카엘'
};
function normalizeHeroCatalog(){
  if(!Array.isArray(G.heroes)) G.heroes = [];
  G.heroes.forEach(h=>{
    if(HERO_NAME_MIGRATION[h.name]) h.name = HERO_NAME_MIGRATION[h.name];
    const base = HERO_POOL.find(x=>x.name===h.name) || HERO_POOL[0];
    h.name = base.name;
    h.emoji = base.emoji;
    h.cls = base.cls;
    if(!HERO_GRADE_ORDER.includes(h.grade)) h.grade = base.grade || 'SR';
    h.atk = h.atk || base.atk || 50;
    h.level = Math.max(1, Math.min(HERO_MAX_LEVEL, h.level||1));
    h.cap = Math.max(10, Math.min(HERO_MAX_LEVEL, h.cap||10));
    h.count = itemCount(h);
    if(h.level > h.cap) h.level = h.cap;
    if(!h.equip) h.equip = {무기:0};
    if(h.equip.무기 == null) h.equip.무기 = 0;
  });
  Object.entries(HERO_NAME_MIGRATION).forEach(([oldName,newName])=>{
    if(G.affinity && G.affinity[oldName] != null && G.affinity[newName] == null) G.affinity[newName] = G.affinity[oldName];
    if(G.talkDate && G.talkDate[oldName] != null && G.talkDate[newName] == null) G.talkDate[newName] = G.talkDate[oldName];
  });
}

const STAGE_KILLS_REQUIRED = 10;
function huntFieldInfo(stage=G.stage){
  let cur = HUNT_FIELDS[0];
  for(const f of HUNT_FIELDS){ if(stage>=f.stage) cur=f; }
  const idx = HUNT_FIELDS.indexOf(cur);
  const next = HUNT_FIELDS[idx+1] || null;
  const local = Math.max(0, stage - cur.stage);
  return { ...cur, level:idx+1, next, local };
}
function huntGoldMult(){
  const field = huntFieldInfo();
  const streak = Math.min(.30, Math.floor((G.huntStreak||0)/10) * .05);
  const guild = (typeof guildGoldBonus === 'function') ? guildGoldBonus() : 0;
  return 1 + field.gold + streak + guild;
}
function stageBossEvery(stage=G.stage){
  return 5;
}
function isBossStage(stage=G.stage){ return stage % stageBossEvery(stage) === 0; }
function stageKillGoal(stage=G.stage){ return STAGE_KILLS_REQUIRED; }
function stageGrowth(stage=G.stage){
  const field = huntFieldInfo(stage);
  return Math.pow(1.105, stage-1) * (1 + field.local*0.018);
}
function stageHpMax(stage=G.stage, kills=G.kills, boss=isBossStage(stage)){
  const field = huntFieldInfo(stage);
  const killRamp = 1 + kills*0.065;
  const bossMult = boss ? (stage>=160 ? 7.5 : stage>=80 ? 8.5 : 9.5) : 1;
  return Math.floor(78 * stageGrowth(stage) * field.hp * killRamp * bossMult);
}
function stageAtkValue(stage=G.stage, kills=G.kills, boss=isBossStage(stage)){
  const field = huntFieldInfo(stage);
  const killRamp = 1 + kills*0.035;
  const bossMult = boss ? (stage>=160 ? 2.55 : stage>=80 ? 2.75 : 3.0) : 1;
  return Math.floor((24 + Math.pow(stage, 1.08) * 7) * field.atk * killRamp * bossMult);
}
function stageGoldBase(stage=G.stage, boss=isBossStage(stage)){
  const field = huntFieldInfo(stage);
  return Math.floor((8 + stage*3.2 + Math.pow(stage, 1.35)) * (1 + field.gold) * (boss?8:1));
}
function stageExpReward(stage=G.stage, boss=isBossStage(stage)){
  const field = huntFieldInfo(stage);
  return Math.max(1, Math.floor(stage * field.exp * (boss ? 4.5 : 1)));
}

}

  const hasSprite = spawnAttackSprite(bh, x, y+5, cls.color, cls.name === "총기류");
  // 총기류는 플레이어 → 몬스터로 탄환이 날아감
  if(cls.name === "총기류" && !hasSprite){
    const bl = document.createElement('div'); bl.className='bullet'; bl.textContent='•';
    bl.style.left='22%'; bl.style.top='44%'; bl.style.color=cls.spark;
    bl.style.textShadow = `0 0 ${4+tier*3}px ${cls.spark}`;
    b.appendChild(bl);
    bl.animate([{left:'22%',opacity:1},{left:x+'%',opacity:1},{opacity:0}],{duration:160,easing:'linear'});
    setTimeout(()=>bl.remove(),170);
  }
  // 베기/타격 본체 (등급 높을수록 크고 빛남)
  if(!hasSprite){
    const s = document.createElement('div'); s.className='slash';
    s.textContent = crit ? cls.crit : cls.hit;
    s.style.left = x+'%'; s.style.top = y+'%';
    s.style.fontSize = (40 + tier*7) + 'px';
    s.style.textShadow = `0 0 ${6+tier*5}px ${gradeCol}, 0 0 ${tier*8}px ${cls.color}`;
    b.appendChild(s);
    setTimeout(()=>s.remove(), 350);
  }
  // 고등급(tier>=3): 충격 링
  if(tier>=3 || crit){
    const ring = document.createElement('div'); ring.className='hitring';
    ring.style.left=x+'%'; ring.style.top=(y+4)+'%'; ring.style.color=gradeCol;
    b.appendChild(ring); setTimeout(()=>ring.remove(),420);
  }
  // 스파크 파티클 (등급 높을수록 많이)
  const count = (crit?9:5) + tier*3;
  for(let i=0;i<count;i++){
    const p = document.createElement('div'); p.className='spark';
    p.style.left = x+'%'; p.style.top = (y+6)+'%';
    const col = (i%3===0 && tier>=2) ? gradeCol : cls.spark;
    p.style.background = col; p.style.boxShadow = '0 0 '+(6+tier*2)+'px '+col;
    p.style.width=p.style.height=(5+tier)+'px';
    b.appendChild(p);
    const ang = Math.random()*6.28, dist = 22 + tier*8 + Math.random()*34;
    p.animate([{transform:'translate(0,0)',opacity:1},
               {transform:`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist}px)`,opacity:0}],
              {duration:420,easing:'ease-out'});
    setTimeout(()=>p.remove(), 440);
  }
}

// ===== 전투 =====
function bestHero(){ return G.heroes.length ? G.heroes.reduce((a,b)=>heroEffAtk(b)>heroEffAtk(a)?b:a) : null; }
function activeCls(){ const b=bestHero(); return b?heroCls(b):CLASSES.sword; }
const combatSfxAt = {};
function combatSfx(name, gap=0, key=name){
  if(!battleVisible() || typeof sfx!=='function') return;
  const now = Date.now();
  if(gap && now - (combatSfxAt[key]||0) < gap) return;
  combatSfxAt[key] = now;
  sfx(name);
}

// isManual=true → 클릭 타격 (풀 데미지), false → 자동사냥 (자동 배수 적용)
function attack(isManual){
  let dmg = totalAtk() * (isManual ? tapMult() : autoMult()) * huntDamageMult();
  const crit = Math.random() < totalCritRate();
  if(crit) dmg *= totalCritDmgMult();
  dealDamage(dmg, crit);
  // 플레이어 돌진 모션
  const pl = document.getElementById('player');
  pl.classList.add('atk'); setTimeout(()=>pl.classList.remove('atk'),130);
  heroAttackMotion();
  const bh = bestHero();
  hitEffects(crit, bh ? heroCls(bh) : activeCls(), bh);
  combatSfx(crit ? 'crit' : 'hit', isManual ? 0 : 260, isManual ? 'manualAttack' : 'autoAttack');
}
function dealDamage(dmg, crit){
  if(livingPartyHeroes().length===0) return;
  monHp -= dmg;
  showDmg(dmg, crit);
  bumpCombo();
  const m = document.getElementById('monster');
  m.classList.add('hit'); setTimeout(()=>m.classList.remove('hit'),80);
  if(monHp <= 0) killMonster();
  updateHp();
}
function showHeroDmg(slotIndex, amount){
  const b = document.getElementById('battle');
  const d = document.createElement('div');
  d.className = 'dmg';
  d.style.color = '#ff9aad';
  d.style.fontSize = '15px';
  d.textContent = amount > 0 ? '-' + Math.ceil(amount).toLocaleString() : 'MISS';
  d.style.left = (15 + (slotIndex%2)*13) + '%';
  d.style.top = (45 + Math.floor(slotIndex/2)*12) + '%';
  b.appendChild(d);
  setTimeout(()=>d.remove(), 650);
}
function monsterAttack(){
  if(document.getElementById('home').style.display==='flex') return;
  if(document.getElementById('charView').style.display==='block') return;
  if(monHp<=0) return;
  const slots = partySlots();
  const living = slots.map((h,i)=>h?{h,i}:null).filter(x=>x && ensureHeroHp(x.h)>0);
  if(!living.length){ partyWipe(); return; }
  const frontLiving = living.filter(x=>x.i < 2);
  const candidates = monsterAttackType()==='melee' && frontLiving.length ? frontLiving : living;
  const target = candidates[Math.floor(Math.random()*candidates.length)];
  const raw = monsterAtk();
  if(Math.random() < petEvasionBonus()){
    showHeroDmg(target.i, 0);
    renderHeroRow();
    return;
  }
  const dmg = Math.max(1, Math.floor(raw * 100 / (100 + heroDef(target.h)) * petDamageTakenMult()));
  G.heroHp[target.h.uid] = Math.max(0, ensureHeroHp(target.h) - dmg);
  const el = document.querySelectorAll('#heroRow .heroSlot')[target.i];
  if(el){ el.classList.remove('hit'); void el.offsetWidth; el.classList.add('hit'); setTimeout(()=>el.classList.remove('hit'),220); }
  showHeroDmg(target.i, dmg);
  renderHeroRow();
  if(!slots.some(h=>h && ensureHeroHp(h)>0)) partyWipe();
}
function partyWipe(){
  G.wipeCount = (G.wipeCount||0) + 1;
  G.wallStage = G.stage;
  G.huntStreak = 0;
  const prev = Math.max(1, G.stage-1);
  if(G.stage>1){ G.stage = prev; G.kills = 0; }
  showToast(`전멸! 스테이지 ${G.stage} 반복 사냥`, '#ff8aa0', true);
  setTimeout(()=>showToast('강화하거나 소환상점에서 영웅을 늘려보세요', '#ffd866', true), 900);
  healPartyFull();
  spawnMonster();
  refreshTop();
  if(['hunt','hero','gacha','shop','gear'].includes(currentTab)) renderPanel();
}

// ===== 캐릭터별 시그니처 스킬 (코스튬 착용 시 발동) =====
// Hero skill catalog data is loaded from assets/data.
const heroSkillState = {};
function heroSkillPack(h){
  const cs = CHAR_SKILLS[h.name];
  if(cs) return cs;
  const cls = heroCls(h);
  return { color:cls.color, skills:[{name:cls.skill, fx:cls.skillFx, mult:cls.skillMult, desc:cls.name}] };
}
function heroSkillCooldown(h, sk){
  const rank = GRADE_RANK[h.grade] ?? 0;
  const gearSpd = (typeof heroGearStats==='function' ? heroGearStats(h).spd || 0 : 0);
  return Math.max(1800, ((8800 + (sk.mult||5)*180 - rank*650) * petCooldownMult()) / (1 + gearSpd/100));
}
function heroSkillPower(h){
  const partySize = Math.max(1, partyHeroes().length);
  return (heroEffAtk(h) + G.atk/partySize) * skinMult() * (1 + synergyInfo().bonus) * attrSynergyMult() * petSkillDmgMult() * petDamageMult();
}
function heroAttackType(h){
  const magic = ['mage','healer'];
  return magic.includes(h.cls) ? '마법' : '물리';
}
function heroCritRate(h){
  const gearCrit = (typeof heroGearStats==='function' ? heroGearStats(h).crit || 0 : 0);
  return Math.min(.95, (h.cls==='assassin' ? .20 : .10) + gearCrit + huntCritBonus());
}
function heroCritDmg(h){
  const gearCritDmg = (typeof heroGearStats==='function' ? heroGearStats(h).critDmg || 0 : 0);
  return ((h.cls==='assassin' ? 3.0 : 2.0) + gearCritDmg) * critDmgUpgradeMult();
}
function heroAttackSpeed(h){
  const base = {assassin:1.32, gunner:1.20, warrior:1.02, mage:.94, tanker:.86, healer:.90, knight:.96, sword:1.00, magic:.94, gun:1.16}[h.cls] || 1;
  const grade = 1 + (GRADE_RANK[h.grade]||0) * .035;
  const gearSpd = (typeof heroGearStats==='function' ? heroGearStats(h).spd || 0 : 0);
  return base * grade * petSpeedMult() * (1 + gearSpd/100);
}
function heroStatDetailHtml(hero){
  const data = charData(hero.name);
  const rows = [
    ['공격력', heroEffAtk(hero).toLocaleString()],
    ['체력', heroMaxHp(hero).toLocaleString()],

    ['공격속도', heroAttackSpeed(hero).toFixed(2)+'회/초'],
    ['속성', heroAttributes(hero).join(' / ') || '대지'],
    ['공격 타입', heroAttackType(hero)],

  ];
  return `<div class="card" style="border-color:${heroCls(hero).color}">

  </div>`;
}
function heroSkillDetailHtml(hero){
  const pack = heroSkillPack(hero);
  return `<div class="card" style="border-color:${pack.color}">
    <div style="font-weight:bold;margin-bottom:5px">스킬</div>
    ${pack.skills.map((sk,idx)=>`<div class="skillDetail">
      <div class="name" style="color:${pack.color}">${idx+1}. ${sk.fx||heroCls(hero).hit} ${sk.name}</div>
      <div class="desc">계수 x${sk.mult} · 쿨타임 ${(heroSkillCooldown(hero, sk)/1000).toFixed(1)}초<br>${sk.desc||'전용 전투 기술을 자동으로 발동합니다.'}</div>
    </div>`).join('')}
  </div>`;

function useSkill(){
  if(document.getElementById('home').style.display==='flex') return;
  if(document.getElementById('charView').style.display==='block') return;
  if(document.getElementById('screen').style.display==='flex') return;
  if(monHp<=0) return;
  const now = Date.now();
  const ready = livingPartyHeroes().filter(h=>{
    const st = heroSkillState[h.uid] || (heroSkillState[h.uid] = {idx:0, readyAt:now + Math.random()*1400});
    return now >= st.readyAt;
  });
  ready.forEach((h, order)=>setTimeout(()=>castHeroSkill(h), order*360));
}
function castHeroSkill(h){
  if(!h || ensureHeroHp(h)<=0 || monHp<=0) return;
  const pack = heroSkillPack(h);
  const st = heroSkillState[h.uid] || (heroSkillState[h.uid] = {idx:0, readyAt:0});
  const sk = pack.skills[st.idx % pack.skills.length];
  st.idx++;
  st.readyAt = Date.now() + heroSkillCooldown(h, sk);
  const crit = Math.random() < heroCritRate(h);
  const critMult = crit ? heroCritDmg(h) : 1;
  combatSfx(crit ? 'crit' : 'skill', 180, 'heroSkill');
  castSkill(`${crit?'CRIT ':''}${h.name} · ${sk.name}`, pack.color, sk.fx, sk.mult, false, heroSkillPower(h) * critMult, h);
}
function castSkill(name, color, fx, mult, multiHit, basePower, hero){
  const b = document.getElementById('battle');
  const pl = document.getElementById('player');
  // 컷씬: 암전 + 캐릭터 줌 + 섬광 + 스킬명
  vignette(true); pl.classList.add('cast'); screenFlash(color); showToast(name, color, true);
  for(let k=0;k<5;k++) setTimeout(()=>{
    const sx = 56+Math.random()*26, sy = 20+Math.random()*22;
    if(!spawnAttackSprite(hero, sx, sy, color, false, 0)){
      const f=document.createElement('div'); f.className='slash'; f.style.fontSize=(54+k*6)+'px';
      f.style.textShadow=`0 0 16px ${color}`;
      f.textContent=fx; f.style.left=sx+'%'; f.style.top=sy+'%';
      b.appendChild(f); setTimeout(()=>f.remove(),360);
    }
  }, k*70);
  const total = (basePower || totalAtk()) * mult * huntDamageMult();
  if(multiHit){ for(let i=0;i<6;i++) setTimeout(()=>dealDamage(total/6, true), i*60); }
  else { dealDamage(total*0.5, true); setTimeout(()=>dealDamage(total*0.5, true), 140); }
  setTimeout(()=>{ vignette(false); pl.classList.remove('cast'); }, 650);
}
function killMonster(){
  if(dunMode){ dunRaidEnd(true); return; }   // 던전 보스 처치 → 던전 클리어 처리(스테이지 진행 안 함)
  dailyInc('kill',1);
  G.huntStreak = (G.huntStreak||0) + 1;
  const reward = Math.floor(stageGoldBase(G.stage, isBoss) * petGoldMult() * huntGoldMult());
  G.gold += reward;
  if(isBoss){
    G.gem += 5;
    if(battleVisible()) showToast('👑 보스 보상 💎+5', '#ff8ab4', true);
  }
  G.exp += stageExpReward(G.stage, isBoss);
  // 처치 연출 (전투 화면을 보고 있을 때만 소리 — 홈/메뉴에선 자동전투 소리 누수 방지)
  if(battleVisible()) sfx(isBoss?'boss':'kill');
  monsterExplode();
  coinBurst(isBoss?12:6);
  if(isBoss) screenFlash('#ff5e7a');
  // 레벨업
  const prevLv = G.plv;
  while(G.exp >= G.plv*20){ G.exp -= G.plv*20; G.plv++; G.atk += 5; }
  if(G.plv>prevLv){
    if(battleVisible()) sfx('levelup');
    showToast('⭐ LEVEL UP! Lv.'+G.plv, '#ffd866', true);
    const ring=document.createElement('div'); ring.className='lvring';
    document.getElementById('battle').appendChild(ring); setTimeout(()=>ring.remove(),700);
  }
  G.kills++;
  partyHeroes().forEach(h=>{
    const gearHeal = typeof heroGearStats==='function' ? heroGearStats(h).heal || 0 : 0;
    G.heroHp[h.uid] = Math.min(heroMaxHp(h), ensureHeroHp(h) + (heroMaxHp(h)*0.14 + gearHeal) * petHealMult());
  });
  if(G.kills >= stageKillGoal()){
    G.kills = 0;
    G.stage++;
    healPartyFull();
    const field = huntFieldInfo();
    if(field.stage === G.stage) showToast(`${field.icon} ${field.name} 진입`, field.color, true);
    else if(!isBossStage(G.stage)) showToast('STAGE '+G.stage, '#7fd0ff');
  }
  spawnMonster();
  refreshTop();
  if(['gear','hero','hunt','gacha','shop'].includes(currentTab)) renderPanel();
}

// ===== 가챠 =====
function rollGrade(){
  const r = Math.random(); let acc=0;
  for(const g of GRADES){ acc+=g.rate; if(r<=acc) return g; }
  return GRADES[0];
}
const SR_GRADE = GRADES.find(g=>g.g==='SR');
const UR_GRADE = GRADES.find(g=>g.g==='UR');
// 천장 적용 등급 뽑기
function rollHeroGrade(){
  return rollGrade();
}
function ensureSummonState(){
  if(!G.summonPity) G.summonPity = {hero:G.pity||0, gear:0, pet:0};
  if(!G.selectTickets) G.selectTickets = {hero:0, gear:0, pet:0};
  if(!G.summonTotal) G.summonTotal = {hero:G.totalPulls||0, gear:0, pet:0};
  ['hero','gear','pet'].forEach(k=>{
    if(G.summonPity[k]==null) G.summonPity[k]=0;
    if(G.selectTickets[k]==null) G.selectTickets[k]=0;
    if(G.summonTotal[k]==null) G.summonTotal[k]=0;
  });
  if((G.summonTotal.hero||0) < (G.totalPulls||0)) G.summonTotal.hero = G.totalPulls||0;
  G.totalPulls = G.summonTotal.hero;
  G.pity = G.summonPity.hero;
}
function addSummonPity(kind, count){
  ensureSummonState();
  G.summonTotal[kind] += count;
  G.summonPity[kind] += count;
  let gained = 0;
  while(G.summonPity[kind] >= PITY_MAX){
    G.summonPity[kind] -= PITY_MAX;
    G.selectTickets[kind]++;
    gained++;
  }
  G.pity = G.summonPity.hero;
  G.totalPulls = G.summonTotal.hero;
  if(typeof refreshSummonShopCounters === 'function') refreshSummonShopCounters();
  return gained;
}
function pityLabel(kind){
  ensureSummonState();
  const name = {hero:'영웅', gear:'장비', pet:'펫'}[kind];
  return `${name} 선택소환 ${G.summonPity[kind]}/${PITY_MAX} · 선택권 ${G.selectTickets[kind]}장`;
}
function summonTotalLabel(kind){
  ensureSummonState();
  return (G.summonTotal[kind]||0).toLocaleString();
}
function playSummonSfx(count=1){
  if(typeof sfx!=='function') return;
  sfx('gacha');
  if(count>=11) setTimeout(()=>sfx('reward'), 300);
}
function makeHeroFromGrade(grade){
  const base = HERO_POOL[Math.floor(Math.random()*HERO_POOL.length)];
  return { uid:newHeroUid(), name:base.name, emoji:base.emoji, cls:base.cls, grade:grade.g, atk:grade.atk||base.atk||50, level:1, cap:10, count:1, equip:{무기:0} };
}
function itemCount(x){ return Math.max(1, Math.floor(Number(x?.count)||1)); }
function stackBadge(n){ return n>1 ? `<span style="display:inline-flex;align-items:center;justify-content:center;min-width:24px;padding:2px 7px;margin-left:4px;border-radius:999px;background:#0f1020;border:1px solid #ffd86688;color:#ffd866;font-size:11px;font-weight:900">x${n}</span>` : ''; }
function heroStackKey(h){
  const e = h?.equip || {};
  if(!h || heroLevel(h)!==1 || heroCap(h)!==10 || (e.무기||0) || h.gearUid) return '';
  return `${h.name}|${h.grade}|${h.cls}|${h.atk||50}`;
}
function petStackKey(p){
  if(!p || petLevel(p)!==1 || petCap(p)!==10) return '';
  return `${p.name}|${p.grade}|${p.buff}|${p.img||''}`;
}
function totalHeroCopies(){ return G.heroes.reduce((s,h)=>s+itemCount(h),0); }
function totalPetCopies(){ return G.pets.reduce((s,p)=>s+itemCount(p),0); }
function normalizeStacks(){
  const heroSeen = new Map();
  const heroUidMap = new Map();
  const mergedHeroes = [];
  (G.heroes||[]).forEach(h=>{
    h.count = itemCount(h);
    const key = heroStackKey(h);
    if(key && heroSeen.has(key)){
      const keep = heroSeen.get(key);
      keep.count = itemCount(keep) + itemCount(h);
      heroUidMap.set(h.uid, keep.uid);
      if(G.heroHp && G.heroHp[h.uid]!=null) delete G.heroHp[h.uid];
    } else {
      if(key) heroSeen.set(key, h);
      mergedHeroes.push(h);
    }
  });
  G.heroes = mergedHeroes;
  if(Array.isArray(G.party)){
    const used = new Set();
    G.party = G.party.slice(0,5).map(id=>{
      const mapped = heroUidMap.get(id) || id;
      if(!mapped || used.has(mapped)) return null;
      used.add(mapped);
      return G.heroes.some(h=>h.uid===mapped) ? mapped : null;
    });
    while(G.party.length<5) G.party.push(null);
  }
  const petSeen = new Map();
  const mergedPets = [];
  let activePetObj = G.pets?.[G.activePet] || null;
  (G.pets||[]).forEach(p=>{
    p.count = itemCount(p);
    const key = petStackKey(p);
    if(key && petSeen.has(key)){
      const keep = petSeen.get(key);
      keep.count = itemCount(keep) + itemCount(p);
      if(activePetObj === p) activePetObj = keep;
    } else {
      if(key) petSeen.set(key, p);
      mergedPets.push(p);
    }
  });
  G.pets = mergedPets;
  G.activePet = activePetObj ? G.pets.indexOf(activePetObj) : (G.pets.length ? Math.min(Math.max(G.activePet||0,0), G.pets.length-1) : -1);
  const gearSeen = new Map();
  const gearUidMap = new Map();
  const mergedGears = [];
  let activeGearObj = G.gears?.[G.activeGear] || null;
  (G.gears||[]).forEach(g=>{
    if(!g.uid) g.uid = newGearUid();
    g.count = itemCount(g);
    const key = typeof gearStackKey === 'function' ? gearStackKey(g) : '';
    if(key && gearSeen.has(key)){
      const keep = gearSeen.get(key);
      keep.count = itemCount(keep) + itemCount(g);
      gearUidMap.set(g.uid, keep.uid);
      if(activeGearObj === g) activeGearObj = keep;
    } else {
      if(key) gearSeen.set(key, g);
      mergedGears.push(g);
    }
  });
  G.gears = mergedGears;
  (G.heroes||[]).forEach(h=>{
    if(h.gearUid && gearUidMap.has(h.gearUid)) h.gearUid = gearUidMap.get(h.gearUid);
    const gear = G.gears.find(g=>g.uid===h.gearUid);
    if(h.gearUid && !gearCompatibleHero(gear, h)) h.gearUid = '';
  });
  G.activeGear = activeGearObj ? G.gears.indexOf(activeGearObj) : (G.gears.length ? Math.min(Math.max(G.activeGear||0,0), G.gears.length-1) : -1);
}
function addPet(pet){
  pet.count = itemCount(pet);
  const key = petStackKey(pet);
  const existing = key ? G.pets.find(p=>petStackKey(p)===key) : null;
  if(existing){
    existing.count = itemCount(existing) + itemCount(pet);
    return existing;
  }
  G.pets.push(pet);
  return pet;
}
function addHero(hero){
  if(!hero.uid) hero.uid = newHeroUid();
  hero.count = itemCount(hero);
  const key = heroStackKey(hero);
  const existing = key ? G.heroes.find(h=>heroStackKey(h)===key) : null;
  if(existing){
    existing.count = itemCount(existing) + itemCount(hero);
    return existing;
  }
  ensureHeroHp(hero);
  G.heroes.push(hero);
  G.heroes.sort((a,b)=>heroEffAtk(b)-heroEffAtk(a)); // 강한 순 정렬(상위 5명이 파티)
  if(!Array.isArray(G.party)) G.party = [];
  while(G.party.length<5) G.party.push(null);
  const emptySlot = G.party.findIndex(id=>!id);
  if(emptySlot>=0) G.party[emptySlot] = hero.uid;
  return hero;
}
function ensureGearState(){
  if(!Array.isArray(G.gears)) G.gears = [];
  if(G.gearDust==null) G.gearDust = 0;
  G.gears.forEach(g=>{
    if(!g.uid) g.uid = newGearUid();
    const base = gearBase(g.id);
    if(base){
      ['name','type','variant','img','role','desc','atk','hp','def','spd','crit','critDmg','heal'].forEach(k=>{ if(g[k]==null) g[k]=base[k]; });
      g.crit = base.crit;
    }
    if(!HERO_GRADE_ORDER.includes(g.grade)) g.grade = base?.grade || 'N';
    g.level = Math.max(1, Math.min(HERO_MAX_LEVEL, g.level||1));
    g.cap = Math.max(10, Math.min(HERO_MAX_LEVEL, g.cap||10));
    g.count = itemCount(g);
  });
  if(!G.gears.length){
    const starter = makeGearFromBase(GEAR_POOL.find(g=>g.grade==='N' && g.type==='sword' && g.variant===1) || GEAR_POOL[0], 'N');
    starter.level = Math.max(1, Math.min(10, (G.gear?.무기||0) + 1));
    G.gears.push(starter);
    G.activeGear = 0;
  }
  if(G.activeGear==null || G.activeGear<0 || G.activeGear>=G.gears.length) G.activeGear = G.gears.length ? 0 : -1;
  (G.heroes||[]).forEach(h=>{
    if(!h.gearUid) h.gearUid = '';
    const gear = G.gears.find(g=>g.uid===h.gearUid);
    if(h.gearUid && !gearCompatibleHero(gear, h)) h.gearUid = '';
  });
  for(let i=0; i<(G.heroes||[]).length; i++){
    const hero = G.heroes[i];
    if(hero && hero.gearUid && itemCount(hero)>1) splitHeroStack(i);
  }
  if(G.gears.length && !(G.heroes||[]).some(h=>h.gearUid)){
    const starter = G.gears[G.activeGear] || G.gears[0];
    const hero = (G.heroes||[]).find(h=>gearCompatibleHero(starter,h));
    if(hero) hero.gearUid = starter.uid;
  }
  normalizeStacks();
}
function clonePlain(obj){ return JSON.parse(JSON.stringify(obj)); }
function splitHeroStack(i){
  const hero = G.heroes[i];
  if(!hero || itemCount(hero)<=1) return i;
  const count = itemCount(hero);
  const isPlaced = Array.isArray(G.party) && G.party.includes(hero.uid);
  const hasGear = !!hero.gearUid || !!(hero.equip && hero.equip.무기);
  if(isPlaced || hasGear){
    const rest = clonePlain(hero);
    rest.uid = newHeroUid();
    rest.count = count - 1;
    rest.gearUid = '';
    hero.count = 1;
    G.heroes.splice(i+1, 0, rest);
    ensureHeroHp(hero);
    return i;
  }
  hero.count = count - 1;
  const one = clonePlain(hero);
  one.uid = newHeroUid();
  one.count = 1;
  one.gearUid = '';
  G.heroes.splice(i+1, 0, one);
  ensureHeroHp(one);
  if(heroDetailIdx===i) heroDetailIdx = i+1;
  if(selectedCharHeroIdx===i) selectedCharHeroIdx = i+1;
  return i+1;
}
function splitPetStack(i){
  const pet = G.pets[i];
  if(!pet || itemCount(pet)<=1) return i;
  pet.count = itemCount(pet) - 1;
  const one = clonePlain(pet);
  one.count = 1;
  G.pets.splice(i+1, 0, one);
  if(G.activePet===i) G.activePet = i+1;
  else if(G.activePet>i) G.activePet++;
  if(selectedCharPetIdx===i) selectedCharPetIdx = i+1;
  return i+1;
}

// ===== 요일던전 =====
function normalizeDungeonState(){
  if(!G.dungeon) G.dungeon = { date:'', left:DUNGEON_DAILY_LIMIT, limit:DUNGEON_DAILY_LIMIT, clearedToday:[], best:{} };
  if(!Array.isArray(G.dungeon.clearedToday)) G.dungeon.clearedToday = [];
  if(!G.dungeon.best) G.dungeon.best = {};
  if(G.dungeon.limit !== DUNGEON_DAILY_LIMIT){
    const oldLimit = G.dungeon.limit || 2;
    const bonusLeft = Math.max(0, DUNGEON_DAILY_LIMIT - oldLimit);
    G.dungeon.left = (G.dungeon.left ?? 0) + bonusLeft;
    G.dungeon.limit = DUNGEON_DAILY_LIMIT;
  }
  G.dungeon.left = Math.min(DUNGEON_DAILY_LIMIT, Math.max(0, G.dungeon.left ?? DUNGEON_DAILY_LIMIT));
}
function dungeonReset(){
  normalizeDungeonState();
  if(G.dungeon.date!==todayStr()){
    G.dungeon.date=todayStr();
    G.dungeon.left=DUNGEON_DAILY_LIMIT;
    G.dungeon.limit=DUNGEON_DAILY_LIMIT;
    G.dungeon.clearedToday=[];
  }
}
function dungeonBaseAmt(){ return 3 + Math.floor(G.stage/5); }
function dungeonRotationIndex(){
  const start = new Date(new Date().getFullYear(), 0, 1);
  const now = new Date();
  const dayNo = Math.floor((new Date(now.getFullYear(), now.getMonth(), now.getDate()) - start) / 86400000);
  return ((dayNo % WEEKDAY_DUNGEON.length) + WEEKDAY_DUNGEON.length) % WEEKDAY_DUNGEON.length;
}
function dungeonToday(){ return WEEKDAY_DUNGEON[dungeonRotationIndex()]; }
function dungeonGoldBase(){ return Math.floor(stageGoldBase(G.stage, false) * 5); }
function dungeonElemOf(mat){ return DUN_ELEMENT[mat] || '대지'; }
function dungeonRunKey(tierId, mat){ return `${tierId}:${mat}`; }
function dungeonFirstClearReady(tierId, mat){ dungeonReset(); return !G.dungeon.clearedToday.includes(dungeonRunKey(tierId, mat)); }
function dungeonCanSweep(tierId, mat){ normalizeDungeonState(); return !!G.dungeon.best[dungeonRunKey(tierId, mat)]; }
function markDungeonClear(tierId, mat){
  dungeonReset();
  const key = dungeonRunKey(tierId, mat);
  if(!G.dungeon.clearedToday.includes(key)) G.dungeon.clearedToday.push(key);
  G.dungeon.best[key] = { date:todayStr(), stage:G.stage, power:totalAtk() };
}
function dunMatchupMultForAttr(elem){
  let mult = 1;
  partyHeroes().forEach(h=>{
    const a = (heroAttributes(h)[0]) || '대지';
    if(ATTRIBUTE_ADVANTAGE[a] === elem) mult += 0.15;
    else if(ATTRIBUTE_ADVANTAGE[elem] === a) mult -= 0.10;
  });
  return Math.max(0.4, mult);
}
function dunMatchupInfoForAttr(elem){
  const strong=[], weak=[];
  partyHeroes().forEach(h=>{
    const a = (heroAttributes(h)[0]) || '대지';
    if(ATTRIBUTE_ADVANTAGE[a] === elem) strong.push(h.name);
    else if(ATTRIBUTE_ADVANTAGE[elem] === a) weak.push(h.name);
  });
  return { mult:dunMatchupMultForAttr(elem), strong, weak };
}
function dungeonBossHpForTier(t){
  const cfg = DUN_CFG[t.id] || DUN_CFG.normal;
  const hitPerSec = 1000 / autoInterval();
  const baseDps = Math.max(1, totalAtk()) * autoMult() * hitPerSec;
  return Math.max(200, Math.round(baseDps * cfg.hpSec));
}
function dungeonForecast(t, mat){
  const cfg = DUN_CFG[t.id] || DUN_CFG.normal;
  const elem = dungeonElemOf(mat);
  const hp = dungeonBossHpForTier(t);
  const hitPerSec = 1000 / autoInterval();
  const damage = totalAtk() * autoMult() * hitPerSec * cfg.sec * dunMatchupMultForAttr(elem);
  const ratio = damage / Math.max(1, hp);
  const label = ratio>=1.35 ? '여유' : ratio>=1 ? '도전 가능' : ratio>=0.75 ? '아슬아슬' : '위험';
  const color = ratio>=1.35 ? '#7be38b' : ratio>=1 ? '#ffd866' : ratio>=0.75 ? '#ffb74d' : '#ff7a95';
  return { hp, ratio, label, color };
}
function dungeonRewardPreview(t, mat, includeFirst){
  const base = dungeonBaseAmt();
  const gold = dungeonGoldBase()*t.goldMul;
  let matAmt = base*t.matMul;
  let first = '';
  if(includeFirst && t.first){
    matAmt += t.first.mat || 0;
    const bits = [];
    if(t.first.mat) bits.push(`${materialIcon(mat)}+${t.first.mat}`);
    if(t.first.gem) bits.push(`💎+${t.first.gem}`);
    if(t.first.heroDust) bits.push(`${HERO_DUST_ICON}+${t.first.heroDust}`);
    first = bits.length ? ` · 첫 클리어 ${bits.join(' ')}` : '';
  }
  let drops = `${materialLabel(mat)} +${matAmt} · <span class="goldIcon"></span>${gold.toLocaleString()}`;
  if(t.bonus){
    if(t.bonus.dust) drops += ` · ${HERO_DUST_ICON}영웅결정 +${t.bonus.dust}`;
    if(t.bonus.gem) drops += ` · 💎${t.bonus.gem} (${Math.round(t.bonus.gemChance*100)}%)`;
  }
  return drops + first;
}
function rollDungeonReward(t, mat, includeFirst){
  const reward = { mat:{[mat]:dungeonBaseAmt()*t.matMul}, gold:dungeonGoldBase()*t.goldMul };
  const result = { gotGem:false, gotDust:false, first:includeFirst };
  if(includeFirst && t.first){
    if(t.first.mat) reward.mat[mat] += t.first.mat;
    if(t.first.gem){ reward.gem = (reward.gem||0) + t.first.gem; result.gotGem = true; }
    if(t.first.heroDust){ reward.heroDust = (reward.heroDust||0) + t.first.heroDust; result.gotDust = true; }
  }
  if(t.bonus){
    if(t.bonus.dust){ reward.heroDust = (reward.heroDust||0) + t.bonus.dust; result.gotDust = true; }
    if(t.bonus.gem && Math.random()<t.bonus.gemChance){ reward.gem = (reward.gem||0) + t.bonus.gem; result.gotGem = true; }
  }
  return { reward, result };
}

    <h3 style="margin-top:6px">오늘의 던전 선택</h3>`;
  todayMats.forEach(matKey=>{
    const mat = MATERIALS[matKey], elem = dungeonElemOf(matKey), match = dunMatchupInfoForAttr(elem);
    const pct = Math.round((match.mult-1)*100);
    const matchTxt = match.strong.length ? `<span style="color:#7be38b">우세 +${pct}%</span> ${match.strong.join(', ')}`
      : match.weak.length ? `<span style="color:#ff7a95">불리 ${pct}%</span> ${match.weak.join(', ')}`
      : `<span style="color:#9aa0d0">상성 영향 없음</span>`;
    h += `<div class="card dunSceneCard" style="border-color:#8b6fd655;text-align:left;${dungeonSceneBgStyle(matKey)}">
      <div class="row" style="align-items:center;margin-bottom:6px">
        ${dungeonBossPreviewHtml(matKey)}
        <div style="flex:1"><b>${mat.name} 던전</b><div class="small">속성 ${elem} · 파티 상성: ${matchTxt}</div></div>
      </div>`;
    DUNGEON_TIERS.forEach(t=>{
      const unlocked = G.stage>=t.stage, canEnter = unlocked && G.dungeon.left>0;
      const first = dungeonFirstClearReady(t.id, matKey);
      const forecast = dungeonForecast(t, matKey);
      const drops = dungeonRewardPreview(t, matKey, first);
      const canSweep = unlocked && G.dungeon.left>0 && dungeonCanSweep(t.id, matKey);
      h += `<div style="padding:8px 0;border-top:1px solid #343a66">
        <div class="row" style="align-items:center">
          <div style="font-size:22px">${t.emoji}</div>
          <div style="flex:1">
            <div style="font-weight:bold;color:${t.color}">${t.name} <span class="small" style="color:#9aa0d0">· ${t.desc}</span></div>
            <div class="small" style="margin-top:3px">${unlocked? drops : `🔒 스테이지 <b>${t.stage}</b> 도달 시 해금`}</div>
            ${unlocked?`<div class="small" style="margin-top:3px">보스 HP ${forecast.hp.toLocaleString()} · 예상 <b style="color:${forecast.color}">${forecast.label}</b>${first?' · 오늘 첫 클리어 보너스 대기':''}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;gap:5px">
            <button class="btn ${t.id==='normal'?'gold':'gem'}" onclick="enterDungeon('${t.id}','${matKey}')" ${canEnter?'':'disabled'}>${unlocked?'⚔️ 입장':'잠금'}</button>
            <button class="btn" onclick="sweepDungeon('${t.id}','${matKey}')" ${canSweep?'':'disabled'}>⏩ 소탕</button>
          </div>
        </div>
      </div>`;
    });
    h += `</div>`;
  });
  if(G.dungeon.left<=0) h += `<div class="card small">오늘 입장 횟수를 모두 썼어요. 내일 다시 도전해 보세요!</div>`;
  h += `<div class="card small">💡 재료는 영웅 속성별 <b>10레벨 초월</b>과 <b>등급업</b>에 사용돼요. 보유 재료는 🎒가방에서 확인!</div>`;
  return h;
}

function makeBackupCode(){ try{ return btoa(unescape(encodeURIComponent(JSON.stringify(G)))); }catch(e){ return ''; } }
function showBackupCode(){
  const code = makeBackupCode();
  document.getElementById('backupArea').innerHTML =
    `<div class="card"><div class="small" style="margin-bottom:6px;text-align:left">아래 코드를 길게 눌러 전체 복사해서 안전한 곳에 보관하세요.</div>
     <textarea readonly onclick="this.select()" style="width:100%;height:90px;border-radius:10px;border:1px solid #4a5090;background:#0f1020;color:#cfc8f5;font-size:11px;padding:8px;word-break:break-all">${code}</textarea>
     <button class="btn gem" style="width:100%;margin-top:8px" onclick="copyBackup(this,\`${code}\`)">📋 복사하기</button></div>`;
}
function copyBackup(btn, code){
  const done=()=>{ btn.textContent='✓ 복사됨!'; setTimeout(()=>btn.textContent='📋 복사하기',1500); };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(code).then(done, done); }
  else done();
}
function showRestoreBox(){
  document.getElementById('backupArea').innerHTML =
    `<div class="card"><div class="small" style="margin-bottom:6px;text-align:left">백업 코드를 붙여넣고 복구하세요. <b style="color:#ff8ab4">현재 진행도는 덮어쓰여집니다.</b></div>
     <textarea id="restoreInput" placeholder="백업 코드 붙여넣기" style="width:100%;height:90px;border-radius:10px;border:1px solid #4a5090;background:#0f1020;color:#fff;font-size:11px;padding:8px"></textarea>
     <button class="btn gold" style="width:100%;margin-top:8px" onclick="restoreBackup()">📥 이 코드로 복구</button></div>`;
}
function restoreBackup(){
  const v=(document.getElementById('restoreInput').value||'').trim();
  if(!v){ alert('백업 코드를 붙여넣어 주세요.'); return; }
  let data;
  try{ data = JSON.parse(decodeURIComponent(escape(atob(v)))); }catch(e){ alert('백업 코드가 올바르지 않아요. 다시 확인해 주세요.'); return; }
  if(!data || typeof data!=='object' || data.plv==null){ alert('백업 코드가 올바르지 않아요.'); return; }
  if(!confirm('현재 진행도를 백업 데이터로 덮어쓸까요? 되돌릴 수 없어요.')) return;
  localStorage.setItem('idleRPG', JSON.stringify(data));
  location.reload();
}
function enterDungeon(tierId, matKey){
  dungeonReset();
  if(G.dungeon.left<=0) return;
  const t = dungeonTier(tierId);
  const todayMats = dungeonToday().mats || [dungeonToday().mat];
  if(!todayMats.includes(matKey)) return;
  if(G.stage < t.stage) return;   // 미해금 난이도 차단
  if(livingPartyHeroes().length===0){ alert('전투할 동료가 없어요! 파티를 편성해 주세요.'); return; }
  G.dungeon.left--; dailyInc('dungeon',1); saveGame();
  closePopup();
  startDunRaid(t, matKey);
}
function sweepDungeon(tierId, matKey){
  dungeonReset();
  if(G.dungeon.left<=0) return;
  const t = dungeonTier(tierId);
  const todayMats = dungeonToday().mats || [dungeonToday().mat];
  if(!todayMats.includes(matKey)) return;
  if(G.stage < t.stage || !dungeonCanSweep(tierId, matKey)) return;
  const first = dungeonFirstClearReady(t.id, matKey);
  G.dungeon.left--;
  dailyInc('dungeon',1);
  markDungeonClear(t.id, matKey);
  const rolled = rollDungeonReward(t, matKey, first);
  grantReward(rolled.reward);
  saveGame();
  if(currentScreen==='dungeon') renderScreen();
  popReward('⏩ 던전 소탕 완료', dungeonRewardPopupBody(t, matKey, rolled.reward, rolled.result, `${MATERIALS[matKey].name} ${t.name} 던전 소탕 완료!`));
}
// ===== 요일던전 전투 — 실제 사냥터 화면에서 파티가 싸운다 + 속성 상성 가중치 =====
// 던전 속성 vs 파티 속성: 내 캐릭이 던전 속성을 상성으로 누르면 데미지↑, 반대면↓ (dunMatchupMult → huntDamageMult)
const DUN_ELEMENT = { chaos:'번개', steel:'대지', nature:'자연', fire:'화염', water:'물/얼음', wind:'바람', light:'빛', dark:'암흑' };
const DUN_BG = {
  fire:'assets/bg/dungeon/dungeon_fire.png',
  nature:'assets/bg/dungeon/dungeon_nature.png',
  water:'assets/bg/dungeon/dungeon_water.png',
  chaos:'assets/bg/dungeon/dungeon_chaos.png',
  wind:'assets/bg/dungeon/dungeon_wind.png',
  light:'assets/bg/dungeon/dungeon_light.png',
  dark:'assets/bg/dungeon/dungeon_dark.png',
  steel:'assets/bg/dungeon/dungeon_steel.png',
};
function setBattleBg(url){
  const b = document.getElementById('battle');
  if(!b) return;
  b.style.backgroundImage = `url('${url}${AV}')`;
  b.style.backgroundPosition = 'center';
  b.style.backgroundSize = 'cover';
}
function setHuntBg(){ setBattleBg('assets/bg/hunt_field_20260610_inpaint.png'); }
function setDungeonBg(matKey){ setBattleBg(DUN_BG[matKey] || DUN_BG.chaos); }
const DUN_CFG = {
  normal:{sec:12, hpSec:10},
  elite:{sec:13, hpSec:34},
  hell:{sec:12, hpSec:120},
};
let dunMode = null, dunTimer = null;
// 던전 속성 가중치: 파티원이 던전 속성을 상성으로 누르면 +, 던전 속성에 약하면 -
function dunMatchupMult(){
  if(!dunMode) return 1;
  return dunMatchupMultForAttr(dunMode.attr);
}
function dunMatchupInfo(){
  if(!dunMode) return {mult:1, strong:[], weak:[]};
  return dunMatchupInfoForAttr(dunMode.attr);
}
function startDunRaid(t, matKey){
  const cfg = DUN_CFG[t.id] || DUN_CFG.normal;
  const elem = dungeonElemOf(matKey);
  // 보스 체력: 자동 공격 기준 처치목표 시간만큼 (상성에 따라 실제 처치속도가 달라져 클리어/실패가 갈림)
  const hpMax = dungeonBossHpForTier(t);
  dunMode = { tier:t, mat:matKey, attr:elem, time:cfg.sec, total:cfg.sec, ended:false };
  enterHunt();              // 실제 사냥터 화면으로 전환
  setDungeonBg(matKey);
  healPartyFull();
  spawnDunBoss(hpMax, elem, t);
  showDunBanner();
  clearInterval(dunTimer);
  dunTimer = setInterval(dunRaidTick, 100);
}
function spawnDunBoss(hpMax, elem, t){
  monHpMax = hpMax; monHp = hpMax; isBoss = true;
  const mEl = document.getElementById('monster'), nEl = document.getElementById('monName');
  renderMonsterArt(mEl, dungeonBossArt(dunMode?.mat || 'chaos'));
  mEl.classList.add('boss','dunBoss'); nEl.classList.add('bossName');
  nEl.textContent = `${t.emoji} ${t.name} 던전 보스 · ${elem}`;
  updateHp(); renderHeroRow();
}
function showDunBanner(){
  const b = document.getElementById('dunBanner'); if(!b || !dunMode) return;
  const info = dunMatchupInfo();
  const pct = Math.round((info.mult-1)*100);
  const matchTxt = info.strong.length ? `<span style="color:#7be38b">상성 우세 +${pct}%</span> (${info.strong.join(', ')})`
                 : info.weak.length ? `<span style="color:#ff7a95">상성 불리 ${pct}%</span> (${info.weak.join(', ')})`
                 : `<span style="color:#9aa0d0">상성 영향 없음</span>`;
  b.querySelector('#dunBannerTop').innerHTML =
    `${dunMode.tier.emoji} ${dunMode.tier.name} 던전 · 속성 <b style="color:#ffd866">${dunMode.attr}</b> · ${matchTxt}`;
  b.classList.add('show');
  updateDunTimer();
}
function updateDunTimer(){
  const f = document.getElementById('dunTimerFill2'), tx = document.getElementById('dunTimerText2');
  if(!dunMode) return;
  if(f) f.style.width = Math.max(0, dunMode.time/dunMode.total*100)+'%';
  if(tx) tx.textContent = '⏱ '+dunMode.time.toFixed(1)+'초';
}
function dunRaidTick(){
  if(!dunMode || dunMode.ended) return;
  dunMode.time -= 0.1;
  if(dunMode.time <= 0){ dunMode.time = 0; updateDunTimer(); dunRaidEnd(false); return; }
  updateDunTimer();
}
function dunRaidEnd(win){
  if(!dunMode || dunMode.ended) return;
  dunMode.ended = true;
  clearInterval(dunTimer); dunTimer = null;
  const t = dunMode.tier, mat = dunMode.mat;
  document.getElementById('dunBanner').classList.remove('show');
  dunMode = null;
  spawnMonster();           // 일반 사냥 몬스터로 복구
  setHuntBg();
  openScreen('dungeon');    // 요일던전 화면으로 복귀
  if(win){
    sfx(t.id==='hell'?'boss':'kill');
    const first = dungeonFirstClearReady(t.id, mat);
    markDungeonClear(t.id, mat);
    const rolled = rollDungeonReward(t, mat, first);
    grantReward(rolled.reward); saveGame();
    if(currentScreen==='dungeon') renderScreen();

// ===== 퀘스트 (챕터/스테이지 마일스톤) =====
function questList(){
  const out=[]; const maxMile = Math.max(50, Math.floor(G.stage/5)*5 + 10);
  for(let s=5; s<=maxMile; s+=5){
    out.push({ id:'stage'+s, name:`스테이지 ${s} 돌파`, need:s,
      reward: s%10===0 ? {gem:50+s} : {gold:1000*s} });
  }
  return out;
}
function viewQuest(){
  let h = `<div class="card small">방치형 챕터를 진행할수록 보상을 받아요. (현재 스테이지 <b>${G.stage}</b>)</div>`;
  questList().forEach(q=>{
    const done = G.stage>=q.need, claimed = G.questClaimed.includes(q.id);
    h += `<div class="card" style="${claimed?'opacity:.5':''}"><div class="row">
      <div style="flex:1"><div style="font-weight:bold">${q.name}</div><div class="small">보상: ${rewardText(q.reward)}</div></div>
      <button class="btn ${done&&!claimed?'gem':''}" onclick="claimQuest('${q.id}')" ${(!done||claimed)?'disabled':''}>${claimed?'완료':(done?'받기':'진행중')}</button>
    </div></div>`;
  });
  return h;
}
function claimQuest(id){
  if(G.questClaimed.includes(id)) return;
  const q = questList().find(x=>x.id===id); if(!q||G.stage<q.need) return;
  G.questClaimed.push(id); grantReward(q.reward); renderScreen();
  popReward('📜 퀘스트 완료!', `<div style="font-size:18px;font-weight:bold">${rewardText(q.reward)}</div>`);
}

// ===== 업적 =====
function viewAchieve(){

function claimAch(id){

// ===== AFK 방치 보상 =====
let pendingOffline = null;
function offlineRewardCheck(){
  if(!G.lastSeen){ return; }                      // 첫 실행이면 스킵
  const elapsed = Math.min(43200, Math.floor((Date.now()-G.lastSeen)/1000)); // 최대 12시간
  if(elapsed < 60) return;                         // 1분 미만이면 스킵
  const kills = Math.floor(elapsed/3);             // 약 3초당 1처치 가정
  const gold = Math.floor(stageGoldBase(G.stage, false) * huntGoldMult() * petGoldMult() * kills * 0.35);
  pendingOffline = { elapsed, gold };
}
function fmtDur(sec){ const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60); return (h?h+'시간 ':'')+m+'분'; }
function showOfflinePopup(){
  const o = pendingOffline; if(!o) return;
  document.querySelector('#popup>button').style.display='none';
  document.getElementById('popTitle').textContent = '💤 방치 보상';
  document.getElementById('popContent').innerHTML =
     `<div class="small">${fmtDur(o.elapsed)} 동안 자리를 비웠어요</div>
     <div style="font-size:30px;margin:8px 0">💤</div>
     <div style="font-weight:bold"><span class="goldIcon"></span>${o.gold.toLocaleString()}</div>
     <div style="display:flex;gap:8px;margin-top:14px">
       <button class="btn" style="flex:1" onclick="claimOffline(1)">받기</button>
       <button class="btn gem" style="flex:1" onclick="claimOfflineAd()">📺 2배 받기</button>
     </div>`;
  document.getElementById('overlay').style.display='flex';
}
function claimOffline(mult){
  const o = pendingOffline; if(!o) return;
  pendingOffline = null;
  G.gold += o.gold*mult;
  document.getElementById('overlay').style.display='none';
  document.querySelector('#popup>button').style.display='';
  refreshTop();
}
function claimOfflineAd(){
  if(G.adPass){ claimOffline(2); return; }
  showAdWatching(()=>claimOffline(2));
}

// ===== 일일 출석 =====
function attendClaimable(){ return G.attend.last !== todayStr(); }
function viewAttend(){
  const slot = G.attend.day % 7;       // 오늘 받을 칸
  let h = `<div class="card small">매일 접속하고 보상을 받으세요! (연속 ${G.attend.day}일째)</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">`;
  ATTEND_REWARDS.forEach((r,i)=>{
    const claimedThis = i < slot || (G.attend.day>0 && i<slot);
    const isToday = i===slot && attendClaimable();
    const past = i<slot;
    h += `<div class="card" style="text-align:center;margin:0;padding:8px;${isToday?'border-color:#ffd866':past?'opacity:.45':''}">
      <div class="small">${i+1}일</div>
      <div style="font-size:20px;margin:2px 0">${r.gem?'💎':'<span class="goldIcon"></span>'}</div>
      <div class="small">${r.gem?r.gem:r.gold.toLocaleString()}</div>
      ${isToday?'<div style="font-size:10px;color:#ffd866">오늘</div>':past?'<div style="font-size:10px;color:#3be38b">✓</div>':''}
    </div>`;
  });
  h += `</div>
    <button class="btn gem" style="width:100%;margin-top:12px" onclick="claimAttend()" ${attendClaimable()?'':'disabled'}>${attendClaimable()?'📅 오늘 보상 받기':'오늘은 이미 받음 — 내일 또!'}</button>`;
  return h;
}
function claimAttend(){
  if(!attendClaimable()) return;
  const r = ATTEND_REWARDS[G.attend.day % 7];
  grantReward(r);
  G.attend.day++; G.attend.last = todayStr();
  renderScreen();
  popReward('📅 출석 완료!', `<div style="font-size:18px;font-weight:bold">${rewardText(r)}</div><div class="small">연속 ${G.attend.day}일째</div>`);
}

// ===== 비주얼노벨 대화 시스템 (미연시 UI: 타자기/AUTO/SKIP/LOG/두근두근) =====
let vnScript=null, vnIdx=0, vnEnd=null, vnChar=null;
let vnTypeTimer=null, vnTyping=false, vnFullText='', vnAuto=false, vnAutoTimer=null, vnLogArr=[];
function playVN(script, onEnd, charName, bg){
  vnScript=script.slice(); vnIdx=0; vnEnd=onEnd||null; vnChar=charName||null; vnLastWho=null; vnLogArr=[];
  vnAuto=false; updateAutoBtn();
  const p=document.getElementById('vnPortrait');
  p.innerHTML=''; p.style.opacity=0; p.classList.remove('art','dim','enter');
  setVNBg(bg||null);
  document.getElementById('vnLog').style.display='none';
  document.getElementById('vn').style.display='flex';
  vnStep();
}
// VN 배경 — 이미지가 있으면 어둡게 깔고, 없으면 기본 그라데이션
function setVNBg(url){
  const el=document.getElementById('vnBg');
  if(url) el.style.backgroundImage=`linear-gradient(180deg, rgba(10,8,24,.35), rgba(10,8,24,.12) 45%, rgba(10,8,24,.55)), url('${url}${AV}')`;
  else el.style.backgroundImage='';
}
function vnStep(){
  if(!vnScript || vnIdx>=vnScript.length){ closeVN(); const f=vnEnd; vnEnd=null; if(f) f(); return; }
  const node=vnScript[vnIdx];
  if(node.choice){ renderVNChoice(node.choice); }
  else showVNLine(node);
}
function vnNext(){
  if(!vnScript) return;
  if(document.getElementById('vnLog').style.display==='flex') return;
  if(vnTyping){ finishTyping(); return; }   // 타이핑 중 탭 → 전문 즉시 표시
  const node=vnScript[vnIdx];
  if(node && node.choice) return;   // 선택지는 골라야 진행
  vnIdx++; vnStep();
}
function vnChoose(i){
  const node = vnScript && vnScript[vnIdx];
  if(!node || !node.choice) return;
  const c = node.choice[i];
  if(!c) return;
  if(c.aff && vnChar) addAffinity(vnChar, c.aff);
  if(c.then) vnScript.splice(vnIdx+1, 0, ...[].concat(c.then));  // 선택에 대한 반응 대사 삽입
  vnIdx++; vnStep();
}
let vnLastWho = null;
function vnEmoji(who){ return (HERO_POOL.find(x=>x.name===who)||{}).emoji||'❓'; }
function showVNLine(node){
  const who=node.who||'';
  const txt=(node.text||'').replace(/\{이름\}/g, pName());   // 닉네임 치환
  const portrait=document.getElementById('vnPortrait');
  const nameEl=document.getElementById('vnNamePlate');
  document.getElementById('vnChoices').innerHTML='';
  const isChar = who!=='' && who!=='나' && who!=='???';   // 일러를 띄우는 화자인가
  if(isChar){
    nameEl.style.display='block'; nameEl.textContent=who; nameEl.style.background='';
    portrait.style.opacity=1; portrait.classList.remove('dim'); portrait.classList.add('art');
    const emo=vnEmoji(who);
    portrait.innerHTML=`<img src="${charArt(who)+AV}" onerror="this.parentElement.classList.remove('art');this.parentElement.textContent='${emo}'">`;
    // 화자가 바뀌면 등장 애니메이션
    if(who!==vnLastWho){ portrait.classList.remove('enter'); void portrait.offsetWidth; portrait.classList.add('enter'); }
    vnLastWho=who;
  } else {
    // 미연시 문법: 주인공('나')·내레이션·정체불명 화자는 일러를 띄우지 않는다.
    // 직전 미소녀는 화면에 남기고 어둡게 (아직 아무도 안 나왔으면 빈 화면)
    if(portrait.querySelector('img')) portrait.classList.add('dim');
    else { portrait.style.opacity=0; portrait.textContent=''; }
    if(who==='나'){
      nameEl.style.display='block'; nameEl.textContent=pName();   // 닉네임으로 표시
      nameEl.style.background='linear-gradient(90deg,#1c4f7a,#2a7ab8 72%, transparent)';
    } else if(who){   // ??? 등 정체불명 화자
      nameEl.style.display='block'; nameEl.textContent=who;
      nameEl.style.background='linear-gradient(90deg,#222230,#3a3a55 72%, transparent)';
    } else nameEl.style.display='none';
  }
  if(node.bg) setVNBg(node.bg);   // 컷 단위 배경 전환
  vnLogArr.push({who:(who==='나'?pName():who), text:txt});
  // 두근두근 연출: heart 플래그 또는 💗/두근 포함 대사 → 핑크 글로우 + 하트 파티클
  const box=document.getElementById('vnBox');
  if(node.heart || /💗|두근/.test(txt)){ box.classList.add('heartGlow'); spawnVNHearts(); if(typeof sfx==='function') sfx('heart'); }
  else box.classList.remove('heartGlow');
  if(node.shake){ const v=document.getElementById('vn'); v.classList.remove('shake'); void v.offsetWidth; v.classList.add('shake'); }
  typeText(txt);
}
// 타자기 효과
function typeText(text){
  clearTimeout(vnTypeTimer); vnFullText=text; vnTyping=true;
  const el=document.getElementById('vnText');
  document.getElementById('vnNext').style.display='none';
  let i=0;
  (function tick(){
    if(i>=text.length){ finishTyping(); return; }
    i++;
    el.innerHTML=vnEsc(text.slice(0,i))+'<span class="twCursor">▌</span>';
    vnTypeTimer=setTimeout(tick, 26);
  })();
}
function finishTyping(){
  clearTimeout(vnTypeTimer); vnTyping=false;
  document.getElementById('vnText').textContent=vnFullText;
  document.getElementById('vnNext').style.display='block';
  if(vnAuto) scheduleAuto();
}
function vnEsc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
// AUTO / SKIP / LOG
function vnToggleAuto(){ vnAuto=!vnAuto; updateAutoBtn(); if(vnAuto && !vnTyping) scheduleAuto(); else if(!vnAuto) clearTimeout(vnAutoTimer); }
function updateAutoBtn(){ const b=document.getElementById('vnAutoBtn'); if(b) b.classList.toggle('on', vnAuto); }
function scheduleAuto(){
  clearTimeout(vnAutoTimer);
  vnAutoTimer=setTimeout(()=>{
    if(vnAuto && vnScript && !vnTyping){ const n=vnScript[vnIdx]; if(!(n&&n.choice)){ vnIdx++; vnStep(); } }
  }, 1500);
}
function vnSkip(){
  if(!vnScript) return;
  const cur=vnScript[vnIdx];
  if(cur && cur.choice) return;   // 선택지에서는 스킵 불가
  clearTimeout(vnTypeTimer); vnTyping=false;
  vnIdx++;
  while(vnIdx<vnScript.length && !vnScript[vnIdx].choice){ const n=vnScript[vnIdx]; vnLogArr.push({who:(n.who==='나'?pName():(n.who||'')), text:(n.text||'').replace(/\{이름\}/g, pName())}); vnIdx++; }
  if(vnIdx>=vnScript.length){ closeVN(); const f=vnEnd; vnEnd=null; if(f) f(); return; }
  vnStep();   // 선택지에서 멈춤
}
function vnShowLog(){
  const list=document.getElementById('vnLogList');
  list.innerHTML = vnLogArr.map(l=>`<div class="vnLogItem">${l.who?`<b>${vnEsc(l.who)}</b>`:''}${vnEsc(l.text)}</div>`).join('') || '<div class="small">아직 기록이 없어요.</div>';
  document.getElementById('vnLog').style.display='flex';
  list.scrollTop=list.scrollHeight;
}
function spawnVNHearts(){
  const v=document.getElementById('vn');
  for(let i=0;i<7;i++){
    const h=document.createElement('div'); h.className='vnHeart'; h.textContent=['💗','💕','💓'][i%3];
    h.style.left=(28+Math.random()*44)+'%';
    h.style.bottom=(170+Math.random()*70)+'px';
    h.style.animationDelay=(Math.random()*0.55)+'s';
    v.appendChild(h); setTimeout(()=>h.remove(), 2400);
  }
}
function renderVNChoice(choices){
  clearTimeout(vnTypeTimer); vnTyping=false;
  document.getElementById('vnNext').style.display='none';
  const el=document.getElementById('vnChoices'); el.innerHTML='';
  document.getElementById('vnText').textContent='— 어떻게 할까? —';
  choices.forEach((c,i)=>{
    const b=document.createElement('button'); b.className='vnChoice'; b.textContent='💬 '+c.text;
    b.onclick=(ev)=>{ ev.stopPropagation(); vnChoose(i); };
    el.appendChild(b);
  });
}
function closeVN(){
  clearTimeout(vnTypeTimer); clearTimeout(vnAutoTimer); vnAuto=false; vnTyping=false;
  document.getElementById('vn').style.display='none'; vnScript=null; setVNBg(null);
}

// ===== 교감 / 호감도 =====

function talkChar(name){
  const c=charData(name); const aff=G.affinity[name]||0;
  // 호감도 70 이상이면 심쿵 대사 풀로 전환 (두근두근 모드)
  const pool=(aff>=70 && CHAR_TALK_HIGH[name]) ? CHAR_TALK_HIGH[name] : c.talk;
  const line=pool[Math.floor(Math.random()*pool.length)];

function gradeColorOf(g){ return {N:'#9ca3af',R:'#60a5fa',SR:'#c084fc',SSR:'#fbbf24',UR:'#ff8df0'}[g]; }
function randomPetByGrade(grade){
  const pool = PET_POOL.filter(p=>p.grade===grade) || [];
  const use = pool.length ? pool : PET_POOL;
  return use[Math.floor(Math.random()*use.length)];
}
function makePetFromBase(base, grade){
  return {
    name:base.name, emoji:base.emoji, buff:base.buff, grade:grade||base.grade||'N',
    img:base.img||'', stats:base.stats||'', skill:base.skill||'', level:1, cap:10, count:1
  };
}
function petLevel(p){ return Math.max(1, Math.min(HERO_MAX_LEVEL, p.level||1)); }
function petCap(p){ return Math.max(10, Math.min(HERO_MAX_LEVEL, p.cap||10)); }
function petAscCount(p){ return Math.max(0, Math.floor(petCap(p)/10)-1); }
function petGradeMult(p){ return HERO_GRADE_MULT[p.grade] || 1; }
function petAttackPower(p){ return Math.round((80 + petLevel(p)*18 + petAscCount(p)*160) * petGradeMult(p)); }
function petPower(p){ return petAttackPower(p); }
function petLevelCost(p){ return Math.floor(120 * Math.pow(petLevel(p), 1.38) * petGradeMult(p)); }
function petTransCost(p){
  const gradeUp = petLevel(p)>=HERO_MAX_LEVEL && p.grade!=='UR';
  const dust = gradeUp ? (p.grade==='SR'?70:p.grade==='SSR'?140:45) : (5 + petCap(p));
  return { dust, gold:Math.floor(petLevelCost(p) * (gradeUp?9:4)), gradeUp };
}
function petDismantleReward(p){
  const base = PET_DUST_BY_GRADE[p.grade] || 1;
  return Math.max(1, Math.floor(base + petLevel(p)*0.35 + petAscCount(p)*base*0.45));
}
function petIsMaxed(p){ return p.grade==='UR' && petLevel(p)>=HERO_MAX_LEVEL && petCap(p)>=HERO_MAX_LEVEL; }
function orderedPetEntries(){
  return G.pets.map((pet,i)=>({pet,i})).sort((a,b)=>{
    const aa = a.i===G.activePet ? 0 : 1;
    const ba = b.i===G.activePet ? 0 : 1;
    if(aa!==ba) return aa-ba;
    const al = petLevel(a.pet), bl = petLevel(b.pet);
    if(al!==bl) return bl-al;
    const ag = GRADE_RANK[a.pet.grade] ?? 0, bg = GRADE_RANK[b.pet.grade] ?? 0;
    if(ag!==bg) return bg-ag;
    return petPower(b.pet)-petPower(a.pet);
  });
}

function summonPetShop(count=1){
  const cost = count===11 ? 2000 : 200;
  if(G.gem<cost){ alert('💎 보석이 부족해요!'); return; }
  G.gem-=cost;
  playSummonSfx(count);
  const got=[];
  for(let i=0;i<count;i++){
    const grade=rollGrade();
    const pet=makePetFromBase(randomPetByGrade(grade.g), grade.g);
    got.push(pet);
  }
  if(count===11 && !got.some(p=>GRADE_RANK[p.grade]>=GRADE_RANK.SR)){
    const idx = Math.floor(Math.random()*got.length);
    const pet = makePetFromBase(randomPetByGrade('SR'), 'SR');
    got[idx] = pet;
  }
  got.forEach(addPet);
  addSummonPity('pet', count);
  if(G.activePet<0) G.activePet=0;
  refreshTop(); updatePet();
  if(currentScreen) renderScreen(); else renderPanel();
  showSummonAnim(got, 'pet');
  showPityToast('pet');
}

function refreshPetViews(mode='panel'){
  refreshTop(); updatePet();
  if(mode==='char'){
    const keepIdx = selectedCharPetIdx;
    if(G.pets[keepIdx] && typeof renderCharPetDetail === 'function') renderCharPetDetail(keepIdx);
    else renderCharPet();
  }
  else if(currentScreen==='pet') renderScreen();
  else renderPanel();
}
function upPetLevel(i, mode='panel'){
  const p = G.pets[i]; if(!p || petIsMaxed(p)) return;
  const lv = petLevel(p), cap = petCap(p);
  if(lv>=cap) return;
  const cost = petLevelCost(p);
  if(G.gold<cost) return;
  i = splitPetStack(i);
  const target = G.pets[i]; if(!target) return;
  G.gold -= cost;
  target.level = lv + 1;
  refreshPetViews(mode);
}
function transcendPet(i, mode='panel'){
  const p = G.pets[i]; if(!p || petIsMaxed(p)) return;
  const lv = petLevel(p), cap = petCap(p);
  if(lv < cap) return;
  const tr = petTransCost(p);
  if((G.petDust||0) < tr.dust || G.gold < tr.gold) return;
  i = splitPetStack(i);
  const target = G.pets[i]; if(!target) return;
  G.petDust -= tr.dust;
  G.gold -= tr.gold;
  if(cap >= HERO_MAX_LEVEL && target.grade !== 'UR'){
    target.grade = target.grade === 'SR' ? 'SSR' : target.grade === 'SSR' ? 'UR' : target.grade === 'R' ? 'SR' : 'R';
    target.level = 1;
    target.cap = 10;
  } else {
    target.cap = Math.min(HERO_MAX_LEVEL, cap + 10);
  }
  refreshPetViews(mode);
}
function dismantlePet(i, mode='panel'){
  const p = G.pets[i]; if(!p) return;
  const reward = petDismantleReward(p);
  const count = itemCount(p);
  if(!confirm(`[${p.grade}] ${p.name} 펫 1개를 분해할까요?\n\n보유: ${count}개\n획득: ${PET_DUST_ICON} 펫 결정 ${reward}개`)) return;
  G.petDust = (G.petDust||0) + reward;
  if(count>1){
    p.count = count - 1;
  } else {
    G.pets.splice(i,1);
    if(G.activePet === i) G.activePet = G.pets.length ? 0 : -1;
    else if(G.activePet > i) G.activePet--;
  }
  selectedCharPetIdx = Math.max(0, Math.min(selectedCharPetIdx, G.pets.length-1));
  refreshPetViews(mode);
  popReward('🐾 펫 분해 완료', `<div style="font-size:42px">${PET_DUST_ICON}</div><div style="font-weight:bold">펫 결정 +${reward}</div>`);
}

  if(g.joined==null) g.joined = false;
  if(g.coin==null) g.coin = 0;
  if(!g.lastCheck) g.lastCheck = '';

}
