function joinGuild(){
  ensureGuildState();
  if(G.guild.joined) return;
  G.guild.joined = true; G.guild.exp += 100; grantReward({gem:500}); renderScreen();
  popReward('🏛️ 길드 가입 완료!', `<div style="font-weight:bold">여명의 동맹에 합류했어요!</div><div class="small">공격력 +10% · 💎 500</div>`);
}
function guildCheck(){
  ensureGuildState();
  if(G.guild.lastCheck===todayStr()) return;
  G.guild.lastCheck=todayStr(); G.guild.coin+=20; G.guild.exp+=60;
  grantReward({gold:Math.floor(stageGoldBase(G.stage, false) * (22 + Math.round(guildGoldBonus()*100)))});
  renderScreen();
  popReward('🏛️ 길드 출석', `<div style="font-weight:bold">🛡️ 길드코인 +20</div><div class="small">길드 경험치 +60</div>`);
}
function guildResearchCost(type){
  ensureGuildState();
  const lv = type==='gold' ? G.guild.researchGold : G.guild.researchAtk;
  return 80 + lv * 45;
}
function upgradeGuildResearch(type){
  ensureGuildState();
  const cost = guildResearchCost(type);
  if(G.guild.coin < cost) return;
  G.guild.coin -= cost;
  if(type==='gold') G.guild.researchGold++;
  else G.guild.researchAtk++;
  G.guild.exp += 80;
  refreshTop(); renderScreen();
}
function claimGuildQuest(id){
  ensureGuildState();
  if(!G.guild.joined || G.guild.quests[id]) return;
  if(id==='hunt'){
    G.guild.quests[id] = true;
    G.guild.coin += 18;
    G.guild.exp += 50;
    grantReward({gold:Math.floor(stageGoldBase(G.stage, false) * 18)});
  } else if(id==='donate'){
    const cost = Math.floor(stageGoldBase(G.stage, false) * 16);
    if(G.gold < cost){ alert('골드가 부족해요.'); return; }
    G.gold -= cost;
    G.guild.quests[id] = true;
    G.guild.coin += 30;
    G.guild.exp += 120;
    refreshTop();
  } else if(id==='boss'){
    if((G.guild.bossDamage||0) <= 0){ alert('먼저 길드 보스를 한 번 토벌해보세요.'); return; }
    G.guild.quests[id] = true;
    G.guild.coin += 24;
    G.guild.exp += 70;
    refreshTop();
  }
  renderScreen();
  popReward('📜 길드 의뢰 완료', `<div style="font-weight:bold">🛡️ 길드코인을 획득했어요</div>`);
}
function attackGuildBoss(){
  ensureGuildState();
  if(!G.guild.joined) return;
  if(G.guild.bossDate !== todayStr()){
    G.guild.bossDate = todayStr();
    G.guild.bossDamage = 0;
  }
  const dmg = Math.max(1, Math.floor(totalAtk() * (8 + guildLevel() * 0.8)));
  G.guild.bossDamage = Math.min(guildBossHp(), (G.guild.bossDamage||0) + dmg);
  G.guild.exp += 20;
  if(typeof sfx==='function') sfx('boss');
  refreshTop(); renderScreen();
  showToast(`길드 보스 피해 ${dmg.toLocaleString()}`, '#ffd866', true);
}
function claimGuildBossReward(){
  ensureGuildState();
  if(!guildBossRewardReady() || G.guild.bossClaimed === todayStr()) return;
  G.guild.bossClaimed = todayStr();
  G.guild.coin += 70;
  G.guild.exp += 160;
  grantReward({gem:80, gold:Math.floor(stageGoldBase(G.stage, true) * 55)});
  renderScreen();
  popReward('👑 길드 보스 토벌', `<div style="font-weight:bold">💎80 · 🛡️70 획득</div><div class="small">길드 경험치 +160</div>`);
}
function buyGuildShop(id){
  ensureGuildState();
  const item = GUILD_SHOP.find(x=>x.id===id);
  if(!item || G.guild.shopBought[id] || G.guild.coin < item.cost) return;
  G.guild.coin -= item.cost;
  G.guild.shopBought[id] = true;
  const reward = typeof item.reward === 'function' ? item.reward() : item.reward;
  grantReward(reward);
  renderScreen();
  popReward('🛡️ 길드 상점', `<div style="font-weight:bold">${item.title} 구매 완료</div><div class="small">${rewardText(reward)}</div>`);
}
function petProjectileStyle(p){
  const text = `${p.name||''} ${p.stats||''} ${p.skill||''}`;
  if(/화염|불|용암|폭발|화상/.test(text)) return {fx:'🔥', color:'#ff6b3d'};
  if(/빙결|얼음|아이스|서리/.test(text)) return {fx:'❄️', color:'#7fd0ff'};
  if(/번개|전격|천둥|감전/.test(text)) return {fx:'⚡', color:'#ffe66b'};
  if(/자연|숲|꽃|생명|바람|질풍/.test(text)) return {fx:'✦', color:'#7ee889'};
  if(/암흑|심연|유령|사신|저주|그림자/.test(text)) return {fx:'◆', color:'#c084fc'};
  if(/빛|신성|성기사|천상/.test(text)) return {fx:'✦', color:'#fff0a8'};
  if(/대지|암석|골렘|가이아/.test(text)) return {fx:'●', color:'#c9a25a'};
  if(/물|아쿠아|해달/.test(text)) return {fx:'💧', color:'#5fd0ff'};
  const byBuff = {
    atk:{fx:'✦', color:'#ffcf66'}, crit:{fx:'◆', color:'#ff8ab4'}, gold:{fx:'●', color:'#ffd866'},
    hp:{fx:'✚', color:'#3be38b'}, def:{fx:'●', color:'#9fb0ff'}, heal:{fx:'✚', color:'#8fffc1'},
    speed:{fx:'⚡', color:'#ffe66b'}, magic:{fx:'◆', color:'#c084fc'}, skill:{fx:'✦', color:'#9fe9ff'}
  };
  return byBuff[p.buff] || {fx:'✦', color:'#ffd866'};
}
function petAttack(){
  const p=activePet(); if(!p) return;
  if(document.getElementById('home').style.display==='flex') return; // 홈에선 패스
  const b=document.getElementById('battle');
  const petEl = document.getElementById('petCompanion');
  const shot = petProjectileStyle(p);
  if(petEl){
    petEl.style.setProperty('--petGlow', shot.color);
    petEl.classList.remove('petCast'); void petEl.offsetWidth; petEl.classList.add('petCast');
  }
  const proj=document.createElement('div');
  proj.className='petProj';
  proj.textContent=shot.fx;
  proj.style.setProperty('--petColor', shot.color);
  proj.style.left='28%'; proj.style.top='50%';
  b.appendChild(proj);
  proj.animate([
    {left:'28%',top:'50%',opacity:0,transform:'scale(.55) rotate(0deg)'},
    {left:'38%',top:'47%',opacity:1,transform:'scale(1.05) rotate(80deg)'},
    {left:'68%',top:'38%',opacity:1,transform:'scale(.88) rotate(220deg)'},
    {left:'71%',top:'36%',opacity:0,transform:'scale(1.35) rotate(280deg)'}
  ],{duration:430,easing:'cubic-bezier(.2,.8,.2,1)'});
  setTimeout(()=>{ proj.remove(); dealDamage(petAttackPower(p)*huntDamageMult(), false); }, 410);
}

  const tabs = document.getElementById('tabs');

  const homeOpen = document.getElementById('home')?.style.display === 'flex';
  const charOpen = document.getElementById('charView')?.style.display === 'block';
  const screenOpen = document.getElementById('screen')?.style.display === 'flex';

  else if(currentTab==='gear') p.innerHTML = viewGear();

function upHunt(type, amount=1){
  if(type==='tap'){
    if(G.tapPower>=HUNT_MAX_LEVEL) return;
    const pack = huntCostMany(45, G.tapPower, HUNT_MAX_LEVEL, amount);
    if(pack.n<=0 || G.gold<pack.total) return;
    G.gold-=pack.total; G.tapPower += pack.n;
  } else if(type==='power'){
    if(G.autoPower>=HUNT_MAX_LEVEL) return;
    const pack = huntCostMany(55, G.autoPower, HUNT_MAX_LEVEL, amount);
    if(pack.n<=0 || G.gold<pack.total) return;
    G.gold-=pack.total; G.autoPower += pack.n;
  } else if(type==='speed'){
    if(G.autoSpeed>=SPEED_MAX_LEVEL) return;
    const pack = huntCostMany(70, G.autoSpeed, SPEED_MAX_LEVEL, amount);
    if(pack.n<=0 || G.gold<pack.total) return;
    G.gold-=pack.total; G.autoSpeed += pack.n;
    restartAuto();  // 속도 바뀌면 타이머 재시작
  } else if(['crit','critDmg','boss','attr'].includes(type)){
    const keyMap = {crit:'critChance', critDmg:'critDmgPower', boss:'bossPower', attr:'attrPower'};
    const key = keyMap[type];
    if(!G[key]) G[key] = 1;
    if(G[key]>=SPECIAL_MAX_LEVEL) return;
    const pack = specialCostMany(G[key], SPECIAL_MAX_LEVEL, amount);
    if(pack.n<=0 || G.gem<pack.total) return;
    G.gem-=pack.total; G[key] += pack.n;
  }
  refreshTop(); renderPanel();
}

function dismantleHeroAmount(i, amount=1){

function upHeroLevel(i, mode='panel'){

function transcendHero(i, mode='panel'){
  const hero = G.heroes[i]; if(!hero || heroIsMaxed(hero)) return;
  const lv = heroLevel(hero), cap = heroCap(hero);
  if(lv < cap) return;
  const matKey = heroMatKey(hero), tr = heroTransCost(hero);
  if((G.mats[matKey]||0) < tr.mat || (G.heroDust||0) < tr.dust || G.gold < tr.gold) return;
  i = splitHeroStack(i);
  const target = G.heroes[i]; if(!target) return;

    target.level = 1;
    target.cap = 10;
  } else {

}

  const map = {sword:'전사 전용', hammer_shield:'탱커 전용', staff:'힐러/법사 전용', gun:'총잡이 전용', dualblade:'암살자 전용'};
  return map[g?.type] || '전용 장비';
}
function makeGearFromBase(base, grade){
  return {
    uid:newGearUid(), id:base.id, name:base.name, grade:grade||base.grade||'N', type:base.type, variant:base.variant,
    img:base.img, role:base.role, desc:base.desc, atk:base.atk, hp:base.hp, def:base.def,
    spd:base.spd, crit:base.crit, critDmg:base.critDmg, heal:base.heal||0, level:1, cap:10, count:1
  };
}
function randomGearByGrade(grade){
  const pool = GEAR_POOL.filter(g=>g.grade===grade);
  return pool[Math.floor(Math.random()*pool.length)] || GEAR_POOL[0];
}
function gearLevel(g){ return Math.max(1, Math.min(HERO_MAX_LEVEL, g.level||1)); }
function gearCap(g){ return Math.max(10, Math.min(HERO_MAX_LEVEL, g.cap||10)); }
function gearAscCount(g){ return Math.max(0, Math.floor(gearCap(g)/10)-1); }
function gearGradeMult(g){ return HERO_GRADE_MULT[g.grade] || 1; }
function gearGrowthMult(g){ return 1 + (gearLevel(g)-1)*0.035 + gearAscCount(g)*0.18; }
function gearStats(g){
  if(!g) return {atk:0,hp:0,def:0,spd:0,crit:0,critDmg:0,heal:0};
  const m = gearGrowthMult(g);
  return {
    atk:Math.round((g.atk||0)*m), hp:Math.round((g.hp||0)*m), def:Math.round((g.def||0)*m),
    spd:Math.round(g.spd||0), crit:(g.crit||0)/100, critDmg:(g.critDmg||0)/100, heal:Math.round(g.heal||0)
  };
}
function gearPercentText(v){
  const p = Math.max(0, (v||0) * 100);
  return (p>0 && p<10 ? p.toFixed(1) : Math.round(p).toString()) + '%';
}
function gearPower(g){
  const s = gearStats(g);
  return Math.round(s.atk + s.hp*.18 + s.def*1.2 + s.spd*6 + s.crit*900 + s.critDmg*180 + s.heal*.35);
}
function activeGear(){ return G.gears[G.activeGear] || null; }
function activeGearStats(){ return gearStats(activeGear()); }
function equippedGearForHero(hero){
  if(!hero || !hero.gearUid) return null;
  const gear = G.gears.find(g=>g.uid===hero.gearUid) || null;
  return gearCompatibleHero(gear, hero) ? gear : null;
}
function gearEquippedHeroes(gear){
  if(!gear) return [];
  return (G.heroes||[]).filter(h=>h.gearUid===gear.uid && gearCompatibleHero(gear,h));
}
function gearAvailableCount(gear, ignoreHeroUid=null){
  if(!gear) return 0;
  const used = (G.heroes||[]).filter(h=>h.uid!==ignoreHeroUid && h.gearUid===gear.uid).length;
  return Math.max(0, itemCount(gear) - used);
}
function compatibleHeroesForGear(gear){ return (G.heroes||[]).filter(h=>gearCompatibleHero(gear,h)); }
function gearLevelCost(g){ return Math.floor(135 * Math.pow(gearLevel(g), 1.40) * gearGradeMult(g)); }
function gearTransCost(g){
  const gradeUp = gearLevel(g)>=HERO_MAX_LEVEL && g.grade!=='UR';
  const dust = gradeUp ? (g.grade==='SR'?70:g.grade==='SSR'?140:45) : (6 + gearCap(g));
  return { dust, gold:Math.floor(gearLevelCost(g) * (gradeUp?9:4)), gradeUp };
}
function gearDismantleReward(g){
  const base = GEAR_DUST_BY_GRADE[g.grade] || 1;
  return Math.max(1, Math.floor(base + gearLevel(g)*0.35 + gearAscCount(g)*base*0.45));
}
function gearIsMaxed(g){ return g.grade==='UR' && gearLevel(g)>=HERO_MAX_LEVEL && gearCap(g)>=HERO_MAX_LEVEL; }
function gearStackKey(g){ return (!g || gearLevel(g)!==1 || gearCap(g)!==10) ? '' : `${g.id}|${g.grade}`; }
function addGear(g){
  if(!Array.isArray(G.gears)) G.gears = [];
  const key = gearStackKey(g);
  const found = key ? G.gears.find(x=>gearStackKey(x)===key) : null;
  if(found){ found.count = itemCount(found) + itemCount(g); return found; }
  G.gears.push(g);
  if(G.activeGear<0) G.activeGear = G.gears.length-1;
  return g;
}
function totalGearCopies(){ return (G.gears||[]).reduce((s,g)=>s+itemCount(g),0); }
function splitGearStack(i){
  const g = G.gears[i]; if(!g || itemCount(g)<=1) return i;
  g.count = itemCount(g)-1;
  const clone = {...g, uid:newGearUid(), count:1};
  G.gears.push(clone);
  return G.gears.length-1;
}
function orderedGearEntries(){
  return (G.gears||[]).map((gear,i)=>({gear,i})).sort((a,b)=>{
    const aa = a.i===G.activeGear ? 0 : 1, ba = b.i===G.activeGear ? 0 : 1;
    if(aa!==ba) return aa-ba;
    const ag = GRADE_RANK[a.gear.grade] ?? 0, bg = GRADE_RANK[b.gear.grade] ?? 0;
    if(ag!==bg) return bg-ag;
    return gearPower(b.gear)-gearPower(a.gear);
  });
}
function gearVisual(g, cls=''){
  return `<img class="${cls}" src="${g.img}${AV}" alt="${g.name}" style="width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 5px 6px #0009)">`;
}
function gearStatsText(g){

}

      <button class="btn gem" onclick="transcendGear(${i},'${mode}')" ${(!canTrans||G.gold<tr.gold||dustHave<tr.dust)?'disabled':''}>${maxed?'최대치':tr.gradeUp?`${nextGrade} 등급업`:'초월'}</button>

  </div>`;
}

  const g = G.gears[i]; if(!g) return '';
  const reward = gearDismantleReward(g), count = itemCount(g);
  return `<div class="card" style="border-color:#ff9f43">
    <div class="row">
      <div style="flex:1">

        <div class="small">분해 시 ${GEAR_DUST_ICON}장비 결정 <b>${reward}</b>개 획득 · ${count>1?`보유 ${count}개 중 1개 분해`:'장비 초월 필요 재료로 사용'}</div>

function refreshGearViews(mode='panel'){
  refreshTop();
  if(mode==='char' && typeof renderCharGearDetail === 'function' && G.gears[selectedCharGearIdx]) renderCharGearDetail(selectedCharGearIdx);

function equipGearToHero(gearIndex, heroUid, mode='panel'){
  const gear = G.gears[gearIndex];
  let heroIndex = G.heroes.findIndex(h=>h.uid===heroUid);
  if(heroIndex<0) return;
  let hero = G.heroes[heroIndex];
  if(!gear || !hero || !gearCompatibleHero(gear, hero)) return;
  if(itemCount(G.heroes[heroIndex])>1) heroIndex = splitHeroStack(heroIndex);
  hero = G.heroes[heroIndex];
  if(hero.gearUid !== gear.uid && gearAvailableCount(gear, hero.uid) <= 0){
    alert('이 장비는 보유 수량만큼 이미 장착 중이에요.');
    return;
  }
  hero.gearUid = gear.uid;
  if(!G.heroHp) G.heroHp = {};
  G.heroHp[hero.uid] = heroMaxHp(hero);
  G.activeGear = gearIndex;
  selectedCharGearIdx = gearIndex;
  if(mode==='panel') gearDetailIdx = gearIndex;
  refreshTop();
  renderHeroRow();
  if(mode==='charHero'){
    const heroIndex = G.heroes.findIndex(h=>h.uid===hero.uid);
    if(heroIndex>=0 && typeof renderCharHeroDetail === 'function') renderCharHeroDetail(heroIndex);
    return;
  }
  refreshGearViews(mode);
}
function unequipHeroGear(heroUid, mode='panel'){
  const hero = G.heroes.find(h=>h.uid===heroUid);
  if(!hero) return;
  hero.gearUid = '';
  ensureHeroHp(hero);
  refreshTop();
  renderHeroRow();
  if(mode==='charHero'){
    const heroIndex = G.heroes.findIndex(h=>h.uid===hero.uid);
    if(heroIndex>=0 && typeof renderCharHeroDetail === 'function') renderCharHeroDetail(heroIndex);
    return;
  }
  refreshGearViews(mode);
}
function upGearLevel(i, mode='panel'){
  const g = G.gears[i]; if(!g || gearIsMaxed(g)) return;
  const lv = gearLevel(g), cap = gearCap(g);
  if(lv>=cap) return;
  const cost = gearLevelCost(g);
  if(G.gold<cost) return;
  i = splitGearStack(i);
  G.gold -= cost;
  G.gears[i].level = lv + 1;
  if(G.activeGear<0) G.activeGear=i;
  if(mode==='char') selectedCharGearIdx = i;
  else gearDetailIdx = i;
  refreshGearViews(mode);
}
function transcendGear(i, mode='panel'){
  const g = G.gears[i]; if(!g || gearIsMaxed(g)) return;
  const lv = gearLevel(g), cap = gearCap(g);
  if(lv < cap) return;
  const tr = gearTransCost(g);
  if((G.gearDust||0) < tr.dust || G.gold < tr.gold) return;
  i = splitGearStack(i);
  const target = G.gears[i]; if(!target) return;
  if(mode==='char') selectedCharGearIdx = i;
  else gearDetailIdx = i;
  G.gearDust -= tr.dust;
  G.gold -= tr.gold;
  if(cap >= HERO_MAX_LEVEL && target.grade !== 'UR'){
    target.grade = target.grade === 'SR' ? 'SSR' : target.grade === 'SSR' ? 'UR' : target.grade === 'R' ? 'SR' : 'R';
    const upgraded = GEAR_POOL.find(x=>x.grade===target.grade && x.type===target.type && x.variant===target.variant);
    if(upgraded) Object.assign(target, makeGearFromBase(upgraded, upgraded.grade), {count:1});
  } else {
    target.cap = Math.min(HERO_MAX_LEVEL, cap + 10);
  }
  refreshGearViews(mode);
}
function dismantleGear(i, mode='panel'){
  const g = G.gears[i]; if(!g) return;
  const reward = gearDismantleReward(g), count = itemCount(g);
  if(!confirm(`[${g.grade}] ${g.name} 장비 1개를 분해할까요?\n\n보유: ${count}개\n획득: ${GEAR_DUST_ICON} 장비 결정 ${reward}개`)) return;
  G.gearDust = (G.gearDust||0) + reward;
  if(count>1) g.count = count - 1;
  else {
    G.gears.splice(i,1);
    if(G.activeGear === i) G.activeGear = G.gears.length ? 0 : -1;
    else if(G.activeGear > i) G.activeGear--;
    if(gearDetailIdx === i) gearDetailIdx = null;
    else if(gearDetailIdx > i) gearDetailIdx--;
    if(selectedCharGearIdx === i) selectedCharGearIdx = Math.max(0, Math.min(G.activeGear, G.gears.length-1));
    else if(selectedCharGearIdx > i) selectedCharGearIdx--;
  }
  refreshGearViews(mode);
  popReward('🧩 장비 분해 완료', `<div style="font-size:42px">${GEAR_DUST_ICON}</div><div style="font-weight:bold">장비 결정 +${reward}</div>`);
}

  for(let i=0;i<count;i++){

function adReady(type){ return Date.now() >= (G.adCd[type]||0); }
function adRemain(type){ return Math.max(0, Math.ceil(((G.adCd[type]||0)-Date.now())/1000)); }
function watchAd(type){
  if(!adReady(type)) return;
  const grant = ()=>{
    if(type==='gold'){ const amt=Math.floor(stageGoldBase(G.stage, false) * huntGoldMult() * 30); G.gold+=amt; adResult(`<span class="goldIcon"></span> 골드 +${amt.toLocaleString()}`); }
    else if(type==='gem'){ G.gem+=30; adResult('💎 보석 +30'); }
    else if(type==='pull'){ freePullHero(); }  // 무료 소환(자체 연출)
    if(!G.adPass){ const cd={gold:30,gem:60,pull:90}[type]; G.adCd[type]=Date.now()+cd*1000; }
    refreshTop(); renderPanel();
  };
  if(G.adPass){ grant(); return; }   // 패스: 광고 스킵, 즉시 지급
  showAdWatching(grant);             // 일반: 3초 광고 시청

function showAdWatching(cb){
  let t=3;
  const ov=document.getElementById('overlay');
  const okBtn=document.querySelector('#popup>button');
  document.getElementById('popTitle').textContent='📺 광고 시청 중';
  const render=()=>{ document.getElementById('popContent').innerHTML=
    `<div style="font-size:46px">📺</div><div class="small">광고가 끝나면 보상을 받아요</div>
     <div style="font-size:26px;font-weight:bold;margin-top:8px">${t}</div>`; };
  render(); okBtn.style.display='none'; ov.style.display='flex';
  const iv=setInterval(()=>{ t--; if(t<=0){ clearInterval(iv); okBtn.style.display=''; ov.style.display='none'; cb(); } else render(); },1000);
}
function adResult(text){

      ${statCard('펫', pet ? `${pet.name} · 펫 공격력 ${petAttackPower(pet).toLocaleString()}` : '착용 없음', petBonusText || (pet ? petBuffText(pet) : ''), true)}
      ${statCard('장비', equippedGears.length ? `장착 ${equippedGears.length}개 · 공격 +${gearAtkTotal().toLocaleString()} · 체력 +${gearHpTotal.toLocaleString()} · 방어 +${gearDefTotal().toLocaleString()}` : '착용 없음', equippedGears.length ? `속도 평균 +${percent(gearSpdAvg)}% · 치명 평균 +${gearPercentText(gearCritAvg)} · ${equippedGears.map(g=>`[${g.grade}] ${g.name}`).join(' / ')}` : '', true)}
      ${statCard('특수강화', `치확 +${percent(huntCritBonus())}% · 치피 x${critDmgUpgradeMult().toFixed(2)} · 보스 +${percent(bossPowerBonus())}% · 속성 +${percent(attrDmgMult()-1)}%`, '', true)}
      ${statCard('코스튬/시너지/길드', `코스튬 +${percent(skinMult()-1)}% · 시너지 +${percent(syn.bonus)}% · 길드 ${G.guild?.joined?'+'+percent(guildAtkBonus())+'%':'없음'}`, syn.bonus>0 ? `${CLASSES[syn.cls]?.name||'직업'} ${syn.count}명 시너지` : '같은 직업 3명부터 시너지 적용', true)}
      ${statCard('속성 상성표', attrAdvText, '', true)}
      ${statCard('좋은 속성 조합', attrPairText, '', true)}
    </div>
    <div class="card small statHelp" style="margin-top:9px">게임 속성은 대지 · 자연 · 화염 · 물/얼음 · 빛 · 암흑 · 번개 · 바람 8가지만 적용됩니다.</div>
  </div>`;
}

// ===== 상단 갱신 =====
function refreshTop(){
  document.getElementById('gold').textContent = Math.floor(G.gold).toLocaleString();
  document.getElementById('gem').textContent = G.gem.toLocaleString();
  document.getElementById('plv').textContent = G.plv;
  document.getElementById('stage').textContent = G.stage;
  document.getElementById('kills').textContent = G.kills;
  document.getElementById('killGoal').textContent = stageKillGoal();
  updatePlayer();
  updateHuntIntel();
  updateHomeRes();
  if(typeof refreshSummonShopWallet === 'function') refreshSummonShopWallet();
  if(typeof refreshSummonShopCounters === 'function') refreshSummonShopCounters();
  saveGame();
}

// ===== 저장/불러오기 =====
function saveGame(){ try{ G.lastSeen = Date.now(); localStorage.setItem('idleRPG', JSON.stringify(G)); }catch(e){} }
const STARTER_HERO_NAMES = ['카이론','린','사피라'];
function makeStarterHero(name){
  const base = HERO_POOL.find(h=>h.name===name) || HERO_POOL[0];
  return {
    uid:newHeroUid(), name:base.name, emoji:base.emoji, cls:base.cls,
    grade:'N', atk:18, level:1, cap:10, count:1,
    equip:{무기:0}
  };
}
function ensureStarterHeroes(){
  if(!Array.isArray(G.heroes)) G.heroes = [];
  if(G.heroes.length) return false;
  G.heroes = STARTER_HERO_NAMES.map(makeStarterHero);
  G.party = G.heroes.slice(0,5).map(h=>h.uid);
  while(G.party.length<5) G.party.push(null);
  normalizeHeroCatalog();
  G.heroes.forEach(ensureHeroHp);
  return true;
}
function loadGame(){
  try{
    const s = localStorage.getItem('idleRPG');
    if(s){
      const saved = JSON.parse(s);
      const hadParty = Object.prototype.hasOwnProperty.call(saved, 'party');
      Object.assign(G, saved);
      // 구버전 세이브 보정
      if(G.starterPackDone==null) G.starterPackDone = false;
      if(!G.adCd) G.adCd = { gold:0, gem:0, pull:0 };
      if(G.pity==null) G.pity = 0;
      if(G.totalPulls==null) G.totalPulls = 0;
      if(!G.summonTotal) G.summonTotal = { hero:G.totalPulls||0, gear:0, pet:0 };
      if(!G.summonPity) G.summonPity = { hero:G.pity||0, gear:0, pet:0 };
      if(!G.selectTickets) G.selectTickets = { hero:0, gear:0, pet:0 };
      ['hero','gear','pet'].forEach(k=>{
        if(G.summonTotal[k]==null) G.summonTotal[k]=0;
        if(G.summonPity[k]==null) G.summonPity[k]=0;
        if(G.selectTickets[k]==null) G.selectTickets[k]=0;
      });
      if((G.summonTotal.hero||0) < (G.totalPulls||0)) G.summonTotal.hero = G.totalPulls||0;
      G.totalPulls = G.summonTotal.hero;
      G.pity = G.summonPity.hero;
      if(!G.hero) G.hero = 'lin';
      if(!G.heroCostume) G.heroCostume = {};
      if(!G.ownedCostumes) G.ownedCostumes = ['lin_default','rubia_default','sapphira_default','silvia_default','kael_default','emeria_default','kaira_default','kairon_default','grant_default'];
      ['lin_default','rubia_default','sapphira_default','silvia_default','kael_default','emeria_default','kaira_default','kairon_default','grant_default'].forEach(cid=>{
        if(!G.ownedCostumes.includes(cid)) G.ownedCostumes.push(cid);
      });
      if(!G.mats) G.mats = {};
      if(G.heroDust==null) G.heroDust = 0;
      if(G.petDust==null) G.petDust = 0;
      if(G.gearDust==null) G.gearDust = 0;
      if(!Array.isArray(G.gears)) G.gears = [];
      if(G.activeGear==null) G.activeGear = G.gears.length ? 0 : -1;
      if(!G.dungeon) G.dungeon = { date:'', left:DUNGEON_DAILY_LIMIT, limit:DUNGEON_DAILY_LIMIT };
      if(!Array.isArray(G.dungeon.clearedToday)) G.dungeon.clearedToday = [];
      if(!G.dungeon.best) G.dungeon.best = {};
      if(G.dungeon.limit !== DUNGEON_DAILY_LIMIT){
        const oldLimit = G.dungeon.limit || 2;
        const bonusLeft = Math.max(0, DUNGEON_DAILY_LIMIT - oldLimit);
        G.dungeon.left = (G.dungeon.left ?? 0) + bonusLeft;
        G.dungeon.limit = DUNGEON_DAILY_LIMIT;
      }
      G.dungeon.left = Math.min(DUNGEON_DAILY_LIMIT, Math.max(0, G.dungeon.left ?? DUNGEON_DAILY_LIMIT));
      if(!G.mail) G.mail = [];
      if(!G.questClaimed) G.questClaimed = [];
      if(!G.achClaimed) G.achClaimed = [];
      if(G.lastSeen==null) G.lastSeen = 0;
      if(!G.attend) G.attend = { last:'', day:0 };
      if(!G.affinity) G.affinity = {};
      if(G.playerName==null) G.playerName = '';
      if(G.sfxOn==null) G.sfxOn = true;
      if(G.bgmOn==null) G.bgmOn = true;
      if(G.sfxVol==null) G.sfxVol = 0.5;
      if(G.bgmVol==null) G.bgmVol = 0.28;
      G.sfxVol = Math.max(0, Math.min(1, Number(G.sfxVol)||0));
      G.bgmVol = Math.max(0, Math.min(1, Number(G.bgmVol)||0));
      if(!G.storyDone) G.storyDone = [];
      if(!G.epDone) G.epDone = [];
      if(!G.talkDate) G.talkDate = {};
      if(G.seenPrologue==null) G.seenPrologue = false;
      if(!G.daily) G.daily = { date:'', counts:{}, claimed:[] };
      if(!G.pets) G.pets = [];
      if(G.petCatalogVer !== PET_CATALOG_VERSION){
        G.pets = [];
        G.activePet = -1;
        G.petCatalogVer = PET_CATALOG_VERSION;
      }
      if(G.pets.some(p=>!PET_POOL.some(x=>x.name===p.name && x.grade===p.grade))){
        G.pets = [];
        G.activePet = -1;
        G.petCatalogVer = PET_CATALOG_VERSION;
      }
      G.pets.forEach(p=>{
        p.count = itemCount(p);
        if(!p.grade) p.grade = 'N';
        if(!p.level) p.level = 1;
        if(!p.cap) p.cap = 10;
        p.level = Math.max(1, Math.min(HERO_MAX_LEVEL, p.level));
        p.cap = Math.max(10, Math.min(HERO_MAX_LEVEL, p.cap));
        if(!PET_BUFF[p.buff]) p.buff = 'atk';
        const match = PET_POOL.find(x=>x.name===p.name && x.grade===p.grade) || PET_POOL.find(x=>x.buff===p.buff && x.grade===p.grade);
        if(match) p.img = match.img;
        if(!p.stats || !p.skill){
          if(match){
            if(!p.stats) p.stats = match.stats || '';
            if(!p.skill) p.skill = match.skill || '';
          }
        }
      });
      if(G.activePet==null) G.activePet = -1;
      ensureGuildState();
      if(!G.heroHp) G.heroHp = {};
      if(!G.wipeCount) G.wipeCount = 0;
      if(!G.wallStage) G.wallStage = 0;
      if(G.huntStreak==null) G.huntStreak = 0;
      if(!G.tapPower) G.tapPower = 1;
      if(!G.autoPower) G.autoPower = 1;
      if(!G.autoSpeed) G.autoSpeed = 1;
      if(!G.critChance) G.critChance = 1;
      if(!G.critDmgPower) G.critDmgPower = 1;
      if(!G.bossPower) G.bossPower = 1;
      if(!G.attrPower) G.attrPower = 1;
      G.tapPower = Math.min(HUNT_MAX_LEVEL, Math.max(1, G.tapPower));
      G.autoPower = Math.min(HUNT_MAX_LEVEL, Math.max(1, G.autoPower));
      G.autoSpeed = Math.min(SPEED_MAX_LEVEL, Math.max(1, G.autoSpeed));
      G.critChance = Math.min(SPECIAL_MAX_LEVEL, Math.max(1, G.critChance));
      G.critDmgPower = Math.min(SPECIAL_MAX_LEVEL, Math.max(1, G.critDmgPower));
      G.bossPower = Math.min(SPECIAL_MAX_LEVEL, Math.max(1, G.bossPower));
      G.attrPower = Math.min(SPECIAL_MAX_LEVEL, Math.max(1, G.attrPower));
      G.heroes.forEach(h=>{ if(!h.uid) h.uid=newHeroUid(); if(!h.equip) h.equip={무기:0}; if(h.equip.무기==null) h.equip.무기=0; if(!h.cls) h.cls="sword"; ensureHeroHp(h); });
      normalizeHeroCatalog();
      ensureGearState();
      if(!hadParty || !Array.isArray(G.party)) G.party = G.heroes.slice(0,5).map(h=>h.uid);
      while(G.party.length<5) G.party.push(null);
      G.party = G.party.slice(0,5).map(id=>G.heroes.some(h=>h.uid===id) ? id : null);
      normalizeStacks();
    }
  }catch(e){}
}

// ===== 시작 =====
loadGame();
ensureStarterHeroes();
normalizeHeroCatalog();
ensureGearState();
normalizeStacks();
offlineRewardCheck();  // 접속 전 방치 보상 계산(refreshTop이 lastSeen 덮어쓰기 전에)
spawnMonster();
renderHeroRow();
refreshTop();
setTab('hunt');
goHome(); // 시작은 홈(로비) 화면
function startPrologue(){ playVN(WORLD.prologue, ()=>{ G.seenPrologue=true; saveGame(); if(pendingOffline) showOfflinePopup(); }, null, VN_BG.field); }
if(!G.playerName){ askPlayerName(()=>{ if(!G.seenPrologue) startPrologue(); }); }
else if(!G.seenPrologue){ startPrologue(); }
else if(pendingOffline) showOfflinePopup(); // 홈 위에 방치 보상 팝업
restartAuto(); // 자동사냥 시작
restartMonsterAttack(); // 몬스터도 배치 영웅을 공격
setInterval(useSkill, 1000); // 배치 영웅별 스킬 쿨타임 확인
setInterval(spawnSkinFx, 700); // 코스튬 분위기 이펙트
setInterval(petAttack, 1400); // 펫 동료 공격

// 몬스터 탭(클릭) → 즉시 추가 타격
const monEl = document.getElementById('monster');
let lastManualTapAt = 0;
function showTapHitMotion(e){
  const b = document.getElementById('battle');
  if(!b || !e) return;
  const p = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  if(p.clientX==null || p.clientY==null) return;
  const rect = b.getBoundingClientRect();
  const fx = document.createElement('div');
  fx.className = 'tapHitFx';
  fx.style.left = (p.clientX - rect.left) + 'px';
  fx.style.top = (p.clientY - rect.top) + 'px';
  b.appendChild(fx);
  setTimeout(()=>fx.remove(), 430);
}
// 전투 화면을 실제로 보고 있는가 (홈/캐릭터/서브화면/대화 중이면 false)
function battleVisible(){
  const dunBattle = document.getElementById('dunBattle');
  return document.getElementById('home').style.display!=='flex'
    && document.getElementById('charView').style.display!=='block'
    && document.getElementById('screen').style.display!=='flex'
    && document.getElementById('vn').style.display!=='flex'
    && (!dunBattle || !dunBattle.classList.contains('show'));
}
function manualTap(e){
  if(e&&e.cancelable) e.preventDefault();
  if(!battleVisible()) return;
  const now = Date.now();
  if(now-lastManualTapAt<90) return;
  lastManualTapAt = now;
  showTapHitMotion(e);
  sfx('tap');
  attack(true);
}
const battleEl = document.getElementById('battle');
battleEl.addEventListener('click', manualTap);
battleEl.addEventListener('touchstart', manualTap, {passive:false});

// 세이브 안전장치 — 모바일은 앱이 백그라운드로 가거나 종료될 때 데이터가 날아갈 수 있어 즉시 저장
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) saveGame(); });
window.addEventListener('pagehide', saveGame);
window.addEventListener('blur', saveGame);
setInterval(saveGame, 30000); // 30초마다 자동 저장
</script>
