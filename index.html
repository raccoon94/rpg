<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>방치형 RPG</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background:#0f1020; color:#e8e8f0; overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }
  #app { max-width:480px; margin:0 auto; height:100vh; display:flex; flex-direction:column; }

  /* 상단 자원바 */
  #topbar {
    display:flex; gap:6px; padding:9px 9px; background:linear-gradient(180deg,#20223f,#15162c);
    border-bottom:1px solid #343a66; font-size:13px; align-items:center; box-shadow:0 2px 8px #00000040;
  }
  .res { display:flex; align-items:center; gap:4px; background:linear-gradient(160deg,#0f1020,#1a1c38);
    padding:5px 10px; border-radius:20px; border:1px solid #343a66; box-shadow:inset 0 1px 0 #ffffff12; }
  .res b { color:#ffd866; }
  .goldIcon { display:inline-block; width:17px; height:17px; border-radius:50%; vertical-align:-3px; margin-right:3px;
    background:
      radial-gradient(circle at 32% 28%, #fff7b8 0 16%, transparent 17%),
      radial-gradient(circle at 50% 55%, #ffd95a 0 42%, #f7a51d 43% 68%, #9b5a08 69% 100%);
    border:1px solid #ffe28a; box-shadow:0 1px 3px #0008, inset 0 1px 0 #fff7, inset 0 -2px 0 #9b5a0844; }
  .goldIcon::after { content:''; display:block; width:7px; height:7px; margin:4px auto; border-radius:50%;
    border:1px solid #9b5a0877; background:#ffc43a88; }
  #buyGem { margin-left:auto; background:linear-gradient(160deg,#ff7a90,#ff3b5c); color:#fff;
    border:none; padding:6px 13px; border-radius:20px; font-weight:bold; font-size:12px; box-shadow:0 2px 8px #ff3b5c55, inset 0 1px 0 #ffffff44; }
  #homeBtn { background:linear-gradient(160deg,#1a1c38,#0f1020); border:1px solid #343a66; border-radius:50%; width:32px; height:32px; font-size:15px; padding:0; }

  /* 전투 화면 */
  #battle {
    flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column;
    background:url('assets/bg/hunt_field_20260610_inpaint.png?v=1') center/cover no-repeat;
  }
  #battle::after { content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
    background:linear-gradient(180deg,#00000010,transparent 35%,#00000022); }
  #stars { position:absolute; inset:0; pointer-events:none; display:none; background-image:
    radial-gradient(2px 2px at 20% 25%, #ffffffaa, transparent),
    radial-gradient(2px 2px at 70% 18%, #ffffff77, transparent),
    radial-gradient(1px 1px at 40% 55%, #ffffff88, transparent),
    radial-gradient(1px 1px at 85% 45%, #ffffff66, transparent),
    radial-gradient(2px 2px at 55% 12%, #ffffff88, transparent),
    radial-gradient(1px 1px at 12% 60%, #ffffff66, transparent); }
  #ground { position:absolute; bottom:50px; left:0; right:0; height:70px; display:none;
    background:linear-gradient(180deg,#2c2358,#15122e); border-top:2px solid #463a82;
    box-shadow:0 -6px 24px #0009; }
  #stageLabel { position:absolute; top:9px; left:0; right:0; text-align:center; font-size:13px; color:#c3c8f5; z-index:5; text-shadow:0 1px 3px #000; }
  #powerBadge { position:absolute; top:30px; left:0; right:0; text-align:center; font-size:12px; color:#ffd866; z-index:5; text-shadow:0 1px 3px #000; }
  #powerBadge b { font-size:15px; }
  #skillToast { position:absolute; top:46%; left:0; right:0; text-align:center; z-index:8; pointer-events:none;
    font-size:22px; font-weight:bold; color:#fff; opacity:0; text-shadow:0 2px 8px #000,0 0 16px currentColor; }
  #skillToast.show { animation:skillPop 1s ease-out; }
  @keyframes skillPop { 0%{opacity:0; transform:scale(.6);} 25%{opacity:1; transform:scale(1.1);} 70%{opacity:1; transform:scale(1);} 100%{opacity:0; transform:scale(1.05) translateY(-20px);} }
  .bullet { position:absolute; font-size:20px; pointer-events:none; z-index:6; }
  .hitring { position:absolute; width:24px; height:24px; border:3px solid currentColor; border-radius:50%;
    pointer-events:none; z-index:6; animation:ringExp .42s ease-out forwards; }
  @keyframes ringExp { from{ opacity:.9; transform:scale(.3); } to{ opacity:0; transform:scale(2.6); } }
  #battle.shake { animation:bshake .2s ease; }
  @keyframes bshake { 0%,100%{transform:translate(0,0);} 20%{transform:translate(-5px,2px);} 40%{transform:translate(5px,-2px);} 60%{transform:translate(-4px,-1px);} 80%{transform:translate(4px,1px);} }

  #arena { flex:1; position:relative; display:flex; align-items:flex-end; justify-content:space-between; padding:0 26px 86px; z-index:3; }

  /* 플레이어 캐릭터 */
  #player { position:relative; display:flex; flex-direction:column; align-items:center; pointer-events:none; }
  #player .char { font-size:60px; transition:transform .12s ease-out; animation:bob 2.2s ease-in-out infinite;
    filter:drop-shadow(0 6px 6px #0007); }
  #player .char, #player .aura, #player .lvtag { display:none; }
  #player.atk .char { transform:translateX(44px) rotate(-14deg) scale(1.08) !important; animation:none; }
  #player.cast .char { transform:scale(1.35) !important; animation:none; filter:drop-shadow(0 6px 6px #0007) drop-shadow(0 0 22px var(--glow,#ffd866)) brightness(1.2); }
  #player.cast { z-index:7; }
  #player .aura { position:absolute; bottom:54px; left:50%; transform:translateX(-50%);
    width:80px; height:26px; border-radius:50%; filter:blur(7px); opacity:.85; z-index:-1; }
  .lvtag { margin-top:6px; font-size:11px; color:#ffd866; font-weight:bold; text-shadow:0 1px 2px #000; }
  #petCompanion { position:absolute; left:258px; bottom:145px; font-size:34px; z-index:7;
    animation:bob 2s ease-in-out infinite; filter:drop-shadow(0 3px 4px #0008); }
  #petCompanion img { width:54px; height:54px; object-fit:contain; display:block; }
  .petProj { position:absolute; font-size:22px; z-index:6; pointer-events:none; filter:drop-shadow(0 0 6px #ffd86688); }
  .petProj img { width:30px; height:30px; object-fit:contain; display:block; }

  /* 몬스터 */
  #enemy { position:relative; display:flex; flex-direction:column; align-items:center; }
  #monName { font-size:14px; font-weight:bold; text-shadow:0 1px 3px #000; }
  #hpbar { width:150px; height:12px; background:#2a2d50; border-radius:8px; margin-top:5px; overflow:hidden; border:1px solid #00000055; }
  #hpfill { height:100%; width:100%; background:linear-gradient(90deg,#ff5e7a,#ff3b5c); transition:width .12s; }
  #hptext { font-size:10px; color:#c9cdf0; margin-top:3px; text-shadow:0 1px 2px #000; }
  #monster { width:124px; height:124px; margin-top:8px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:70px; position:relative; transition:transform .08s, filter .08s;
    background:
      radial-gradient(circle at 36% 28%, #ffffff77, transparent 16%),
      radial-gradient(circle at 50% 50%, #3a3f70 0%, #22274f 43%, #101326 76%);
    border:3px solid #5f68b8; box-shadow:0 12px 18px #0009, inset 0 3px 0 #ffffff30, inset 0 -18px 28px #0008;
    animation:bob 2.6s ease-in-out infinite; filter:drop-shadow(0 8px 6px #0007); }
  #monster::before { content:''; position:absolute; inset:-9px; border-radius:50%; z-index:-1;
    background:conic-gradient(from 20deg,#5fd0ff44,#c084fc55,#ff5e7a44,#ffd86644,#5fd0ff44);
    filter:blur(6px); opacity:.78; }
  #monster::after { content:''; position:absolute; left:20%; right:20%; bottom:10px; height:12px; border-radius:50%;
    background:#0008; filter:blur(7px); transform:translateY(20px); z-index:-2; }
  #monster.hit { transform:translateX(-14px) scale(.9) rotate(7deg) !important; animation:none;
    filter:drop-shadow(0 8px 6px #0007) brightness(2.2) saturate(.3); }
  #monster.boss { width:142px; height:142px; font-size:84px; border-color:#ffb74d;
    background:
      radial-gradient(circle at 36% 28%, #fff6bd99, transparent 16%),
      radial-gradient(circle at 50% 48%, #7b2b4d 0%, #3b1739 44%, #12091f 78%);
    box-shadow:0 14px 22px #000a, inset 0 3px 0 #ffffff38, inset 0 -20px 34px #0009,0 0 26px #ff5e7a77; }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  /* 이펙트 */
  .slash { position:absolute; font-size:44px; pointer-events:none; z-index:6; animation:slashAnim .35s ease-out forwards; }
  @keyframes slashAnim { 0%{opacity:0; transform:scale(.4) rotate(-45deg);} 40%{opacity:1; transform:scale(1.25) rotate(8deg);} 100%{opacity:0; transform:scale(1.5) rotate(28deg);} }
  .spark { position:absolute; width:6px; height:6px; border-radius:50%; background:#ffd866; pointer-events:none; z-index:6; box-shadow:0 0 6px #ffd866; }
  .dmg { position:absolute; font-weight:bold; font-size:20px; color:#ffe08a; pointer-events:none; z-index:7;
    text-shadow:0 2px 4px #000; animation:dmgFloat .7s ease-out forwards; }
  .dmg.crit { color:#ff7a95; font-size:30px; }
  @keyframes dmgFloat { 0%{opacity:1; transform:translateY(0) scale(1);} 30%{transform:translateY(-18px) scale(1.2);} 100%{opacity:0; transform:translateY(-66px) scale(1);} }
  .tapHitFx { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:54px; height:54px; pointer-events:none; z-index:9; color:#ffe08a; animation:tapHitPop .42s ease-out forwards; }
  .tapHitFx::before { content:'✦'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:38px; text-shadow:0 0 8px #fff1a8, 0 0 16px #ff8a00; }
  .tapHitFx::after { content:''; position:absolute; left:50%; top:50%; width:42px; height:42px;
    border:3px solid #ffe08a; border-radius:50%; transform:translate(-50%,-50%); box-shadow:0 0 12px #ffb74dcc; }
  @keyframes tapHitPop {
    0%{opacity:0; transform:translate(-50%,-50%) scale(.35) rotate(-18deg);}
    35%{opacity:1; transform:translate(-50%,-50%) scale(1.12) rotate(8deg);}
    100%{opacity:0; transform:translate(-50%,-50%) scale(1.75) rotate(24deg);}
  }

  /* 하단 영웅 파티 */
  #heroRow { position:absolute; left:5%; top:47%; width:29%; height:46%; z-index:5; pointer-events:none; }
  .heroSlot { position:absolute; width:76px; height:76px; display:flex; align-items:flex-end; justify-content:center;
    font-size:0; background:transparent!important; filter:drop-shadow(0 10px 9px #0009); transform-origin:50% 88%; }
  .heroSlot:nth-child(1){ left:0%; top:0%; }
  .heroSlot:nth-child(2){ left:0%; top:36%; }
  .heroSlot:nth-child(3){ left:0%; top:72%; }
  .heroSlot:nth-child(4){ left:60%; top:17%; }
  .heroSlot:nth-child(5){ left:60%; top:55%; }
  .heroSlot.empty { display:none; }
  .heroSlot .slotHeroImg { width:104px; height:104px; max-width:none; max-height:none; object-fit:contain; }
  .heroSlot .slotHeroEmoji { font-size:58px; line-height:1; }
  .heroSlot.atk { animation:heroSdAttack .32s ease-out; }
  .heroSlot.downed { filter:grayscale(1) brightness(.55) drop-shadow(0 8px 7px #0009); opacity:.72; }
  .heroSlot.hit { animation:heroHit .22s ease-out; }
  .heroHpMini { position:absolute; left:8px; right:8px; bottom:-3px; height:6px; border-radius:6px; overflow:hidden;
    background:#1a1c38cc; border:1px solid #0008; box-shadow:0 1px 4px #0009; }
  .heroHpMini i { display:block; height:100%; width:100%; background:linear-gradient(90deg,#3be38b,#b6ff6b); transition:width .18s; }
  @keyframes heroSdAttack {
    0%{ transform:translate(0,0) scale(1) rotate(0); }
    45%{ transform:translate(34px,-10px) scale(1.13) rotate(-4deg); }
    100%{ transform:translate(0,0) scale(1) rotate(0); }
  }
  @keyframes heroHit {
    0%,100%{ transform:translateX(0); }
    35%{ transform:translateX(-8px) rotate(-3deg); }
    70%{ transform:translateX(6px) rotate(2deg); }
  }

  /* 하단 탭 */
  #panel { height:230px; background:linear-gradient(180deg,#1c1e3a,#14152b); border-top:1px solid #343a66; overflow-x:hidden; overflow-y:auto; padding:11px; font-size:12px; }
  #tabs { display:flex; background:linear-gradient(180deg,#13142a,#0c0d1c); border-top:1px solid #2a2d50; min-height:46px; z-index:20; }
  .tab { flex:1; text-align:center; padding:11px 0 9px; font-size:12px; color:#9aa0d0; white-space:nowrap; position:relative; transition:color .15s; }
  .tab.active { color:#ffd866; font-weight:bold; }
  .tab.active::after { content:''; position:absolute; top:0; left:18%; right:18%; height:3px; border-radius:3px;
    background:linear-gradient(90deg,#ffd24a,#ff8a00); box-shadow:0 0 8px #ffb74d; }

  /* 카드 */
  .card { background:linear-gradient(160deg,#23264a,#181a32); border:1px solid #343a66; border-radius:13px;
    padding:11px; margin-bottom:9px; box-shadow:0 2px 8px #00000040, inset 0 1px 0 #ffffff0d; }
  .card .row { display:flex; align-items:center; gap:9px; }
  #panel .card .row { flex-wrap:wrap; }
  #panel .card .row .btn { white-space:normal; word-break:keep-all; line-height:1.25; }
  #panel .upgradeCard { overflow:visible; max-width:100%; }
  #panel .upgradeCard .row { flex-wrap:wrap; min-width:0; }
  #panel .upgradeCard .row > div:nth-child(2) { flex:1 1 150px; min-width:0; }
  #panel .upgradeCard .row .btn { flex:1 1 118px; min-width:118px; }
  #panel .huntPowerCard .row { align-items:flex-start; flex-wrap:nowrap; gap:8px; }
  #panel .huntPowerCard .powerInfo { flex:1 1 auto; min-width:0; padding-top:2px; }
  #panel .huntPowerCard .powerTitle { font-size:13px; font-weight:900; line-height:1.3; color:#fff; }
  #panel .huntPowerCard .powerDesc { margin-top:4px; line-height:1.45; overflow-wrap:anywhere; }
  #panel .huntPowerCard .upgradeBtns { flex:0 0 98px; display:flex; flex-direction:column; gap:5px; margin-left:auto; }
  #panel .huntPowerCard .upgradeBtns .btn { flex:0 0 auto; width:98px; min-width:0; padding:6px 7px; font-size:10.5px; white-space:nowrap; line-height:1.2; }
  #panel .specialUpgradeCard .row { align-items:flex-start; flex-wrap:nowrap; gap:8px; }
  #panel .specialUpgradeCard .specialBtns { flex:0 0 104px; display:flex; flex-direction:column; gap:5px; margin-left:auto; }
  #panel .specialUpgradeCard .specialBtns .btn { flex:0 0 auto; width:104px; min-width:0; padding:7px 8px; font-size:11px; white-space:nowrap; }
  #panel .gearUpgradeCard .row { align-items:flex-start; flex-wrap:nowrap; gap:8px; }
  #panel .gearUpgradeCard .gearInfo { flex:1 1 auto; min-width:0; padding-top:2px; }
  #panel .gearUpgradeCard .gearBtns { flex:0 0 104px; display:flex; flex-direction:column; gap:5px; margin-left:auto; }
  #panel .gearUpgradeCard .gearBtns .btn { flex:0 0 auto; width:104px; min-width:0; padding:7px 8px; font-size:11px; white-space:nowrap; }
  .huntHeroList { max-height:190px; overflow-y:auto; padding-right:3px; }
  .huntHeroList::-webkit-scrollbar { width:6px; }
  .huntHeroList::-webkit-scrollbar-thumb { background:#3a3f70; border-radius:4px; }
  .huntHeroItem { display:flex; align-items:center; gap:8px; padding:8px; margin-bottom:7px; border-radius:10px;
    background:linear-gradient(160deg,#23264a,#181a32); border:1px solid #343a66; }
  .huntHeroItem.on { border-color:#3be38b; box-shadow:0 0 10px #3be38b22; }
  .huntHeroItem .face { width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center;
    font-size:22px; flex-shrink:0; border:1px solid #ffffff66; }
  .huntHeroItem .meta { min-width:0; flex:1; }
  .huntHeroItem .name { font-size:12px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .partyPick { display:flex; gap:5px; flex-wrap:wrap; margin-top:7px; }
  .partyPick button { min-width:34px; padding:6px 8px; border-radius:8px; font-size:11px; }
  .heroStatGrid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px; margin-top:8px; }
  .heroStatCell { background:#10132699; border:1px solid #343a66; border-radius:9px; padding:7px; min-width:0; }
  .heroStatCell .label { font-size:10px; color:#9aa0d0; }
  .heroStatCell .value { margin-top:3px; font-size:13px; font-weight:900; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .skillDetail { margin-top:7px; padding:8px; border:1px solid #343a66; border-radius:10px; background:#10132699; }
  .skillDetail .name { font-size:12px; font-weight:900; }
  .skillDetail .desc { margin-top:4px; font-size:10px; color:#c9cdf0; line-height:1.45; }

  /* 버튼 */
  .btn { background:linear-gradient(160deg,#5b73ff,#3b4fe0); color:#fff; border:none; padding:9px 13px; border-radius:10px;
    font-size:13px; font-weight:bold; box-shadow:0 3px 8px #2535a055, inset 0 1px 0 #ffffff33; transition:transform .08s, filter .15s; }
  .btn:active { transform:translateY(1px) scale(.98); }
  .btn:disabled { background:#2a2d50; color:#6b7099; box-shadow:none; }
  .btn.gold { background:linear-gradient(160deg,#ffc24a,#ff8a00); color:#3a2600; box-shadow:0 3px 8px #ff8a0055, inset 0 1px 0 #ffffff66; }
  .btn.gem { background:linear-gradient(160deg,#b06bff,#7c3bff); box-shadow:0 3px 8px #7c3bff55, inset 0 1px 0 #ffffff44; }
  .small { font-size:11px; color:#9aa0d0; }
  h3 { font-size:14px; margin-bottom:9px; padding-left:10px; position:relative; }
  h3::before { content:''; position:absolute; left:0; top:1px; bottom:1px; width:4px; border-radius:3px;
    background:linear-gradient(180deg,#ffd24a,#ff8a00); box-shadow:0 0 6px #ffb74d88; }

  /* 스크롤바 */
  #panel::-webkit-scrollbar, #screenBody::-webkit-scrollbar { width:7px; }
  #panel::-webkit-scrollbar-thumb, #screenBody::-webkit-scrollbar-thumb { background:#3a3f70; border-radius:4px; }
  #panel::-webkit-scrollbar-track, #screenBody::-webkit-scrollbar-track { background:transparent; }

  /* 등급 색 */
  .g-N{background:#6b7280;} .g-R{background:#3b82f6;} .g-SR{background:#a855f7;} .g-SSR{background:#f59e0b;} .g-UR{background:#ff4fd8;}
  .txt-N{color:#9ca3af;} .txt-R{color:#60a5fa;} .txt-SR{color:#c084fc;} .txt-SSR{color:#fbbf24;} .txt-UR{color:#ff8df0;}

  /* 팝업 */
  #overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:150; }
  #popup { background:#181a30; border:2px solid #3b5bff; border-radius:16px; padding:24px; width:300px; text-align:center; }
  #popContent { margin:14px 0; }
  .rewardGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; max-height:360px; overflow-y:auto; padding-right:2px; }
  .rewardItem { background:linear-gradient(160deg,#23264a,#181a32); border:1px solid #343a66; border-radius:10px; padding:7px 4px; text-align:center; min-width:0; }
  .rewardItem .name { font-size:10px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rewardItem .sub { font-size:10px; color:#c9cdf0; margin-top:2px; }
  .rewardItem .hp-card { margin:0 auto 5px; }
  .pulledHero { font-size:60px; margin:8px 0; }

  /* 첫결제 배너 */
  #firstPay { background:linear-gradient(135deg,#ff3b5c,#ff8a3b); border-radius:10px; padding:12px; margin-bottom:8px; text-align:center; }
  #firstPay h3 { color:#fff; }
  #firstPay .small { color:#ffe8d0; }

  /* ===== 영웅 카드 디자인 ===== */
  .g-bg-N{ background:linear-gradient(160deg,#7b8494,#3f4654)!important; }
  .g-bg-R{ background:linear-gradient(160deg,#4f9bff,#1b3a8a)!important; }
  .g-bg-SR{ background:linear-gradient(160deg,#c06bff,#5b1d97)!important; }
  .g-bg-SSR{ background:linear-gradient(160deg,#ffd24a,#ff8a00,#ff5e7a)!important; }
  .g-bg-UR{ background:linear-gradient(160deg,#8b5cf6,#ff4fd8,#ffd24a)!important; }
  .hp-card { position:relative; border-radius:12px; border:2px solid #fff; overflow:hidden;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    box-shadow:0 3px 10px #0006, inset 0 0 18px #0004; }
  .hp-card .hp-emoji { filter:drop-shadow(0 3px 4px #0008); z-index:2; }
  .hp-card .heroListImg { width:108%; height:108%; object-fit:contain; z-index:2; filter:drop-shadow(0 3px 4px #0008); }
  .hp-card .petListImg { width:112%; height:112%; object-fit:contain; z-index:2; filter:drop-shadow(0 3px 4px #0008); }
  .hp-card .hp-grade { position:absolute; top:2px; left:4px; font-weight:900; font-size:11px; text-shadow:0 1px 2px #000; z-index:3; }
  .hp-card .hp-cls { position:absolute; top:2px; right:4px; font-size:12px; z-index:3; text-shadow:0 1px 2px #000; }
  .hp-card .hp-stars { position:absolute; bottom:1px; left:0; right:0; text-align:center; font-size:10px; color:#fff; text-shadow:0 1px 2px #000; z-index:3; letter-spacing:-1px; }
  .hp-card .hp-shine { position:absolute; top:-60%; left:-30%; width:60%; height:220%; z-index:1;

function storyBadge(){ return MAIN_STORY.filter(s=>s.script && G.stage>=s.stage && !(G.storyDone||[]).includes(s.ch)).length; }
function viewStory(){
  let h=`<div class="card small">스테이지를 돌파하면 메인 스토리가 열려요. <b>동료와의 유대</b>가 세계를 구하는 힘이 됩니다.</div>`;
  MAIN_STORY.forEach(s=>{
    const unlocked=G.stage>=s.stage, done=(G.storyDone||[]).includes(s.ch), ready=!!s.script&&unlocked;
    h+=`<div class="card" style="text-align:left;margin-bottom:8px;${unlocked?'':'opacity:.55'}">
      <div style="font-weight:bold">${unlocked?'📖':'🔒'} ${s.title} ${s.focus?`<span class="small" style="color:#ff8ab4">— ${s.focus} 편</span>`:''}</div>
      <div class="small">${unlocked? (s.script? (done?'✓ 시청 완료':(rewardText(s.reward)?'첫 시청 보상: '+rewardText(s.reward):'프롤로그')) : '🚧 다음 업데이트에서 공개') : '스테이지 '+s.stage+' 도달 시 해금'}</div>
      ${ready?`<button class="btn ${done?'':'gem'}" style="width:100%;margin-top:6px" onclick="playMainStory(${s.ch})">${done?'다시 보기':'▶ 재생'}</button>`:''}
    </div>`;
  });
  return h;
}
function playMainStory(ch){
  const s=MAIN_STORY.find(x=>x.ch===ch);
  if(!s || !s.script || G.stage<s.stage) return;
  playVN(s.script, ()=>{
    if(!G.storyDone) G.storyDone=[];
    const first=!G.storyDone.includes(ch);
    if(first){ G.storyDone.push(ch); grantReward(s.reward); saveGame(); }
    if(currentScreen==='story') renderScreen();
    if(first && rewardText(s.reward)) popReward('📖 '+s.title+' 완료', `<div style="font-weight:bold;font-size:18px">${rewardText(s.reward)}</div>`);
  }, s.focus||null, s.bg||null);
}

function normalizeHeroCatalog(){
  if(!Array.isArray(G.heroes)) G.heroes = [];
  G.heroes.forEach(h=>{
    if(HERO_NAME_MIGRATION[h.name]) h.name = HERO_NAME_MIGRATION[h.name];
    const base = HERO_POOL.find(x=>x.name===h.name) || HERO_POOL[0];
    h.name = base.name;
    h.emoji = base.emoji;
    h.cls = base.cls;
    if(!['SR','SSR','UR'].includes(h.grade)) h.grade = 'SR';
    h.atk = base.atk || 50;
    h.level = Math.max(1, Math.min(HERO_MAX_LEVEL, h.level||1));
    h.cap = Math.max(10, Math.min(HERO_MAX_LEVEL, h.cap||10));
    if(h.level > h.cap) h.level = h.cap;
    if(!h.equip) h.equip = {무기:0,방어구:0,장신구:0};
  });

  return { monster:monAttr, heroes:advantaged.map(h=>h.name), bonus };
}
function attrSynergyInfo(){
  const counts = partyAttributeCounts();
  const attrs = Object.keys(counts);
  let sameStacks = 0;
  attrs.forEach(a=>{ if(counts[a]>=2) sameStacks += counts[a]-1; });
  const seenPairs = new Set();
  let pairStacks = 0;
  attrs.forEach(a=>{
    const b = ATTRIBUTE_SYNERGY[a];
    if(attrs.includes(b)){
      const key = [a,b].sort().join('|');
      if(!seenPairs.has(key)){
        seenPairs.add(key);
        pairStacks += Math.min(counts[a]||0, counts[b]||0);
      }
    }
  });
  const bonus = sameStacks*0.08 + pairStacks*0.05;
  return { sameStacks, pairStacks, bonus, counts };
}
function heroEquipSum(h){ const e=h.equip||{무기:0,방어구:0,장신구:0}; return e.무기+e.방어구+e.장신구; }
function heroAffinity(h){ return G.affinity[h.name]||0; }
function heroLevel(h){ return Math.max(1, Math.min(HERO_MAX_LEVEL, h.level||1)); }
function heroCap(h){ return Math.max(10, Math.min(HERO_MAX_LEVEL, h.cap||10)); }
function heroAscCount(h){ return Math.max(0, Math.floor(heroCap(h)/10)-1); }
function heroGradeMult(h){ return HERO_GRADE_MULT[h.grade] || 1; }
function heroRawAtk(h){
  const mult = heroGradeMult(h);
  return Math.round(((h.atk||50) * mult + (heroLevel(h)-1) * 12 * mult + heroAscCount(h) * 120 * mult) * roleStatMult(h, 'atk'));
}
function heroEffAtk(h){ return Math.round(heroRawAtk(h) * (1 + heroEquipSum(h)*0.10) * (1 + heroAffinity(h)*0.003)); } // 레벨/초월/등급 + 장비 +10%/단계, 호감도 +0.3%/포인트
function heroMaxHp(h){
  const mult = heroGradeMult(h);
  const role = roleStatMult(h, 'hp');
  return Math.round((520 + heroLevel(h)*72 + heroAscCount(h)*680 + (h.atk||50)*5) * mult * role * (1 + (h.equip?.방어구||0)*0.16) * petHpMult());
}
function gearDefTotal(){ return (G.gear.방어구||0) * 6; }
function gearCritDmgMult(){ return 1 + (G.gear.악세||0) * 0.02; }
function heroDef(h){
  const mult = heroGradeMult(h);
  const role = roleStatMult(h, 'def');
  return Math.round((28 + heroLevel(h)*5 + heroAscCount(h)*55 + (h.equip?.방어구||0)*38 + (h.equip?.장신구||0)*14 + gearDefTotal()) * mult * role * petDefMult());
}
function ensureHeroHp(h){
  if(!h || !h.uid) return 0;
  if(!G.heroHp) G.heroHp = {};
  const max = heroMaxHp(h);
  if(G.heroHp[h.uid]==null || G.heroHp[h.uid] > max) G.heroHp[h.uid] = max;
  return G.heroHp[h.uid];
}
function livingPartyHeroes(){ return partyHeroes().filter(h=>ensureHeroHp(h)>0); }
function healPartyFull(){
  if(!G.heroHp) G.heroHp = {};
  partyHeroes().forEach(h=>{ G.heroHp[h.uid] = heroMaxHp(h); });
  renderHeroRow();
}
function heroLevelCost(h){ return Math.floor(180 * Math.pow(heroLevel(h), 1.45) * heroGradeMult(h)); }
function heroMatKey(h){ return HERO_MAT[h.name] || 'chaos'; }
function heroTransCost(h){
  const gradeUp = heroLevel(h)>=HERO_MAX_LEVEL && h.grade!=='UR';
  const base = gradeUp ? (h.grade==='SR'?45:90) : (8 + heroCap(h)*2);
  const dust = gradeUp ? (h.grade==='SR'?80:160) : (6 + heroCap(h));
  return { mat:base, dust, gold:Math.floor(heroLevelCost(h) * (gradeUp?10:5)), gradeUp };
}
function heroDismantleReward(h){
  const base = HERO_DUST_BY_GRADE[h.grade] || 1;
  return Math.max(1, Math.floor(base + heroLevel(h)*0.4 + heroAscCount(h)*base*0.5));
}
function heroIsMaxed(h){ return h.grade==='UR' && heroLevel(h)>=HERO_MAX_LEVEL && heroCap(h)>=HERO_MAX_LEVEL; }
function newHeroUid(){ return 'h'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function partyHeroes(){
  const ids = Array.isArray(G.party) ? G.party : [];
  const placed = Array.from({length:5}, (_,i)=> G.heroes.find(h=>h.uid===ids[i]) || null);
  if(Array.isArray(G.party)) return placed.filter(Boolean);
  return [...G.heroes].sort((a,b)=>heroEffAtk(b)-heroEffAtk(a)).slice(0,5);
}
function partySlots(){
  if(!Array.isArray(G.party)) G.party = [];
  return Array.from({length:5}, (_,i)=> G.heroes.find(h=>h.uid===G.party[i]) || null);
}
function heroAtkTotal(){ return partyHeroes().reduce((s,h)=>s+heroEffAtk(h),0); }
function gearAtkTotal(){ return (G.gear.무기||0) * 8; }
// 직업 시너지: 파티(상위5명)에 같은 직업이 많을수록 공격력 보너스
function synergyInfo(){
  const cnt = {};
  partyHeroes().forEach(h=>{ cnt[h.cls]=(cnt[h.cls]||0)+1; });
  let best=0, bestCls=null;
  for(const c in cnt){ if(cnt[c]>best){ best=cnt[c]; bestCls=c; } }
  const bonus = best>=5?0.40 : best>=4?0.25 : best>=3?0.15 : 0;
  return { count:best, cls:bestCls, bonus };
}
function synergyMult(){ return 1 + synergyInfo().bonus; }
function attrSynergyMult(){ return 1 + attrSynergyInfo().bonus; }
function guildMult(){ return (G.guild && G.guild.joined) ? 1.10 : 1; }  // 길드 가입 시 공격력 +10%
function totalAtk(){ return Math.round((G.atk + heroAtkTotal() + gearAtkTotal()) * skinMult() * synergyMult() * attrSynergyMult() * petAtkMult() * guildMult()); }
const HUNT_MAX_LEVEL = 1000;
const SPEED_MAX_LEVEL = 100;
const SPECIAL_MAX_LEVEL = 50;
function huntCost(base, level){ return Math.floor(base + Math.pow(level, 2) * base * 0.08); }
function huntCostMany(base, level, maxLevel, amount){
  let total = 0, n = 0;
  while(n < amount && level + n < maxLevel){
    total += huntCost(base, level + n);
    n++;
  }
  return {total, n};
}
function specialCost(level){ return Math.floor(25 + Math.pow(level, 1.7) * 8); }
function specialCostMany(level, maxLevel, amount){
  let total = 0, n = 0;
  while(n < amount && level + n < maxLevel){
    total += specialCost(level + n);
    n++;
  }
  return {total, n};
}
function passMult(){ return G.adPass ? 1.5 : 1; }            // 광고 패스 자동사냥 1.5배
function tapMult(){ return 1.5 * (1 + (G.tapPower-1)*0.10); } // 터치 공격력 배수
function autoMult(){ return (1 + (G.autoPower-1)*0.08) * passMult(); }  // 자동 공격력 배수
function autoInterval(){ return Math.max(100, 600 - (G.autoSpeed-1)*5); } // 공격속도 (ms)
function huntCritBonus(){ return ((G.critChance||1)-1) * (0.50/(SPECIAL_MAX_LEVEL-1)); }
function critDmgUpgradeMult(){ return 1 + ((G.critDmgPower||1)-1) * (1.00/(SPECIAL_MAX_LEVEL-1)); }
function totalCritRate(){ return Math.min(.95, G.critRate + petCritBonus() + huntCritBonus()); }
function totalCritDmgMult(){ return G.critDmg * critDmgUpgradeMult() * gearCritDmgMult(); }
function bossPowerBonus(){ return ((G.bossPower||1)-1) * (1.00/(SPECIAL_MAX_LEVEL-1)); }
function bossDmgMult(){ return isBoss ? 1 + bossPowerBonus() : 1; }
function attrDmgMult(){ return 1 + ((G.attrPower||1)-1) * (0.75/(SPECIAL_MAX_LEVEL-1)); }
function attrMatchupMult(){ return 1 + attrMatchupInfo().bonus; }
function huntDamageMult(){ return bossDmgMult() * attrDmgMult() * attrMatchupMult(); }

// 장비/등급에 따른 화려함 단계 (0~4) — 높을수록 이펙트가 화려해짐
function flashTier(){
  const bh = bestHero();
  const gr = bh ? {N:0,R:1,SR:2,SSR:3,UR:4}[bh.grade] : 0;
  const wl = Math.min(2, Math.floor((G.gear.무기||0)/3)); // 무기 강화 보너스
  return Math.min(4, gr + wl);
}
const GRADE_COLOR = {N:'#9ca3af',R:'#60a5fa',SR:'#c084fc',SSR:'#ffc23a',UR:'#ff8df0'};
// 직업별 + 장비등급별 타격 이펙트 (베기/마법/총격)
function hitEffects(crit, cls){
  const b = document.getElementById('battle');
  const x = 66 + Math.random()*8, y = 32 + Math.random()*6;
  const tier = flashTier();
  const bh = bestHero();

  // 총기류는 플레이어 → 몬스터로 탄환이 날아감
  if(cls.name === "총기류"){

    bl.style.textShadow = `0 0 ${4+tier*3}px ${cls.spark}`;

    setTimeout(()=>bl.remove(),170);
  }
  // 베기/타격 본체 (등급 높을수록 크고 빛남)
  const s = document.createElement('div'); s.className='slash';
  s.textContent = crit ? cls.crit : cls.hit;
  s.style.left = x+'%'; s.style.top = y+'%';
  s.style.fontSize = (40 + tier*7) + 'px';
  s.style.textShadow = `0 0 ${6+tier*5}px ${gradeCol}, 0 0 ${tier*8}px ${cls.color}`;
  b.appendChild(s);
  setTimeout(()=>s.remove(), 350);
  // 고등급(tier>=3): 충격 링 + 화면 흔들림
  if(tier>=3 || crit){
    const ring = document.createElement('div'); ring.className='hitring';
    ring.style.left=x+'%'; ring.style.top=(y+4)+'%'; ring.style.color=gradeCol;
    b.appendChild(ring); setTimeout(()=>ring.remove(),420);
  }
  if(tier>=2 && crit){ b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake'); }
  // 스파크 파티클 (등급 높을수록 많이)
  const count = (crit?9:5) + tier*3;
  for(let i=0;i<count;i++){
    const p = document.createElement('div'); p.className='spark';
    p.style.left = x+'%'; p.style.top = (y+6)+'%';
    const col = (i%3===0 && tier>=2) ? gradeCol : cls.spark;
    p.style.background = col; p.style.boxShadow = '0 0 '+(6+tier*2)+'px '+col;
    p.style.width=p.style.height=(5+tier)+'px';
    b.appendChild(p);
    const ang = Math.random()*6.28, dist = 22 + tier*8 + Math.random()*34;
    p.animate([{transform:'translate(0,0)',opacity:1},
               {transform:`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist}px)`,opacity:0}],
              {duration:420,easing:'ease-out'});
    setTimeout(()=>p.remove(), 440);
  }
}

// ===== 전투 =====
function bestHero(){ return G.heroes.length ? G.heroes.reduce((a,b)=>heroEffAtk(b)>heroEffAtk(a)?b:a) : null; }
function activeCls(){ const b=bestHero(); return b?heroCls(b):CLASSES.sword; }

// isManual=true → 클릭 타격 (풀 데미지), false → 자동사냥 (자동 배수 적용)
function attack(isManual){
  let dmg = totalAtk() * (isManual ? tapMult() : autoMult()) * huntDamageMult();
  const crit = Math.random() < totalCritRate();
  if(crit) dmg *= totalCritDmgMult();
  dealDamage(dmg, crit);
  // 플레이어 돌진 모션
  const pl = document.getElementById('player');
  pl.classList.add('atk'); setTimeout(()=>pl.classList.remove('atk'),130);
  heroAttackMotion();
  hitEffects(crit, activeCls());
}
function dealDamage(dmg, crit){
  if(livingPartyHeroes().length===0) return;
  monHp -= dmg;
  showDmg(dmg, crit);
  bumpCombo();
  const m = document.getElementById('monster');
  m.classList.add('hit'); setTimeout(()=>m.classList.remove('hit'),80);
  if(monHp <= 0) killMonster();
  updateHp();
}
function showHeroDmg(slotIndex, amount){
  const b = document.getElementById('battle');
  const d = document.createElement('div');
  d.className = 'dmg';
  d.style.color = '#ff9aad';
  d.style.fontSize = '15px';
  d.textContent = '-' + Math.ceil(amount).toLocaleString();
  d.style.left = (15 + (slotIndex%2)*13) + '%';
  d.style.top = (45 + Math.floor(slotIndex/2)*12) + '%';
  b.appendChild(d);
  setTimeout(()=>d.remove(), 650);
}
function monsterAttack(){
  if(document.getElementById('home').style.display==='flex') return;
  if(document.getElementById('charView').style.display==='block') return;
  if(monHp<=0) return;
  const slots = partySlots();
  const living = slots.map((h,i)=>h?{h,i}:null).filter(x=>x && ensureHeroHp(x.h)>0);
  if(!living.length){ partyWipe(); return; }
  const frontLiving = living.filter(x=>x.i < 2);
  const candidates = monsterAttackType()==='melee' && frontLiving.length ? frontLiving : living;
  const target = candidates[Math.floor(Math.random()*candidates.length)];
  const raw = monsterAtk();
  const dmg = Math.max(1, Math.floor(raw * 100 / (100 + heroDef(target.h))));
  G.heroHp[target.h.uid] = Math.max(0, ensureHeroHp(target.h) - dmg);
  const el = document.querySelectorAll('#heroRow .heroSlot')[target.i];
  if(el){ el.classList.remove('hit'); void el.offsetWidth; el.classList.add('hit'); setTimeout(()=>el.classList.remove('hit'),220); }
  showHeroDmg(target.i, dmg);
  renderHeroRow();
  if(!slots.some(h=>h && ensureHeroHp(h)>0)) partyWipe();
}
function partyWipe(){
  G.wipeCount = (G.wipeCount||0) + 1;
  G.wallStage = G.stage;
  const prev = Math.max(1, G.stage-1);
  if(G.stage>1){ G.stage = prev; G.kills = 0; }
  showToast(`전멸! 스테이지 ${G.stage} 반복 사냥`, '#ff8aa0', true);
  setTimeout(()=>showToast('강화하거나 소환상점에서 영웅을 늘려보세요', '#ffd866', true), 900);
  healPartyFull();
  spawnMonster();
  refreshTop();
  if(['hunt','hero','gacha','shop','gear'].includes(currentTab)) renderPanel();
}

const heroSkillState = {};
function heroSkillPack(h){
  const cs = CHAR_SKILLS[h.name];
  if(cs) return cs;
  const cls = heroCls(h);
  return { color:cls.color, skills:[{name:cls.skill, fx:cls.skillFx, mult:cls.skillMult, desc:cls.name}] };
}
function heroSkillCooldown(h, sk){
  const rank = GRADE_RANK[h.grade] ?? 0;
  return Math.max(4500, 8800 + (sk.mult||5)*180 - rank*650);
}
function heroSkillPower(h){
  const partySize = Math.max(1, partyHeroes().length);
  return (heroEffAtk(h) + G.atk/partySize) * skinMult() * (1 + synergyInfo().bonus) * attrSynergyMult();
}
function heroAttackType(h){
  const magic = ['mage','healer'];
  return magic.includes(h.cls) ? '마법' : '물리';
}
function heroCritRate(h){
  return h.cls==='assassin' ? .20 : .10;
}
function heroCritDmg(h){
  return h.cls==='assassin' ? 3.0 : 2.0;
}
function heroAttackSpeed(h){
  const base = {assassin:1.32, gunner:1.20, warrior:1.02, mage:.94, tanker:.86, healer:.90, knight:.96, sword:1.00, magic:.94, gun:1.16}[h.cls] || 1;
  const grade = 1 + (GRADE_RANK[h.grade]||0) * .035;
  const pet = activePet()?.buff==='speed' ? 1 + petVal(activePet()) : 1;
  return base * grade * pet;
}
function heroStatDetailHtml(hero){
  const data = charData(hero.name);
  const rows = [
    ['공격력', heroEffAtk(hero).toLocaleString()],
    ['체력', heroMaxHp(hero).toLocaleString()],

    ['치명타 확률', Math.round(heroCritRate(hero)*100)+'%'],
    ['치명타 피해', `x${heroCritDmg(hero).toFixed(1)}`],
    ['공격속도', heroAttackSpeed(hero).toFixed(2)+'회/초'],
    ['속성', heroAttributes(hero).join(' / ') || '대지'],
    ['공격 타입', heroAttackType(hero)],

  ];
  return `<div class="card" style="border-color:${heroCls(hero).color}">
    <div style="font-weight:bold;margin-bottom:3px">능력치</div>

  </div>`;
}
function heroSkillDetailHtml(hero){
  const pack = heroSkillPack(hero);
  return `<div class="card" style="border-color:${pack.color}">
    <div style="font-weight:bold;margin-bottom:5px">스킬</div>
    ${pack.skills.map((sk,idx)=>`<div class="skillDetail">
      <div class="name" style="color:${pack.color}">${idx+1}. ${sk.fx||heroCls(hero).hit} ${sk.name}</div>
      <div class="desc">계수 x${sk.mult} · 쿨타임 ${(heroSkillCooldown(hero, sk)/1000).toFixed(1)}초<br>${sk.desc||'전용 전투 기술을 자동으로 발동합니다.'}</div>
    </div>`).join('')}

}
function useSkill(){
  if(document.getElementById('home').style.display==='flex') return;
  if(document.getElementById('charView').style.display==='block') return;
  if(document.getElementById('screen').style.display==='flex') return;
  if(monHp<=0) return;
  const now = Date.now();
  const ready = livingPartyHeroes().filter(h=>{
    const st = heroSkillState[h.uid] || (heroSkillState[h.uid] = {idx:0, readyAt:now + Math.random()*1400});
    return now >= st.readyAt;
  });
  ready.forEach((h, order)=>setTimeout(()=>castHeroSkill(h), order*360));
}
function castHeroSkill(h){
  if(!h || ensureHeroHp(h)<=0 || monHp<=0) return;
  const pack = heroSkillPack(h);
  const st = heroSkillState[h.uid] || (heroSkillState[h.uid] = {idx:0, readyAt:0});
  const sk = pack.skills[st.idx % pack.skills.length];
  st.idx++;
  st.readyAt = Date.now() + heroSkillCooldown(h, sk);
  const crit = Math.random() < heroCritRate(h);
  const critMult = crit ? heroCritDmg(h) : 1;
  castSkill(`${crit?'CRIT ':''}${h.name} · ${sk.name}`, pack.color, sk.fx, sk.mult, false, heroSkillPower(h) * critMult);
}
function castSkill(name, color, fx, mult, multiHit, basePower){
  const b = document.getElementById('battle');
  const pl = document.getElementById('player');
  // 컷씬: 암전 + 캐릭터 줌 + 섬광 + 스킬명
  vignette(true); pl.classList.add('cast'); screenFlash(color); showToast(name, color, true);
  for(let k=0;k<5;k++) setTimeout(()=>{
    const f=document.createElement('div'); f.className='slash'; f.style.fontSize=(54+k*6)+'px';
    f.style.textShadow=`0 0 16px ${color}`;
    f.textContent=fx; f.style.left=(56+Math.random()*26)+'%'; f.style.top=(20+Math.random()*22)+'%';
    b.appendChild(f); setTimeout(()=>f.remove(),360);
  }, k*70);
  const total = (basePower || totalAtk()) * mult * huntDamageMult();
  if(multiHit){ for(let i=0;i<6;i++) setTimeout(()=>dealDamage(total/6, true), i*60); }
  else { dealDamage(total*0.5, true); setTimeout(()=>dealDamage(total*0.5, true), 140); }
  setTimeout(()=>{ vignette(false); pl.classList.remove('cast'); }, 650);
}
function killMonster(){
  dailyInc('kill',1);
  const reward = Math.floor(5 * Math.pow(1.2, G.stage-1)) * (isBoss?10:1) * petGoldMult();
  G.gold += reward;
  G.exp += G.stage * (isBoss?5:1);
  // 처치 연출
  monsterExplode();
  coinBurst(isBoss?12:6);
  if(isBoss){ screenFlash('#ff5e7a'); document.getElementById('battle').classList.add('shake'); setTimeout(()=>document.getElementById('battle').classList.remove('shake'),200); }
  // 레벨업
  const prevLv = G.plv;
  while(G.exp >= G.plv*20){ G.exp -= G.plv*20; G.plv++; G.atk += 5; }
  if(G.plv>prevLv){
    showToast('⭐ LEVEL UP! Lv.'+G.plv, '#ffd866', true);
    const ring=document.createElement('div'); ring.className='lvring';
    document.getElementById('battle').appendChild(ring); setTimeout(()=>ring.remove(),700);
  }
  G.kills++;
  partyHeroes().forEach(h=>{ G.heroHp[h.uid] = Math.min(heroMaxHp(h), ensureHeroHp(h) + heroMaxHp(h)*0.14); });
  if(G.kills >= 10){
    G.kills = 0;
    G.stage++;
    healPartyFull();
    if(G.stage%10!==1) showToast('STAGE '+G.stage, '#7fd0ff');
  }
  spawnMonster();
  refreshTop();
  if(['gear','hero','hunt','gacha','shop'].includes(currentTab)) renderPanel();
}

function rollGrade(){
  const r = Math.random(); let acc=0;
  for(const g of GRADES){ acc+=g.rate; if(r<=acc) return g; }
  return GRADES[0];
}
const SR_GRADE = GRADES.find(g=>g.g==='SR');
const UR_GRADE = GRADES.find(g=>g.g==='UR');
// 천장 적용 등급 뽑기
function rollHeroGrade(){
  G.totalPulls++;
  return rollGrade();
}
function ensureSummonState(){
  if(!G.summonPity) G.summonPity = {hero:G.pity||0, gear:0, pet:0};
  if(!G.selectTickets) G.selectTickets = {hero:0, gear:0, pet:0};
  ['hero','gear','pet'].forEach(k=>{
    if(G.summonPity[k]==null) G.summonPity[k]=0;
    if(G.selectTickets[k]==null) G.selectTickets[k]=0;
  });
  G.pity = G.summonPity.hero;
}
function addSummonPity(kind, count){
  ensureSummonState();
  G.summonPity[kind] += count;
  let gained = 0;
  while(G.summonPity[kind] >= PITY_MAX){
    G.summonPity[kind] -= PITY_MAX;
    G.selectTickets[kind]++;
    gained++;
  }
  G.pity = G.summonPity.hero;
  return gained;
}
function pityLabel(kind){
  ensureSummonState();
  const name = {hero:'영웅', gear:'장비', pet:'펫'}[kind];
  return `${name} 선택소환 ${G.summonPity[kind]}/${PITY_MAX} · 선택권 ${G.selectTickets[kind]}장`;
}
function makeHeroFromGrade(grade){
  const base = HERO_POOL[Math.floor(Math.random()*HERO_POOL.length)];
  return { uid:newHeroUid(), name:base.name, emoji:base.emoji, cls:base.cls, grade:grade.g, atk:grade.atk||base.atk||50, level:1, cap:10, equip:{무기:0,방어구:0,장신구:0} };
}
function addHero(hero){
  if(!hero.uid) hero.uid = newHeroUid();
  ensureHeroHp(hero);
  G.heroes.push(hero);
  G.heroes.sort((a,b)=>heroEffAtk(b)-heroEffAtk(a)); // 강한 순 정렬(상위 5명이 파티)
  if(!Array.isArray(G.party)) G.party = [];
  while(G.party.length<5) G.party.push(null);
  const emptySlot = G.party.findIndex(id=>!id);
  if(emptySlot>=0) G.party[emptySlot] = hero.uid;
}
// 소환 실행 (count=1 또는 11)
function summonHero(count){
  const cost = count===11 ? 3000 : 300;
  if(G.gem < cost){ alert('💎 보석이 부족해요!\n상점에서 광고/충전으로 보석을 모아보세요.'); return; }
  G.gem -= cost;
  const results = [];
  dailyInc('summon', count);
  for(let i=0;i<count;i++) results.push(makeHeroFromGrade(rollHeroGrade()));
  // 11연 최소 SR 1개 보장
  if(count===11 && !results.some(h=>GRADE_RANK[h.grade]>=GRADE_RANK.SR)){
    results[Math.floor(Math.random()*11)] = makeHeroFromGrade(SR_GRADE);
  }
  addSummonPity('hero', count);
  results.forEach(addHero);
  refreshTop(); renderHeroRow(); renderPanel();
  showSummonAnim(results);
  showPityToast('hero');
}

const GRADE_RANK = {N:0,R:1,SR:2,SSR:3,UR:4};
function showSummonAnim(results, type='hero'){
  const best = results.reduce((a,b)=> GRADE_RANK[b.grade]>GRADE_RANK[a.grade]?b:a);
  const ov = document.getElementById('summonOverlay');
  const rays = document.getElementById('summonRays');
  const flash = document.getElementById('summonFlash');
  const title = document.getElementById('summonTitle');
  const cardWrap = document.getElementById('summonCards');
  const accent = {N:'#9ca3af',R:'#60a5fa',SR:'#c084fc',SSR:'#ffc23a',UR:'#ff8df0'}[best.grade];
  title.textContent = type==='gear' ? '⚔️ 장비 소환 ⚔️' : type==='pet' ? '🐾 펫 소환 🐾' : '✨ 영웅 소환 ✨';
  rays.style.color = accent;
  flash.style.background = `radial-gradient(circle, ${accent}, transparent 60%)`;
  cardWrap.innerHTML = '';
  cardWrap.className = results.length>1 ? 'multi' : 'single';
  ov.style.display = 'flex';
  // 연출 시작: 빛 → 플래시 → 카드 등장
  rays.classList.remove('spin'); void rays.offsetWidth; rays.classList.add('spin');
  flash.classList.remove('burst'); void flash.offsetWidth; flash.classList.add('burst');
  // SSR/UR이면 화면 전체 골드 플래시 한 번 더
  if(best.grade==='SSR' || best.grade==='UR') ov.classList.add('ssr');
  else ov.classList.remove('ssr');
  setTimeout(()=>{
    results.forEach((h,i)=>{
      const c = document.createElement('div');
      c.className = 'summonCard';
      c.style.animationDelay = (i*0.07)+'s';
      c.innerHTML = summonResultPortrait(h, type, results.length>1?'sm':'lg');
      cardWrap.appendChild(c);
    });
  }, 420);
}

function orderedCharHeroes(){
  const slots = partySlots();
  const partyRank = new Map(slots.filter(Boolean).map((hero, idx)=>[hero.uid, idx]));
  return G.heroes
    .map((hero,i)=>({hero,i}))
    .sort((a,b)=>{
      const ap = partyRank.has(a.hero.uid) ? partyRank.get(a.hero.uid) : 99;
      const bp = partyRank.has(b.hero.uid) ? partyRank.get(b.hero.uid) : 99;
      if(ap!==bp) return ap-bp;
      const ag = GRADE_RANK[a.hero.grade] ?? 0;
      const bg = GRADE_RANK[b.hero.grade] ?? 0;
      if(ag!==bg) return bg-ag;
      const al = heroLevel(a.hero);
      const bl = heroLevel(b.hero);
      if(al!==bl) return bl-al;
      return heroEffAtk(b.hero)-heroEffAtk(a.hero);
    });
}

function grantReward(r){
  if(!r) return;
  if(r.gold) G.gold += r.gold;
  if(r.gem)  G.gem  += r.gem;
  if(r.mat)  for(const k in r.mat) G.mats[k] = (G.mats[k]||0) + r.mat[k];
  refreshTop();
}
function rewardText(r){
  if(!r) return '';
  const parts = [];
  if(r.gold) parts.push('<span class="goldIcon"></span>'+r.gold.toLocaleString());
  if(r.gem)  parts.push('💎'+r.gem.toLocaleString());
  if(r.mat)  for(const k in r.mat) parts.push((MATERIALS[k]?.emoji||'')+r.mat[k]);
  return parts.join(' ') || '없음';
}
function popReward(title, body){

function questList(){
  const out=[]; const maxMile = Math.max(50, Math.floor(G.stage/5)*5 + 10);
  for(let s=5; s<=maxMile; s+=5){
    out.push({ id:'stage'+s, name:`스테이지 ${s} 돌파`, need:s,
      reward: s%10===0 ? {gem:50+s} : {gold:1000*s} });
  }
  return out;
}

  let h = `<div class="card small">방치형 챕터를 진행할수록 보상을 받아요. (현재 스테이지 <b>${G.stage}</b>)</div>`;
  questList().forEach(q=>{
    const done = G.stage>=q.need, claimed = G.questClaimed.includes(q.id);
    h += `<div class="card" style="${claimed?'opacity:.5':''}"><div class="row">
      <div style="flex:1"><div style="font-weight:bold">${q.name}</div><div class="small">보상: ${rewardText(q.reward)}</div></div>

// ===== AFK 방치 보상 =====
let pendingOffline = null;
function offlineRewardCheck(){
  if(!G.lastSeen){ return; }                      // 첫 실행이면 스킵
  const elapsed = Math.min(43200, Math.floor((Date.now()-G.lastSeen)/1000)); // 최대 12시간
  if(elapsed < 60) return;                         // 1분 미만이면 스킵
  const kills = Math.floor(elapsed/3);             // 약 3초당 1처치 가정
  const gold = Math.floor((Math.floor(5*Math.pow(1.2,G.stage-1)) * kills) / 50);
  pendingOffline = { elapsed, gold };
}
function fmtDur(sec){ const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60); return (h?h+'시간 ':'')+m+'분'; }
function showOfflinePopup(){
  const o = pendingOffline; if(!o) return;
  document.querySelector('#popup>button').style.display='none';
  document.getElementById('popTitle').textContent = '💤 방치 보상';
  document.getElementById('popContent').innerHTML =
     `<div class="small">${fmtDur(o.elapsed)} 동안 자리를 비웠어요</div>
     <div style="font-size:30px;margin:8px 0">💤</div>
     <div style="font-weight:bold"><span class="goldIcon"></span>${o.gold.toLocaleString()}</div>
     <div style="display:flex;gap:8px;margin-top:14px">
       <button class="btn" style="flex:1" onclick="claimOffline(1)">받기</button>
       <button class="btn gem" style="flex:1" onclick="claimOfflineAd()">📺 2배 받기</button>
     </div>`;
  document.getElementById('overlay').style.display='flex';
}
function claimOffline(mult){
  const o = pendingOffline; if(!o) return;
  pendingOffline = null;
  G.gold += o.gold*mult;
  document.getElementById('overlay').style.display='none';
  document.querySelector('#popup>button').style.display='';
  refreshTop();
}
function claimOfflineAd(){
  if(G.adPass){ claimOffline(2); return; }
  showAdWatching(()=>claimOffline(2));
}

function setVNBg(url){
  const el=document.getElementById('vnBg');
  if(url) el.style.backgroundImage=`linear-gradient(180deg, rgba(10,8,24,.35), rgba(10,8,24,.12) 45%, rgba(10,8,24,.55)), url('${url}${AV}')`;
  else el.style.backgroundImage='';
}
function vnStep(){
  if(!vnScript || vnIdx>=vnScript.length){ closeVN(); const f=vnEnd; vnEnd=null; if(f) f(); return; }
  const node=vnScript[vnIdx];
  if(node.choice){ renderVNChoice(node.choice); }
  else showVNLine(node);
}
function vnNext(){
  if(!vnScript) return;
  if(document.getElementById('vnLog').style.display==='flex') return;
  if(vnTyping){ finishTyping(); return; }   // 타이핑 중 탭 → 전문 즉시 표시
  const node=vnScript[vnIdx];
  if(node && node.choice) return;   // 선택지는 골라야 진행
  vnIdx++; vnStep();
}
function vnChoose(i){
  const node = vnScript && vnScript[vnIdx];
  if(!node || !node.choice) return;
  const c = node.choice[i];
  if(!c) return;
  if(c.aff && vnChar) addAffinity(vnChar, c.aff);
  if(c.then) vnScript.splice(vnIdx+1, 0, ...[].concat(c.then));  // 선택에 대한 반응 대사 삽입
  vnIdx++; vnStep();
}
let vnLastWho = null;
function vnEmoji(who){ return (HERO_POOL.find(x=>x.name===who)||{}).emoji||'❓'; }
function showVNLine(node){
  const who=node.who||'';
  const txt=(node.text||'').replace(/\{이름\}/g, pName());   // 닉네임 치환
  const portrait=document.getElementById('vnPortrait');
  const nameEl=document.getElementById('vnNamePlate');
  document.getElementById('vnChoices').innerHTML='';
  const isChar = who!=='' && who!=='나' && who!=='???';   // 일러를 띄우는 화자인가
  if(isChar){
    nameEl.style.display='block'; nameEl.textContent=who; nameEl.style.background='';
    portrait.style.opacity=1; portrait.classList.remove('dim'); portrait.classList.add('art');
    const emo=vnEmoji(who);
    portrait.innerHTML=`<img src="${charArt(who)+AV}" onerror="this.parentElement.classList.remove('art');this.parentElement.textContent='${emo}'">`;
    // 화자가 바뀌면 등장 애니메이션
    if(who!==vnLastWho){ portrait.classList.remove('enter'); void portrait.offsetWidth; portrait.classList.add('enter'); }
    vnLastWho=who;
  } else {
    // 미연시 문법: 주인공('나')·내레이션·정체불명 화자는 일러를 띄우지 않는다.
    // 직전 미소녀는 화면에 남기고 어둡게 (아직 아무도 안 나왔으면 빈 화면)
    if(portrait.querySelector('img')) portrait.classList.add('dim');
    else { portrait.style.opacity=0; portrait.textContent=''; }
    if(who==='나'){
      nameEl.style.display='block'; nameEl.textContent=pName();   // 닉네임으로 표시
      nameEl.style.background='linear-gradient(90deg,#1c4f7a,#2a7ab8 72%, transparent)';
    } else if(who){   // ??? 등 정체불명 화자
      nameEl.style.display='block'; nameEl.textContent=who;
      nameEl.style.background='linear-gradient(90deg,#222230,#3a3a55 72%, transparent)';
    } else nameEl.style.display='none';
  }
  if(node.bg) setVNBg(node.bg);   // 컷 단위 배경 전환
  vnLogArr.push({who:(who==='나'?pName():who), text:txt});
  // 두근두근 연출: heart 플래그 또는 💗/두근 포함 대사 → 핑크 글로우 + 하트 파티클
  const box=document.getElementById('vnBox');
  if(node.heart || /💗|두근/.test(txt)){ box.classList.add('heartGlow'); spawnVNHearts(); }
  else box.classList.remove('heartGlow');
  if(node.shake){ const v=document.getElementById('vn'); v.classList.remove('shake'); void v.offsetWidth; v.classList.add('shake'); }
  typeText(txt);
}
// 타자기 효과
function typeText(text){
  clearTimeout(vnTypeTimer); vnFullText=text; vnTyping=true;
  const el=document.getElementById('vnText');
  document.getElementById('vnNext').style.display='none';
  let i=0;
  (function tick(){
    if(i>=text.length){ finishTyping(); return; }
    i++;
    el.innerHTML=vnEsc(text.slice(0,i))+'<span class="twCursor">▌</span>';
    vnTypeTimer=setTimeout(tick, 26);
  })();
}
function finishTyping(){
  clearTimeout(vnTypeTimer); vnTyping=false;
  document.getElementById('vnText').textContent=vnFullText;
  document.getElementById('vnNext').style.display='block';
  if(vnAuto) scheduleAuto();
}
function vnEsc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
// AUTO / SKIP / LOG
function vnToggleAuto(){ vnAuto=!vnAuto; updateAutoBtn(); if(vnAuto && !vnTyping) scheduleAuto(); else if(!vnAuto) clearTimeout(vnAutoTimer); }
function updateAutoBtn(){ const b=document.getElementById('vnAutoBtn'); if(b) b.classList.toggle('on', vnAuto); }
function scheduleAuto(){
  clearTimeout(vnAutoTimer);
  vnAutoTimer=setTimeout(()=>{
    if(vnAuto && vnScript && !vnTyping){ const n=vnScript[vnIdx]; if(!(n&&n.choice)){ vnIdx++; vnStep(); } }
  }, 1500);
}
function vnSkip(){
  if(!vnScript) return;
  const cur=vnScript[vnIdx];
  if(cur && cur.choice) return;   // 선택지에서는 스킵 불가
  clearTimeout(vnTypeTimer); vnTyping=false;
  vnIdx++;
  while(vnIdx<vnScript.length && !vnScript[vnIdx].choice){ const n=vnScript[vnIdx]; vnLogArr.push({who:(n.who==='나'?pName():(n.who||'')), text:(n.text||'').replace(/\{이름\}/g, pName())}); vnIdx++; }
  if(vnIdx>=vnScript.length){ closeVN(); const f=vnEnd; vnEnd=null; if(f) f(); return; }
  vnStep();   // 선택지에서 멈춤
}
function vnShowLog(){
  const list=document.getElementById('vnLogList');
  list.innerHTML = vnLogArr.map(l=>`<div class="vnLogItem">${l.who?`<b>${vnEsc(l.who)}</b>`:''}${vnEsc(l.text)}</div>`).join('') || '<div class="small">아직 기록이 없어요.</div>';
  document.getElementById('vnLog').style.display='flex';
  list.scrollTop=list.scrollHeight;
}
function spawnVNHearts(){
  const v=document.getElementById('vn');
  for(let i=0;i<7;i++){
    const h=document.createElement('div'); h.className='vnHeart'; h.textContent=['💗','💕','💓'][i%3];
    h.style.left=(28+Math.random()*44)+'%';
    h.style.bottom=(170+Math.random()*70)+'px';
    h.style.animationDelay=(Math.random()*0.55)+'s';
    v.appendChild(h); setTimeout(()=>h.remove(), 2400);
  }
}
function renderVNChoice(choices){
  clearTimeout(vnTypeTimer); vnTyping=false;
  document.getElementById('vnNext').style.display='none';
  const el=document.getElementById('vnChoices'); el.innerHTML='';
  document.getElementById('vnText').textContent='— 어떻게 할까? —';
  choices.forEach((c,i)=>{
    const b=document.createElement('button'); b.className='vnChoice'; b.textContent='💬 '+c.text;
    b.onclick=(ev)=>{ ev.stopPropagation(); vnChoose(i); };
    el.appendChild(b);
  });
}
function closeVN(){
  clearTimeout(vnTypeTimer); clearTimeout(vnAutoTimer); vnAuto=false; vnTyping=false;
  document.getElementById('vn').style.display='none'; vnScript=null; setVNBg(null);
}

// ===== 교감 / 호감도 =====
function addAffinity(name, amt){ G.affinity[name]=Math.min(100,(G.affinity[name]||0)+amt); refreshTop(); }
function bondBadge(){
  const names=[...new Set(G.heroes.map(h=>h.name))]; let n=0;
  names.forEach(name=>{
    if(G.talkDate[name]!==todayStr()) n++;
    charData(name).episodes.forEach((e,i)=>{ if((G.affinity[name]||0)>=e.need && !G.epDone.includes(name+'#'+i)) n++; });
  });
  return n;
}
function viewBond(){
  const names=[...new Set(G.heroes.map(h=>h.name))];
  let h=`<div class="card small">함께 모험하며 동료와의 <b>호감도</b>를 쌓아보세요. 호감도가 오르면 <b>전용 에피소드</b>가 열리고 공격력도 올라요!
    <div class="row" style="margin-top:8px;align-items:center"><div style="flex:1;text-align:left">내 이름: <b style="color:#ffd866">${vnEsc(pName())}</b></div>
    <button class="btn" onclick="askPlayerName(()=>{ if(currentScreen==='bond') renderScreen(); })">✏️ 변경</button></div></div>`;
  if(names.length===0) h+=`<div class="card small">아직 만난 동료가 없어요. '소환'에서 영입해 보세요!</div>`;
  names.forEach(name=>{
    const c=charData(name); const aff=G.affinity[name]||0;
    const emoji=(HERO_POOL.find(x=>x.name===name)||{}).emoji||'❓';
    const newEp = c.episodes.some((e,i)=> aff>=e.need && !G.epDone.includes(name+'#'+i));
    const canTalk = G.talkDate[name]!==todayStr();
    h+=`<div class="card">
      <div class="row">
        <div style="font-size:34px">${emoji}</div>
        <div style="flex:1">
          <div style="font-weight:bold">${name} <span class="small">· ${c.title}</span></div>
          <div class="small">${c.persona} · 공격력 +${Math.round(aff*0.3)}%</div>
          <div style="height:9px;background:#2a2d50;border-radius:5px;overflow:hidden;margin-top:5px">
            <div style="height:100%;width:${aff}%;background:linear-gradient(90deg,#ff8ab4,#ff5e7a)"></div></div>
          <div class="small">💗 호감도 ${aff}/100</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn" style="flex:1;${canTalk?'':'opacity:.6'}" onclick="talkChar('${name}')">💬 대화${canTalk?'':' ✓'}</button>
        <button class="btn" style="flex:1" onclick="openGift('${name}')">🎁 선물</button>
        <button class="btn ${newEp?'gem':''}" style="flex:1" onclick="openEpisodes('${name}')">📖 스토리${newEp?' ●':''}</button>
      </div>
    </div>`;
  });
  return h;
}
function talkChar(name){
  const c=charData(name); const aff=G.affinity[name]||0;
  // 호감도 70 이상이면 심쿵 대사 풀로 전환 (두근두근 모드)
  const pool=(aff>=70 && CHAR_TALK_HIGH[name]) ? CHAR_TALK_HIGH[name] : c.talk;
  const line=pool[Math.floor(Math.random()*pool.length)];
  let gainNode;
  if(G.talkDate[name]!==todayStr()){ G.talkDate[name]=todayStr(); addAffinity(name,5); dailyInc('talk',1); gainNode={who:'',text:'(호감도 +5 💗)'}; }
  else gainNode={who:'',text:'(오늘은 이미 대화했어요. 내일 또 와요!)'};
  playVN([{who:name,text:line}, gainNode], ()=>{ if(currentScreen==='bond') renderScreen(); }, name, VN_BG.town);
}
function openEpisodes(name){
  const c=charData(name); const aff=G.affinity[name]||0;
  let html = c.episodes.length? '' : '<div class="small">아직 준비된 에피소드가 없어요. (호감도를 더 쌓아보세요)</div>';
  c.episodes.forEach((e,i)=>{
    const done=G.epDone.includes(name+'#'+i), unlocked=aff>=e.need;
    html+=`<div class="card" style="text-align:left;margin-bottom:6px">
      <div style="font-weight:bold">${unlocked?'📖':'🔒'} ${e.title}</div>
      <div class="small">${unlocked?(done?'✓ 시청 완료':'첫 시청 보상: '+rewardText(e.reward)):'호감도 '+e.need+' 필요'}</div>
      <button class="btn ${unlocked&&!done?'gem':''}" style="width:100%;margin-top:6px" onclick="playEpisode('${name}',${i})" ${unlocked?'':'disabled'}>${done?'다시 보기':'▶ 재생'}</button>
    </div>`;
  });
  popReward('📖 '+name+' 에피소드', html);
}
function playEpisode(name,i){
  const c=charData(name); const e=c.episodes[i]; if(!e) return;
  if((G.affinity[name]||0) < e.need) return;
  closePopup();
  playVN(e.script, ()=>{
    const key=name+'#'+i, first=!G.epDone.includes(key);
    if(first){ G.epDone.push(key); grantReward(e.reward); }
    if(currentScreen==='bond') renderScreen();
    if(first) popReward('📖 에피소드 완료', rewardText(e.reward)?`<div style="font-weight:bold;font-size:18px">${rewardText(e.reward)}</div>`:'스토리를 확인했어요!');
  }, name, e.bg||null);
}
// ===== 선물 =====
function openGift(name){
  const fav=CHAR_FAV[name];
  let html=`<div class="small" style="margin-bottom:6px">선물로 호감도를 올려요. 💗 <b>최애 선물</b>은 1.5배!</div>`;
  GIFTS.forEach(g=>{
    const isFav=fav===g.id; const can=g.gem? G.gem>=g.gem : G.gold>=g.gold;
    const amt=isFav?Math.round(g.aff*1.5):g.aff;
    html+=`<div class="card" style="text-align:left;margin-bottom:6px"><div class="row">
      <div style="font-size:24px">${g.emoji}</div>
      <div style="flex:1"><b>${g.name}</b> ${isFav?'<span style="color:#ff8ab4">💗최애</span>':''}<div class="small">호감도 +${amt}</div></div>
      <button class="btn ${can?'gem':''}" onclick="giveGift('${name}','${g.id}')" ${can?'':'disabled'}>${g.gem?'💎'+g.gem:'<span class="goldIcon"></span>'+g.gold}</button>
    </div></div>`;
  });
  popReward('🎁 '+name+'에게 선물', html);
}
function giveGift(name,gid){
  const g=GIFTS.find(x=>x.id===gid); if(!g) return;
  if(g.gem){ if(G.gem<g.gem) return; G.gem-=g.gem; } else { if(G.gold<g.gold) return; G.gold-=g.gold; }
  const isFav=CHAR_FAV[name]===gid; const amt=isFav?Math.round(g.aff*1.5):g.aff;
  addAffinity(name,amt);
  closePopup();
  const line=isFav? '이거… 내가 제일 좋아하는 거예요. 어떻게 알았어요…?' : '고마워요. 소중히 간직할게요.';
  playVN([{who:name,text:line},{who:'',text:`🎁 ${g.emoji} ${g.name} → 호감도 +${amt} 💗${isFav?' (최애 선물!)':''}`}], ()=>{ if(currentScreen==='bond') renderScreen(); }, name, VN_BG.town);
}

// ===== 일일 미션 =====
function dailyReset(){ if(G.daily.date!==todayStr()){ G.daily={date:todayStr(), counts:{}, claimed:[]}; } }
function dailyInc(key,n){ dailyReset(); G.daily.counts[key]=(G.daily.counts[key]||0)+(n||1); }
function missionClaimable(){ dailyReset(); return DAILY_MISSIONS.filter(m=>(G.daily.counts[m.key]||0)>=m.goal && !G.daily.claimed.includes(m.id)).length; }
function viewMission(){
  dailyReset();
  let h=`<div class="card small">매일 미션을 달성하고 보상을 받으세요! (매일 0시 초기화)</div>`;
  DAILY_MISSIONS.forEach(m=>{
    const cur=Math.min(m.goal, G.daily.counts[m.key]||0);
    const done=cur>=m.goal, claimed=G.daily.claimed.includes(m.id);
    h+=`<div class="card" style="${claimed?'opacity:.5':''}">
      <div class="row"><div style="flex:1"><div style="font-weight:bold">${m.name}</div>
        <div class="small">보상: ${rewardText(m.reward)}</div></div>
        <button class="btn ${done&&!claimed?'gem':''}" onclick="claimMission('${m.id}')" ${(!done||claimed)?'disabled':''}>${claimed?'완료':(done?'받기':cur+'/'+m.goal)}</button></div>
      <div style="height:6px;background:#2a2d50;border-radius:4px;overflow:hidden;margin-top:6px">
        <div style="height:100%;width:${cur/m.goal*100}%;background:linear-gradient(90deg,#3be38b,#19c270)"></div></div>
    </div>`;
  });
  return h;
}
function claimMission(id){
  dailyReset();
  if(G.daily.claimed.includes(id)) return;
  const m=DAILY_MISSIONS.find(x=>x.id===id); if(!m) return;
  if((G.daily.counts[m.key]||0) < m.goal) return;
  G.daily.claimed.push(id); grantReward(m.reward); renderScreen();
  popReward('📋 미션 완료!', `<div style="font-weight:bold;font-size:18px">${rewardText(m.reward)}</div>`);
}

// ===== 펫 =====
function gradeColorOf(g){ return {N:'#9ca3af',R:'#60a5fa',SR:'#c084fc',SSR:'#fbbf24',UR:'#ff8df0'}[g]; }
function randomPetByGrade(grade){
  const pool = PET_POOL.filter(p=>p.grade===grade) || [];
  const use = pool.length ? pool : PET_POOL;
  return use[Math.floor(Math.random()*use.length)];
}
function makePetFromBase(base, grade){
  return {name:base.name, emoji:base.emoji, buff:base.buff, grade:grade||base.grade||'N', img:base.img||''};
}
function petRewardHtml(pet){
  return `<div class="hp-card g-bg-${pet.grade}" style="width:86px;height:86px;margin:0 auto 8px;border-color:${gradeColorOf(pet.grade)}">
      <div class="hp-shine"></div><div class="hp-grade txt-${pet.grade}">${pet.grade}</div>${petVisual(pet)}
    </div><div class="txt-${pet.grade}" style="font-weight:bold;font-size:18px">[${pet.grade}] ${pet.name}</div>`;
}
function petRewardGrid(got){
  return `<div class="rewardGrid">${got.map(p=>`<div class="rewardItem" style="border-color:${gradeColorOf(p.grade)}">
    <div class="hp-card g-bg-${p.grade}" style="width:58px;height:58px;border-color:${gradeColorOf(p.grade)}">
      <div class="hp-shine"></div><div class="hp-grade txt-${p.grade}" style="font-size:9px">${p.grade}</div>${petVisual(p)}
    </div>
    <div class="name txt-${p.grade}">[${p.grade}] ${p.name}</div>
  </div>`).join('')}</div>`;
}
function summonPet(){
  const cost=200;
  if(G.gem<cost){ alert('💎 보석이 부족해요!'); return; }
  G.gem-=cost;
  const grade=rollGrade();
  const pet=makePetFromBase(randomPetByGrade(grade.g), grade.g);
  addSummonPity('pet', 1);
  G.pets.push(pet);
  if(G.activePet<0) G.activePet=G.pets.length-1; // 첫 펫 자동 장착
  refreshTop(); currentScreen ? renderScreen() : renderPanel(); updatePet();
  showSummonAnim([pet], 'pet');
  showPityToast('pet');
}
function summonPetShop(count=1){
  const cost = count===11 ? 2000 : 200;
  if(G.gem<cost){ alert('💎 보석이 부족해요!'); return; }
  G.gem-=cost;
  const got=[];
  for(let i=0;i<count;i++){
    const grade=rollGrade();
    const pet=makePetFromBase(randomPetByGrade(grade.g), grade.g);
    G.pets.push(pet); got.push(pet);
  }
  if(count===11 && !got.some(p=>GRADE_RANK[p.grade]>=GRADE_RANK.SR)){
    const idx = Math.floor(Math.random()*got.length);
    const pet = makePetFromBase(randomPetByGrade('SR'), 'SR');
    G.pets[G.pets.length-got.length+idx] = pet; got[idx] = pet;
  }
  addSummonPity('pet', count);
  if(G.activePet<0) G.activePet=0;
  refreshTop(); updatePet();
  if(currentScreen) renderScreen(); else renderPanel();
  showSummonAnim(got, 'pet');
  showPityToast('pet');
}
function equipPet(i){ G.activePet=i; refreshTop(); currentScreen ? renderScreen() : renderPanel(); updatePet(); }
function viewPet(){
  let h=`<div class="card" style="border-color:#ffb74d"><div class="row">
      <div style="flex:1"><b>🐾 펫 소환</b><div class="small">N 54.9% · R 30% · SR 12% · SSR 3% · UR 0.1%<br>${pityLabel('pet')}</div></div>
      <button class="btn gem" onclick="summonPet()" ${G.gem<200?'disabled':''}>💎 200</button>
      <button class="btn" onclick="openSelectSummon('pet')" ${G.selectTickets?.pet>0?'':'disabled'}>UR 선택</button>
    </div></div>
    <h3>보유 펫 (${G.pets.length})</h3>`;
  if(G.pets.length===0) h+=`<div class="card small">아직 펫이 없어요. 소환해보세요!</div>`;
  G.pets.forEach((p,i)=>{
    const active=G.activePet===i;
    h+=`<div class="card" style="${active?'border-color:'+gradeColorOf(p.grade):''}"><div class="row">
      <div class="hp-card g-bg-${p.grade}" style="width:50px;height:50px;border-color:${gradeColorOf(p.grade)}">
        <div class="hp-grade txt-${p.grade}" style="font-size:9px">${p.grade}</div>
        ${petVisual(p)}</div>
      <div style="flex:1"><div style="font-weight:bold">[${p.grade}] ${p.name} ${active?'<span style="font-size:10px;color:#3be38b">●장착</span>':''}</div>
        <div class="small">${petBuffText(p)}</div></div>
      <button class="btn ${active?'':'gem'}" onclick="equipPet(${i})" ${active?'disabled':''}>${active?'장착중':'장착'}</button>
    </div></div>`;
  });
  return h;
}
// 전투 동료 표시 + 펫 공격
function updatePet(){
  const el=document.getElementById('petCompanion'); if(!el) return;

function upHunt(type, amount=1){
  if(type==='tap'){
    if(G.tapPower>=HUNT_MAX_LEVEL) return;
    const pack = huntCostMany(45, G.tapPower, HUNT_MAX_LEVEL, amount);
    if(pack.n<=0 || G.gold<pack.total) return;
    G.gold-=pack.total; G.tapPower += pack.n;
  } else if(type==='power'){
    if(G.autoPower>=HUNT_MAX_LEVEL) return;
    const pack = huntCostMany(55, G.autoPower, HUNT_MAX_LEVEL, amount);
    if(pack.n<=0 || G.gold<pack.total) return;
    G.gold-=pack.total; G.autoPower += pack.n;
  } else if(type==='speed'){
    if(G.autoSpeed>=SPEED_MAX_LEVEL) return;
    const pack = huntCostMany(70, G.autoSpeed, SPEED_MAX_LEVEL, amount);
    if(pack.n<=0 || G.gold<pack.total) return;
    G.gold-=pack.total; G.autoSpeed += pack.n;
    restartAuto();  // 속도 바뀌면 타이머 재시작
  } else if(['crit','critDmg','boss','attr'].includes(type)){
    const keyMap = {crit:'critChance', critDmg:'critDmgPower', boss:'bossPower', attr:'attrPower'};
    const key = keyMap[type];
    if(!G[key]) G[key] = 1;
    if(G[key]>=SPECIAL_MAX_LEVEL) return;
    const pack = specialCostMany(G[key], SPECIAL_MAX_LEVEL, amount);
    if(pack.n<=0 || G.gem<pack.total) return;
    G.gem-=pack.total; G[key] += pack.n;
  }
  refreshTop(); renderPanel();
}
function togglePartyHero(uid){
  if(!G.heroes.some(h=>h.uid===uid)) return;
  if(!Array.isArray(G.party)) G.party = [];
  const idx = G.party.indexOf(uid);
  if(idx>=0) G.party.splice(idx,1);
  else {
    if(G.party.length>=5) return;
    G.party.push(uid);
  }
  renderHeroRow();
  refreshTop();
  renderPanel();
}

function assignPartySlot(uid, slot){
  const hero = G.heroes.find(h=>h.uid===uid);
  if(!hero || slot<0 || slot>4) return;
  if(!Array.isArray(G.party)) G.party = [];
  while(G.party.length<5) G.party.push(null);

  renderHeroRow();

}

function upHeroLevel(i, mode='panel'){
  const hero = G.heroes[i]; if(!hero || heroIsMaxed(hero)) return;
  const lv = heroLevel(hero), cap = heroCap(hero);
  if(lv>=cap) return;
  const cost = heroLevelCost(hero);
  if(G.gold<cost) return;
  G.gold -= cost;
  hero.level = lv + 1;
  G.heroHp[hero.uid] = heroMaxHp(hero);
  refreshHeroViews(mode);
}
function transcendHero(i, mode='panel'){
  const hero = G.heroes[i]; if(!hero || heroIsMaxed(hero)) return;
  const lv = heroLevel(hero), cap = heroCap(hero);
  if(lv < cap) return;
  const matKey = heroMatKey(hero), tr = heroTransCost(hero);
  if((G.mats[matKey]||0) < tr.mat || (G.heroDust||0) < tr.dust || G.gold < tr.gold) return;
  G.mats[matKey] -= tr.mat;
  G.heroDust -= tr.dust;
  G.gold -= tr.gold;
  if(cap >= HERO_MAX_LEVEL && hero.grade !== 'UR'){
    hero.grade = hero.grade === 'SR' ? 'SSR' : 'UR';
    hero.level = 1;
    hero.cap = 10;
  } else {
    hero.cap = Math.min(HERO_MAX_LEVEL, cap + 10);
  }
  G.heroHp[hero.uid] = heroMaxHp(hero);
  refreshHeroViews(mode);
}

function gearCostMany(k, amount){

  return {total, n:amount};
}
function upgradeGear(k, amount=1){

function rollSummonGear(){
  const slots = ['무기','방어구','악세'];
  const grade = rollGrade();
  const slot = slots[Math.floor(Math.random()*slots.length)];
  const up = GEAR_SUMMON_UP[grade.g] || 1;
  G.gear[slot] = (G.gear[slot]||0) + up;
  return {slot, up, grade:grade.g};
}
function gearRewardSummary(got){
  const slots = ['무기','방어구','악세'];

  return {best, summary};
}

      <button class="btn ${cls==='gem'?'gem':'gold'}" onclick="watchAd('${type}')" ${ready?'':'disabled'}>${label}</button>
    </div></div>`;
  });
  h+=`<h3>💎 보석 충전</h3>
    <div class="card"><div class="row"><div style="flex:1"><b>보석 1000</b><div class="small">실제 출시 땐 구글 플레이 결제</div></div>
    <button class="btn gem" onclick="G.gem+=1000;refreshTop();renderPanel()">₩9,900 (테스트:무료)</button></div></div>`;
  return h;
}
function viewStat(){
  const party = partyHeroes();
  const partyHp = party.reduce((s,h)=>s+heroMaxHp(h),0);
  const partyDef = party.reduce((s,h)=>s+heroDef(h),0);
  const avgDef = party.length ? Math.round(partyDef / party.length) : 0;
  const attrs = partyAttributes();
  const pet = activePet();
  const syn = synergyInfo();
  const attrSyn = attrSynergyInfo();
  const attrMatch = attrMatchupInfo();
  const percent = v => Math.round(v*100);
  const attrCountText = Object.entries(attrSyn.counts).map(([a,n])=>`${a} ${n}`).join(' · ') || '없음';
  const attrPairText = Object.entries(ATTRIBUTE_SYNERGY).map(([a,b])=>`${a}+${b}`).join(' / ');
  const attrAdvText = Object.entries(ATTRIBUTE_ADVANTAGE).map(([a,b])=>`${a}>${b}`).join(' / ');
  const statRow = (label, value, note='') => `<div class="row"><div style="flex:1"><b>${label}</b>${note?`<div class="small">${note}</div>`:''}</div><b>${value}</b></div>`;
  return `<h3>내 능력치</h3>
    <div class="card">
      <div class="small">펫 + 특수강화 + 장비 적용 총합</div>
      <div style="font-size:24px;font-weight:bold;color:#ffd866;margin:3px 0 6px">${totalAtk().toLocaleString()}</div>
      ${statRow('공격력', totalAtk().toLocaleString(), `기본 ${G.atk.toLocaleString()} + 영웅 ${heroAtkTotal().toLocaleString()} + 무기 ${gearAtkTotal().toLocaleString()}`)}
      ${statRow('치명타 확률', `${percent(totalCritRate())}%`, `기본 ${percent(G.critRate)}% + 펫 ${percent(petCritBonus())}% + 특수강화 ${percent(huntCritBonus())}%`)}
      ${statRow('치명타 데미지', `x${totalCritDmgMult().toFixed(2)}`, `기본 x${G.critDmg.toFixed(2)} · 특수강화 x${critDmgUpgradeMult().toFixed(2)} · 악세 x${gearCritDmgMult().toFixed(2)}`)}
      ${statRow('전투 체력', partyHp.toLocaleString(), `배치 영웅 ${party.length}명의 체력 합산${pet?.buff==='hp'?` · 펫 +${percent(petVal(pet))}%`:''}`)}
      ${statRow('방어력', avgDef.toLocaleString(), `배치 영웅 평균 방어력 · 방어구 +${gearDefTotal().toLocaleString()}${pet?.buff==='def'?` · 펫 +${percent(petVal(pet))}%`:''}`)}
      ${statRow('속성', attrs.length ? attrs.join(' / ') : '대지', '배치 영웅 기준 적용 속성')}
      ${statRow('속성 데미지', `+${percent(attrDmgMult()-1)}%`, `특수강화 속성공격력 Lv.${G.attrPower} / ${SPECIAL_MAX_LEVEL}`)}
      ${statRow('속성 상성', `+${percent(attrMatch.bonus)}%`, `${attrMatch.heroes.length?attrMatch.heroes.join(', '):'상성 영웅 없음'} → ${attrMatch.monster} 몬스터`)}
      ${statRow('속성 시너지', `+${percent(attrSyn.bonus)}%`, `동속성 ${attrSyn.sameStacks}단계 · 조합 ${attrSyn.pairStacks}단계 · ${attrCountText}`)}
    </div>
    <div class="card">
      <div style="font-weight:bold;margin-bottom:5px">적용 보너스</div>
      ${statRow('펫', pet ? `${pet.name} · ${petBuffText(pet)}` : '착용 없음')}
      ${statRow('장비', `무기 +${gearAtkTotal().toLocaleString()} / 방어구 +${gearDefTotal().toLocaleString()} / 악세 치명타 x${gearCritDmgMult().toFixed(2)}`)}
      ${statRow('특수강화', `치확 +${percent(huntCritBonus())}% · 치피 x${critDmgUpgradeMult().toFixed(2)} · 보스 +${percent(bossPowerBonus())}% · 속성 +${percent(attrDmgMult()-1)}%`)}
      ${statRow('코스튬/시너지/길드', `코스튬 +${percent(skinMult()-1)}% · 시너지 +${percent(syn.bonus)}% · 길드 ${G.guild?.joined?'+10%':'없음'}`, syn.bonus>0 ? `${CLASSES[syn.cls]?.name||'직업'} ${syn.count}명 시너지` : '같은 직업 3명부터 시너지 적용')}
      ${statRow('속성 상성표', attrAdvText)}
      ${statRow('좋은 속성 조합', attrPairText)}
    </div>
    <div class="card small">게임 속성은 대지 · 자연 · 화염 · 물/얼음 · 빛 · 암흑 · 번개 · 바람 8가지만 적용됩니다.</div>`;
}

// ===== 상단 갱신 =====
function refreshTop(){
  document.getElementById('gold').textContent = Math.floor(G.gold).toLocaleString();
  document.getElementById('gem').textContent = G.gem.toLocaleString();
  document.getElementById('plv').textContent = G.plv;
  document.getElementById('stage').textContent = G.stage;
  document.getElementById('kills').textContent = G.kills;
  updatePlayer();
  updateHomeRes();
  saveGame();
}

// ===== 저장/불러오기 =====
function saveGame(){ try{ G.lastSeen = Date.now(); localStorage.setItem('idleRPG', JSON.stringify(G)); }catch(e){} }
function loadGame(){
  try{
    const s = localStorage.getItem('idleRPG');
    if(s){
      const saved = JSON.parse(s);
      const hadParty = Object.prototype.hasOwnProperty.call(saved, 'party');
      Object.assign(G, saved);
      // 구버전 세이브 보정
      if(!G.adCd) G.adCd = { gold:0, gem:0, pull:0 };
      if(G.pity==null) G.pity = 0;
      if(G.totalPulls==null) G.totalPulls = 0;
      if(!G.summonPity) G.summonPity = { hero:G.pity||0, gear:0, pet:0 };
      if(!G.selectTickets) G.selectTickets = { hero:0, gear:0, pet:0 };
      ['hero','gear','pet'].forEach(k=>{ if(G.summonPity[k]==null) G.summonPity[k]=0; if(G.selectTickets[k]==null) G.selectTickets[k]=0; });
      G.pity = G.summonPity.hero;
      if(!G.hero) G.hero = 'lin';
      if(!G.heroCostume) G.heroCostume = {};
      if(!G.ownedCostumes) G.ownedCostumes = ['lin_default','rubia_default','sapphira_default','silvia_default','kael_default','emeria_default','kaira_default','kairon_default'];
      ['lin_default','rubia_default','sapphira_default','silvia_default','kael_default','emeria_default','kaira_default','kairon_default'].forEach(cid=>{
        if(!G.ownedCostumes.includes(cid)) G.ownedCostumes.push(cid);
      });
      if(!G.mats) G.mats = {};
      if(G.heroDust==null) G.heroDust = 0;
      if(!G.dungeon) G.dungeon = { date:'', left:3 };
      if(!G.mail) G.mail = [];
      if(!G.questClaimed) G.questClaimed = [];
      if(!G.achClaimed) G.achClaimed = [];
      if(G.lastSeen==null) G.lastSeen = 0;
      if(!G.attend) G.attend = { last:'', day:0 };
      if(!G.affinity) G.affinity = {};
      if(G.playerName==null) G.playerName = '';
      if(!G.storyDone) G.storyDone = [];
      if(!G.epDone) G.epDone = [];
      if(!G.talkDate) G.talkDate = {};
      if(G.seenPrologue==null) G.seenPrologue = false;
      if(!G.daily) G.daily = { date:'', counts:{}, claimed:[] };
      if(!G.pets) G.pets = [];
      G.pets.forEach(p=>{
        if(!p.grade) p.grade = 'N';
        if(!PET_BUFF[p.buff]) p.buff = 'atk';
        if(!p.img){
          const match = PET_POOL.find(x=>x.name===p.name && x.grade===p.grade) || PET_POOL.find(x=>x.buff===p.buff && x.grade===p.grade);
          if(match) p.img = match.img;
        }
      });
      if(G.activePet==null) G.activePet = -1;
      if(!G.guild) G.guild = { joined:false, coin:0, lastCheck:'' };
      if(!G.heroHp) G.heroHp = {};
      if(!G.wipeCount) G.wipeCount = 0;
      if(!G.wallStage) G.wallStage = 0;
      if(!G.tapPower) G.tapPower = 1;
      if(!G.autoPower) G.autoPower = 1;
      if(!G.autoSpeed) G.autoSpeed = 1;
      if(!G.critChance) G.critChance = 1;
      if(!G.critDmgPower) G.critDmgPower = 1;
      if(!G.bossPower) G.bossPower = 1;
      if(!G.attrPower) G.attrPower = 1;
      G.tapPower = Math.min(HUNT_MAX_LEVEL, Math.max(1, G.tapPower));
      G.autoPower = Math.min(HUNT_MAX_LEVEL, Math.max(1, G.autoPower));
      G.autoSpeed = Math.min(SPEED_MAX_LEVEL, Math.max(1, G.autoSpeed));
      G.critChance = Math.min(SPECIAL_MAX_LEVEL, Math.max(1, G.critChance));
      G.critDmgPower = Math.min(SPECIAL_MAX_LEVEL, Math.max(1, G.critDmgPower));
      G.bossPower = Math.min(SPECIAL_MAX_LEVEL, Math.max(1, G.bossPower));
      G.attrPower = Math.min(SPECIAL_MAX_LEVEL, Math.max(1, G.attrPower));
      G.heroes.forEach(h=>{ if(!h.uid) h.uid=newHeroUid(); if(!h.equip) h.equip={무기:0,방어구:0,장신구:0}; if(!h.cls) h.cls="sword"; ensureHeroHp(h); });
      normalizeHeroCatalog();
      if(!hadParty || !Array.isArray(G.party)) G.party = G.heroes.slice(0,5).map(h=>h.uid);
      while(G.party.length<5) G.party.push(null);
      G.party = G.party.slice(0,5).map(id=>G.heroes.some(h=>h.uid===id) ? id : null);
    }
  }catch(e){}
}

// ===== 시작 =====
loadGame();
offlineRewardCheck();  // 접속 전 방치 보상 계산(refreshTop이 lastSeen 덮어쓰기 전에)
spawnMonster();
renderHeroRow();
refreshTop();
setTab('hunt');
goHome(); // 시작은 홈(로비) 화면
function startPrologue(){ playVN(WORLD.prologue, ()=>{ G.seenPrologue=true; saveGame(); if(pendingOffline) showOfflinePopup(); }, null, VN_BG.field); }
if(!G.playerName){ askPlayerName(()=>{ if(!G.seenPrologue) startPrologue(); }); }
else if(!G.seenPrologue){ startPrologue(); }
else if(pendingOffline) showOfflinePopup(); // 홈 위에 방치 보상 팝업
restartAuto(); // 자동사냥 시작
restartMonsterAttack(); // 몬스터도 배치 영웅을 공격
setInterval(useSkill, 1000); // 배치 영웅별 스킬 쿨타임 확인
setInterval(spawnSkinFx, 700); // 코스튬 분위기 이펙트
setInterval(petAttack, 1400); // 펫 동료 공격

// 몬스터 탭(클릭) → 즉시 추가 타격
const monEl = document.getElementById('monster');
let lastManualTapAt = 0;
function showTapHitMotion(e){
  const b = document.getElementById('battle');
  if(!b || !e) return;
  const p = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  if(p.clientX==null || p.clientY==null) return;
  const rect = b.getBoundingClientRect();
  const fx = document.createElement('div');
  fx.className = 'tapHitFx';
  fx.style.left = (p.clientX - rect.left) + 'px';
  fx.style.top = (p.clientY - rect.top) + 'px';
  b.appendChild(fx);
  setTimeout(()=>fx.remove(), 430);
}
function manualTap(e){
  if(e&&e.cancelable) e.preventDefault();
  if(document.getElementById('home').style.display==='flex') return;
  if(document.getElementById('charView').style.display==='block') return;
  if(document.getElementById('screen').style.display==='flex') return;
  const now = Date.now();
  if(now-lastManualTapAt<90) return;
  lastManualTapAt = now;
  showTapHitMotion(e);
  attack(true);
}
const battleEl = document.getElementById('battle');
battleEl.addEventListener('click', manualTap);
battleEl.addEventListener('touchstart', manualTap, {passive:false});
</script>
</body>
